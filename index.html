                            if (FixtureIndex === 8 || FixtureIndex === 2 || FixtureIndex === 3) {
                              rightValue = 750;
                              topValue = 100;
                            } else if (FixtureIndex === 6 || FixtureIndex === 7) {
                              rightValue = 700;
                              topValue = 80;
                            } else if (FixtureIndex === 5) {
                              rightValue = 300;
                              topValue = 20;
                            } else {
                              rightValue = 1350 - chartWidth;
                              topValue = 20; // 默认top值

                            CCmainChartLegend.style.right = rightValue + 'px';
                            CCmainChartLegend.style.top = topValue + 'px';

                        }
                    }
                }
            }
            
            // 更新图表配置
            CCcharts.forEach((chart, index) => {
                if (CCSeriesName[index]) {
                    chart.name = CCSeriesName[index];
                }
            });
        }

        // 处理鼠标移动事件
        function CChandleMouseMove(event, seriesIndex) {
    
          const chart = CCcharts[seriesIndex];
          const rect = chart.chart.getBoundingClientRect();
          const mouseX = event.clientX - rect.left;
          const mouseY = event.clientY - rect.top;
          
          // 检查是否有鼠标附近的点
          for (let i = 0; i < chart.points.length; i++) {
            const point = chart.points[i];
            const dx = mouseX - point.canvasX;
            const dy = mouseY - point.canvasY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            // 如果鼠标在点的附近（考虑点的半径）
            if (distance <= CCpointRadius + 3) {
              if (CChighlightedIndex !== point.index) {  // 使用点的原始数据索引，而不是数组索引
                CChighlightedIndex = point.index;  // 使用点的原始数据索引
                
                // 输出高亮点在系列1-4中的Canvas坐标
                for (let series = 0; series < Math.min(4, CCcharts.length); series++) {
                  if (CCcharts[series] && CCcharts[series].points) {
                    // 查找在其他系列中对应的点
                    const correspondingPoint = CCcharts[series].points.find(p => p.index === point.index);
                    if (correspondingPoint) {
                      const highlightPoint = correspondingPoint;
                    }
                  }
                }
                
                // 重绘所有图表以显示连接线和tooltip
                CCcharts.forEach((c, idx) => CChandleDrawChart(c, CCchartData[idx], idx));
              } else {
                // 即使是同一个点，也要重新绘制连接线和tooltip以更新位置
                // 重绘所有图表以确保连接线和tooltip更新
                CCcharts.forEach((c, idx) => CChandleDrawChart(c, CCchartData[idx], idx));
              }
              return;
            }
          }
          
          // 如果没有找到附近的点，清除高亮
          if (CChighlightedIndex !== -1) {
            CChighlightedIndex = -1;
            CCcharts.forEach((c, idx) => CChandleDrawChart(c, CCchartData[idx], idx));
          }
        }

        // 处理鼠标移出事件
        function CChandleMouseOut() {
          if (CChighlightedIndex !== -1) {
            CChighlightedIndex = -1;
            CCcharts.forEach((c, idx) => CChandleDrawChart(c, CCchartData[idx], idx));
          }
        }
        
        // 更新统计信息
        function CCupdateStats() {
          //console.log('CCupdateStats函数被调用');
          let totalCount = 0;
          let overlimitCount = 0;
          
          // 确定有效行数（过滤无效数据后的真实总数）
          if (CCchartData.length > 0 && CCchartData[0].length > 0) {
            // 先计算有效数据的总行数
            totalCount = 0;
            const maxRows = CCchartData[0].length;
            
            for (let row = 0; row < maxRows; row++) {
              let hasValidPoint = false;
              
              // 检查该行是否为有效数据
              // 对于FixtureIndex == 8，只检查系列2的x值，如果x <= 0，则整行无效
              if (FixtureIndex === 8) {
                if (CCchartData[1] && CCchartData[1][row]) { // 系列2对应索引1
                  const series2Point = CCchartData[1][row];
                  if (series2Point.x !== null && series2Point.x !== undefined && 
                      !(typeof series2Point.x === 'number' && isNaN(series2Point.x)) &&
                      series2Point.x > 0) { // 只有当系列2的x值 > 0时，才认为该行有效
                    hasValidPoint = true;
                  }
                }
              } else {
                // 其他FixtureIndex的原有逻辑
                for (let seriesIndex = 0; seriesIndex < CCchartData.length; seriesIndex++) {
                  if (CCchartData[seriesIndex] && CCchartData[seriesIndex][row]) {
                    const point = CCchartData[seriesIndex][row];
                    
                    // 检查数据是否有效
                    if (point.x !== null && point.y !== null && point.x !== undefined && point.y !== undefined && 
                        !(typeof point.x === 'number' && isNaN(point.x)) && !(typeof point.y === 'number' && isNaN(point.y)) &&
                        !(point.x === 0 && point.y === 0 && !point.sn && !point.timestamp)) {
                      hasValidPoint = true;
                      break;
                    }
                  }
                }
              }
              
              if (hasValidPoint) {
                totalCount++;
              }
            }
            
            // 按行统计，只要一行中有一个系列的点超出SPEC，该行就计为超限
            let validProcessed = 0; // 已处理的有效行计数
            for (let row = 0; row < maxRows; row++) {
              let isRowOverlimit = false;
              let hasValidPointInRow = false;
              
              // 对于FixtureIndex == 8，只检查系列2的x值，如果x <= 0，则整行无效
              if (FixtureIndex === 8) {
                if (CCchartData[1] && CCchartData[1][row]) { // 系列2对应索引1
                  const series2Point = CCchartData[1][row];
                  if (series2Point.x !== null && series2Point.x !== undefined && 
                      !(typeof series2Point.x === 'number' && isNaN(series2Point.x)) &&
                      series2Point.x > 0) { // 只有当系列2的x值 > 0时，才认为该行有效
                    hasValidPointInRow = true;
                  } else {
                    // 如果系列2的x值 <= 0，则跳过整行
                    continue;
                  }
                } else {
                  // 如果系列2没有数据，则跳过整行
                  continue;
                }
              } else {
                // 其他FixtureIndex的原有逻辑
                for (let seriesIndex = 0; seriesIndex < CCchartData.length; seriesIndex++) {
                  // 确保当前系列有该行数据
                  if (CCchartData[seriesIndex] && CCchartData[seriesIndex][row]) {
                    const point = CCchartData[seriesIndex][row];
                    
                    // 先过滤无效数据：如果x或y值 <= 0，认为是无效数据，跳过
                    if (point.x === null || point.y === null || point.x === undefined || point.y === undefined || 
                        (typeof point.x === 'number' && isNaN(point.x)) || (typeof point.y === 'number' && isNaN(point.y)) ||
                        (point.x === 0 && point.y === 0 && !point.sn && !point.timestamp)) {
                      continue; // 跳过无效数据点
                    }
                    
                    hasValidPointInRow = true;
                    break; // 找到有效数据点即可
                  }
                }
              }
              
              // 如果该行是有效的，继续检查是否超限
              if (hasValidPointInRow) {
                // 检查该行是否超限
                for (let seriesIndex = 0; seriesIndex < CCchartData.length; seriesIndex++) {
                  // 确保当前系列有该行数据
                  if (CCchartData[seriesIndex] && CCchartData[seriesIndex][row]) {
                    const point = CCchartData[seriesIndex][row];
                    
                    let isOutside = false;
                    
                    // 根据布局类型选择不同的判断方式
                    if (FixtureIndex === 2 || FixtureIndex === 3 || FixtureIndex === 5 || FixtureIndex === 6 || FixtureIndex === 7) {
                      // 使用圆形判断
                      const distance = Math.sqrt(point.x **2 + point.y** 2);
                      isOutside = distance > CCRadSPEC[seriesIndex];
                    } else if (FixtureIndex === 8) {
                      // 使用长方形判断
                      isOutside = point.x < CCRectSPEC[seriesIndex][0][0] || point.x > CCRectSPEC[seriesIndex][0][1] || 
                                 point.y < CCRectSPEC[seriesIndex][1][0] || point.y > CCRectSPEC[seriesIndex][1][1];
                    }
                    
                    // 如果当前系列的点超限，标记该行为超限，并跳出系列循环
                    if (isOutside) {
                      isRowOverlimit = true;
                      break;
                    }
                  }
                }
                
                // 如果该行超限，增加超限计数
                if (isRowOverlimit) {
                  overlimitCount++;
                }
                validProcessed++;
              }
            }
          }
          
          // 计算比例
          const rate = totalCount > 0 ? (overlimitCount / totalCount) * 100 : 0;
          const performanceStats = document.getElementById('performanceStats');
  
          // 更新统计框内容
            performanceStats.innerHTML = `
                <div>超出范围: ${overlimitCount}</div>
                <div>超限比例: ${rate.toFixed(2)}%</div>
                `;

        }

        // 绘制坐标轴箭头
        function CCDrawArrow(ctx, fromX, fromY, toX, toY) {
          const headLength = 10;
          const angle = Math.atan2(toY - fromY, toX - fromX);
          
          ctx.beginPath();
          ctx.moveTo(fromX, fromY);
          ctx.lineTo(toX, toY);
          ctx.stroke();
          
          ctx.beginPath();
          ctx.moveTo(toX, toY);
          ctx.lineTo(
            toX - headLength * Math.cos(angle - Math.PI / 6),
            toY - headLength * Math.sin(angle - Math.PI / 6)
          );
          ctx.lineTo(
            toX - headLength * Math.cos(angle + Math.PI / 6),
            toY - headLength * Math.sin(angle + Math.PI / 6)
          );
          ctx.closePath();
          ctx.fill();
        }

        // 判断点是否在SPEC内
        function CCisInsideSPEC(point, seriesIndex) {
          // 根据布局类型选择不同的判断方式
          if (FixtureIndex === 5 || FixtureIndex === 6 || FixtureIndex === 7) {
            // 使用圆形判断
            const distance = Math.sqrt(point.x **2 + point.y** 2);
            return distance <= CCRadSPEC[seriesIndex];
          } else if (FixtureIndex === 8) {
            // 使用长方形判断
            return point.x >= CCRectSPEC[seriesIndex][0][0] && point.x <= CCRectSPEC[seriesIndex][0][1] && 
                   point.y >= CCRectSPEC[seriesIndex][1][0] && point.y <= CCRectSPEC[seriesIndex][1][1];
          }
          // 默认使用圆形判断
          const distance = Math.sqrt(point.x **2 + point.y** 2);
          return distance <= CCRadSPEC[seriesIndex];
        }

              <div>${CCSeriesName[1]}: ${Math.sqrt(transformedData[1].x*transformedData[1].x + transformedData[1].y*transformedData[1].y).toFixed(3)} (${formatNum(transformedData[1].x)}, ${formatNum(transformedData[1].y)})</div>
              <div>${CCSeriesName[2]}: ${Math.sqrt(transformedData[2].x*transformedData[2].x + transformedData[2].y*transformedData[2].y).toFixed(3)} (${formatNum(transformedData[2].x)}, ${formatNum(transformedData[2].y)})</div>
              <div>${CCSeriesName[3]}: ${Math.sqrt(transformedData[3].x*transformedData[3].x + transformedData[3].y*transformedData[3].y).toFixed(3)} (${formatNum(transformedData[3].x)}, ${formatNum(transformedData[3].y)})</div>

        // 隐藏Tooltip
        function CChideTooltip() {
          const CCtooltip = document.getElementById('CCtooltip');
          if (CCtooltip) {
            CCtooltip.style.display = 'none';
          }
        }

        // 绘制点之间的连接线
        function CCDrawConnectionLines() {
          
          if (CChighlightedIndex === -1) {
            return;
          }
          
          // 检查系列1（索引0）是否有该索引的点，这是显示tooltip所必需的
          const series1Point = CCcharts[0].points.find(p => p.index === CChighlightedIndex);
          if (!series1Point) {
            return;
          }
          
          // 获取所有点的位置，只获取存在的点，使用原始数据索引查找
          const points = CCcharts.map(chart => 
            chart.points.find(p => p.index === CChighlightedIndex) || null
          );
          
          // 获取容器位置          
          const containerRect = document.querySelector('.CCchart-container').getBoundingClientRect();
          
          // 获取连接线canvas
          const connectionCanvas = document.getElementById('CCconnectionCanvas');
          
          // 设置canvas尺寸
          connectionCanvas.width = containerRect.width;
          connectionCanvas.height = containerRect.height;
          
          const ctx = connectionCanvas.getContext('2d');
          ctx.clearRect(0, 0, connectionCanvas.width, connectionCanvas.height);
          
          // 绘制连接线
          // 处理多个连线组（用&分隔）
          const connectionGroups = CCconnectionConfig.split('&');
          
          connectionGroups.forEach(group => {
            // 解析当前组的节点顺序（从1开始的索引转换为从0开始）
            const nodes = group.split('-').map(node => parseInt(node) - 1);
            
            if (nodes.length >= 2) {
              ctx.beginPath();
              
              for (let i = 0; i < nodes.length; i++) {
                const nodeIndex = nodes[i];
                if (nodeIndex >= 0 && nodeIndex < CCcharts.length) {
                  const point = CCcharts[nodeIndex].points.find(p => p.index === CChighlightedIndex);
                  if (point) {
                    const rect = CCcharts[nodeIndex].chart.getBoundingClientRect();
                    const x = point.canvasX + rect.left - containerRect.left;
                    const y = point.canvasY + rect.top - containerRect.top;
                    
                    if (i === 0) {
                      ctx.moveTo(x, y);
                    } else {
                      ctx.lineTo(x, y);
                    }
                  }
                }
              }
              
              ctx.strokeStyle = '#000';
              ctx.lineWidth = 1;
              ctx.stroke();
            }
          });
          
          // 显示Tooltip在系列1的位置（如果该点存在）
          const series1Index = 0; // 系列1对应索引0
          if (points[series1Index]) {
            const rect = CCcharts[series1Index].chart.getBoundingClientRect();
            const midX = points[series1Index].canvasX + rect.left - containerRect.left;
            const midY = points[series1Index].canvasY + rect.top - containerRect.top;
            CCshowTooltip(midX, midY, CChighlightedIndex);
          } else {
            console.log("CCDrawConnectionLines: Series 1 point not available, tooltip not shown");
          }
        }

        // 清除连接线
        function CCClearConnectionLines() {
          const connectionCanvas = document.getElementById('CCconnectionCanvas');
          if (connectionCanvas) {
            const ctx = connectionCanvas.getContext('2d');
            ctx.clearRect(0, 0, connectionCanvas.width, connectionCanvas.height);
          }
          CChideTooltip();
        }

        // 绘制图表
        function CChandleDrawChart(chart, dataSeries, seriesIndex) {

          // 显示图表
          chart.chart.style.display = 'block';
          
          // 设置Canvas尺寸为300x300
          chart.chart.width = 300;
          chart.chart.height = 300;
          
          // 确保Canvas显示尺寸与实际尺寸一致，避免拉伸
          chart.chart.style.width = '300px';
          chart.chart.style.height = '300px';
          
          chart.ctx.clearRect(0, 0, 300, 300);
          
          // 边距和图表尺寸
          const margin = { top: 40, right: 10, bottom: 10, left: 10 };
          
          // 计算图表可用宽度和高度
          let availableWidth = chart.chart.width - margin.left - margin.right;
          let availableHeight = chart.chart.height - margin.top - margin.bottom;
          
          // 确保XY轴比例为1:1
          const minDimension = Math.min(availableWidth, availableHeight);
          availableWidth = minDimension;
          availableHeight = minDimension;
          
          const chartWidth = availableWidth;
          const chartHeight = availableHeight;
          
          // 计数器和数组：跟踪超限数据点
          let outOfLimitCount = 0;
          let outOfLimitData = [];  // 存储超限数据
                
          // 比例尺 - 确保XY轴比例1:1
          const scale = minDimension / Math.abs((CCxMax - CCxMin));
          let xScale;
          if(CCxMin<CCxMax){
            xScale = (x) => margin.left + (x - CCxMin) * scale;
          }
          else{
            xScale = (x) => margin.left + (CCxMin -x) * scale;
          }
          let yScale;
          if(CCyMin<CCyMax){
            yScale = (y) => margin.top + chartHeight - (y - CCyMin) * scale;
          }
          else{
            yScale = (y) => margin.top + chartHeight - (CCyMin - y) * scale;
          }
          
          // 保存比例尺用于交互
          chart.scale.x = scale;
          chart.scale.y = scale;
          
          // 绘制网格线
          chart.ctx.strokeStyle = 'rgba(128, 128, 128, 0.1)';
          chart.ctx.lineWidth = 1;
          
          // 垂直网格线
          for (let x = Math.min(CCxMin,CCxMax); x <= Math.max(CCxMin,CCxMax); x += CCtickStep) {
            const xPos = xScale(x);
            chart.ctx.beginPath();
            chart.ctx.moveTo(xPos, margin.top);
            chart.ctx.lineTo(xPos, margin.top + chartHeight);
            chart.ctx.stroke();
          }
          
          // 水平网格线
          for (let y = Math.min(CCyMin,CCyMax); y <= Math.max(CCyMin,CCyMax); y += CCtickStep) {
            const yPos = yScale(y);
            chart.ctx.beginPath();
            chart.ctx.moveTo(margin.left, yPos);
            chart.ctx.lineTo(margin.left + chartWidth, yPos);
            chart.ctx.stroke();
          }
          
          // 计算坐标范围中点，用于绘制坐标轴、刻度和标签
          const midY = yScale((CCyMin + CCyMax) / 2); // 使用Y轴范围中点
          const midX = xScale((CCxMin + CCxMax) / 2); // 使用X轴范围中点
          
          // 绘制坐标轴（黑色）
          chart.ctx.strokeStyle = '#000';
          chart.ctx.lineWidth = 1;
          
          // X轴（反转方向后，起点和终点需要调整，箭头方向也需要调整）
          // 我们需要交换箭头的起点和终点，以确保箭头指向正确的方向
          if(CCxMin<CCxMax){
            CCDrawArrow(chart.ctx, xScale(CCxMin), midY, xScale(CCxMax), midY);
          }
          else{
            CCDrawArrow(chart.ctx, xScale(CCxMax), midY, xScale(CCxMin), midY);
          }
          
          // Y轴（反转方向后，起点和终点需要调整，箭头方向也需要调整）
          if(CCyMin<CCyMax){
            CCDrawArrow(chart.ctx, midX, yScale(CCyMin), midX, yScale(CCyMax));
          }
          else{
            CCDrawArrow(chart.ctx, midX, yScale(CCyMax), midX, yScale(CCyMin));
          }
          
          // 绘制参考图形（红色1px）
          chart.ctx.strokeStyle = '#ff0000';
          chart.ctx.lineWidth = 1;
          
          if (FixtureIndex === 5 || FixtureIndex === 6 || FixtureIndex === 7) {
            // 绘制参考圆
            chart.ctx.beginPath();
            const centerX = midX;
            const centerY = midY;
            const radius = scale * CCRadSPEC[seriesIndex];
            chart.ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            chart.ctx.stroke();
          } else if (FixtureIndex === 8) {
            // 绘制参考长方形
            chart.ctx.beginPath();
            const xMin = xScale(CCRectSPEC[seriesIndex][0][0]);
            const xMax = xScale(CCRectSPEC[seriesIndex][0][1]);
            const yMin = yScale(CCRectSPEC[seriesIndex][1][1]); // 注意Y轴可能需要反转
            const yMax = yScale(CCRectSPEC[seriesIndex][1][0]);
            chart.ctx.rect(xMin, yMin, xMax - xMin, yMax - yMin);
            chart.ctx.stroke();
          } else {
            // 默认绘制参考圆
            chart.ctx.beginPath();
            const centerX = midX;
            const centerY = midY;
            const radius = scale * CCRadSPEC[seriesIndex];
            chart.ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            chart.ctx.stroke();
          }
          
          // 绘制刻度线和标签（黑色）
          // 从配置中获取小数点位数
          const configExists = CCConfigs && CCConfigs[FixtureIndex] && CCConfigs[FixtureIndex][3] && CCConfigs[FixtureIndex][3][0];
          const decimalConfigValue = configExists ? CCConfigs[FixtureIndex][3][0].split(',')[2] : '1';
          // 计算decimalConfigValue的小数点位数
          const decimalPlaces = (decimalConfigValue.toString().split('.')[1] || '').length || 1; // 默认使用1位小数
          let xPos;
          // X轴刻度（反转方向后，从大到小循环）
          if(CCxMin<CCxMax){
          for (let x = CCxMin; x <= CCxMax; x += CCtickStep) {
            xPos = xScale(x);
            
            // 刻度线
            chart.ctx.beginPath();
            chart.ctx.moveTo(xPos, midY - 3);
            chart.ctx.lineTo(xPos, midY + 3);
            chart.ctx.strokeStyle = '#000';
            chart.ctx.stroke();
            
            // 标签
            if (Math.abs(x) > 0.001) {
              chart.ctx.fillStyle = '#666';
              chart.ctx.font = '8px sans-serif';
              chart.ctx.textAlign = 'center';
              chart.ctx.textBaseline = 'top';
              chart.ctx.fillText(x.toFixed(decimalPlaces), xPos, midY + 5);
            }
          }
        }
        else{ // X轴刻度（反转方向后，从大到小循环）
            for (let x = CCxMin; x >= CCxMax; x -= CCtickStep) {
            xPos = xScale(x);
            
            // 刻度线
            chart.ctx.beginPath();
            chart.ctx.moveTo(xPos, midY - 3);
            chart.ctx.lineTo(xPos, midY + 3);
            chart.ctx.strokeStyle = '#000';
            chart.ctx.stroke();
            
            // 标签
            if (Math.abs(x) > 0.001) {
              chart.ctx.fillStyle = '#666';
              chart.ctx.font = '8px sans-serif';
              chart.ctx.textAlign = 'center';
              chart.ctx.textBaseline = 'top';
              chart.ctx.fillText(x.toFixed(decimalPlaces), xPos, midY + 5);
            }
          }
        }
        let yPos;  
          // Y轴刻度
          if(CCyMin<CCyMax){ 
          for (let y = CCyMin; y <= CCyMax; y += CCtickStep) {
            yPos = yScale(y);
            
            // 刻度线
            chart.ctx.beginPath();
            chart.ctx.moveTo(midX - 3, yPos);
            chart.ctx.lineTo(midX + 3, yPos);
            chart.ctx.strokeStyle = '#000';
            chart.ctx.stroke();
            
            // 标签
            if (Math.abs(y) > 0.001) {
              chart.ctx.fillStyle = '#666';
              chart.ctx.font = '8px sans-serif';
              chart.ctx.textAlign = 'right';
              chart.ctx.textBaseline = 'middle';
              chart.ctx.fillText(y.toFixed(decimalPlaces), midX - 5, yPos);
            }
          }
        }
        else{ // Y轴刻度（反转方向后，从大到小循环）
          for (let y = CCyMin; y >= CCyMax; y -= CCtickStep) {
            yPos = yScale(y);
            
            // 刻度线
            chart.ctx.beginPath();
            chart.ctx.moveTo(midX - 3, yPos);
            chart.ctx.lineTo(midX + 3, yPos);
            chart.ctx.strokeStyle = '#000';
            chart.ctx.stroke();
            
            // 标签
            if (Math.abs(y) > 0.001) {
              chart.ctx.fillStyle = '#666';
              chart.ctx.font = '8px sans-serif';
              chart.ctx.textAlign = 'right';
              chart.ctx.textBaseline = 'middle';
              chart.ctx.fillText(y.toFixed(decimalPlaces), midX - 5, yPos);
            }
          }
        }
          
          // 坐标轴标签
          chart.ctx.fillStyle = '#333';
          chart.ctx.font = '10px sans-serif';
          chart.ctx.textAlign = 'center';
          chart.ctx.textBaseline = 'top';
          //默认标签位置
          if(CCxMin<CCxMax){
            if(CCxyConvert == 0){
            chart.ctx.fillText('X', margin.left + chartWidth, midY-20);
            }
            else{
            chart.ctx.fillText('Y', margin.left + chartWidth, midY-20);
            }
          }
          else{
            if(CCxyConvert == 0){
            chart.ctx.fillText('X', margin.left, midY-20);
            }
            else{
            chart.ctx.fillText('Y', margin.left, midY-20);
            }
          }
          chart.ctx.textBaseline = 'bottom';
          if(CCyMin<CCyMax){
            if(CCxyConvert == 0){
            chart.ctx.fillText('Y', midX+10, margin.top+5);
            }
            else{
            chart.ctx.fillText('X', midX+10, margin.top+5); 
            }
          }
          else{
            if(CCxyConvert == 0){
            chart.ctx.fillText('Y', midX+10, margin.top + chartHeight);
            }
            else{
            chart.ctx.fillText('X', midX+10, margin.top + chartHeight); 
            }
          }
          
          // 系列名称
          chart.ctx.fillStyle = '#333';
          chart.ctx.font = '12px sans-serif';
          chart.ctx.textAlign = 'left';
          chart.ctx.textBaseline = 'top';
          chart.ctx.fillText(chart.name, margin.left + 5, margin.top + 5);
          
          // 清空并重新记录点的位置信息
          chart.points = [];
          
          // 绘制数据点
          dataSeries.forEach((point, index) => {
            // 检查point是否为null或无效
            if (!point || point.x === null || point.y === null || point.x === undefined || point.y === undefined || 
                (typeof point.x === 'number' && isNaN(point.x)) || (typeof point.y === 'number' && isNaN(point.y))) {
              return;
            }
            
            // 特殊处理：对于FixtureIndex == 8，检查系列2对应索引的x值，如果x <= 0，则跳过当前索引的所有数据
            if (FixtureIndex === 8) {
              // 检查系列2（索引1）在相同索引处的x值
              if (CCchartData[1] && CCchartData[1][index] && CCchartData[1][index].x !== undefined && 
                  CCchartData[1][index].x !== null && !(typeof CCchartData[1][index].x === 'number' && isNaN(CCchartData[1][index].x))) {
                if (CCchartData[1][index].x <= 0) {
                  return; // 如果系列2在该索引的x值 <= 0，则跳过当前索引的所有数据
                }
              }
            }
            /*
            // 检查是否为全零点（根据您的需求，全零点可能表示无效数据）
            // 但要确保不是故意设置在原点的点
            if (point.x === 0 && point.y === 0) {
              // 检查是否为无效数据点（比如原始数据中就是缺失值，被默认填充为0）
              // 如果 point.sn 或其他标识符也缺失，可能表示这是无效数据
              if (!point.sn && !point.timestamp) {
                // 在LineChart中，类似的数据被当作NA处理，所以在这里我们也跳过它们
                return;
              }
            }
            */
            // 根据原点设置转换坐标
            let transformedX = point.x;
            let transformedY = point.y;
            if (CCorigin !== 0) {
              transformedX = (-1) * point.x;
              transformedY = (-1) * point.y;
            }
            
            if (transformedX >= Math.min(CCxMin, CCxMax) && transformedX <= Math.max(CCxMin, CCxMax) && transformedY >= Math.min(CCyMin, CCyMax) && transformedY <= Math.max(CCyMin, CCyMax)) {
              let x;
              let y;
              if(CCxyConvert ==0) {
                x = xScale(transformedX);
                y = yScale(transformedY);
              }
              else{
                x = xScale(transformedY);
                y = yScale(transformedX);
              }
              
              // 记录点的位置信息
              chart.points.push({
                x: transformedX,  // 使用转换后的坐标值，确保与绘制和tooltip显示一致
                y: transformedY,
                canvasX: x,
                canvasY: y,
                index: index
              });
              
              // 根据是否在SPEC内设置颜色
              const isInside = CCisInsideSPEC(point, seriesIndex);
              const fillColor = isInside ? 'rgba(0, 255, 0, 0.5)' : 'rgba(255, 0, 0, 0.5)';
              
              // 如果是当前高亮的点，绘制更大的点
              if (CChighlightedIndex === index) {
                chart.ctx.beginPath();
                chart.ctx.arc(x, y, CCpointRadius + 2, 0, Math.PI * 2);
                chart.ctx.fillStyle = '#ffff00'; // 黄色高亮
                chart.ctx.fill();
                chart.ctx.strokeStyle = '#000';
                chart.ctx.lineWidth = 1;
                chart.ctx.stroke();
              }
              
              // 绘制点
              chart.ctx.beginPath();
              chart.ctx.arc(x, y, CCpointRadius, 0, Math.PI * 2);
              chart.ctx.fillStyle = fillColor;
              chart.ctx.fill();
              chart.ctx.strokeStyle = '#000';
              chart.ctx.lineWidth = 1;
              chart.ctx.stroke();
            }
            else {
              // 增加超限计数（只有有效的数据点才计入超限统计）
              // 注意：此时数据点已经通过了有效性检查，所以直接增加计数
              outOfLimitCount++;  // 增加超限计数
              
              // 收集有SN和timestamp的超限数据
              if (point.sn && point.timestamp) {
                outOfLimitData.push(`${point.sn} ${point.timestamp}`);  // 存储超限数据
              }
            }
          });
          
          // 处理连接线和tooltip
          if (CChighlightedIndex !== -1) {
            CCDrawConnectionLines();
          } else {
            CCClearConnectionLines();
          }
          
          // 绘制水印
          drawScatterChartWatermark(chart);
        }

        // 状态显示函数
        function CCshowLoading(chart) {
          if (chart.loading) {
            chart.loading.style.display = 'flex';
          }
          chart.chart.style.display = 'none';
          CCClearConnectionLines();
        }

        function CChideLoading(chart) {
          if (chart.loading) {
            chart.loading.style.display = 'none';
          }
        }

        // 窗口大小变化时重绘
        window.addEventListener('resize', () => {
          // 清除连接线canvas内容
          const connectionCanvas = document.getElementById('CCconnectionCanvas');
          if (connectionCanvas) {
            const ctx = connectionCanvas.getContext('2d');
            ctx.clearRect(0, 0, connectionCanvas.width, connectionCanvas.height);
          }
          
          // 保持每个图表固定为300x300px的尺寸
          document.querySelectorAll('.CCchart-subcontainer').forEach(sub => {
            sub.style.width = '300px';
            sub.style.height = '300px';
          });
          
          CCcharts.forEach((c, idx) => {
            if (CCchartData && CCchartData[idx] && CCchartData[idx].length > 0) {
              CChandleDrawChart(c, CCchartData[idx], idx);
            }
          });
        });

        // 添加鼠标事件监听器
        CCcharts.forEach((chart, index) => {
          if (chart.chart) {
            chart.chart.addEventListener('mousemove', (event) => CChandleMouseMove(event, index));
            chart.chart.addEventListener('mouseout', CChandleMouseOut);
          }
        });

        // 绘制箭头函数
        function CCDrawArrow(ctx, fromX, fromY, toX, toY) {
          const headLength = 10;
          const angle = Math.atan2(toY - fromY, toX - fromX);
          
          ctx.beginPath();
          ctx.moveTo(fromX, fromY);
          ctx.lineTo(toX, toY);
          ctx.stroke();
          
          ctx.beginPath();
          ctx.moveTo(toX, toY);
          ctx.lineTo(
            toX - headLength * Math.cos(angle - Math.PI / 6),
            toY - headLength * Math.sin(angle - Math.PI / 6)
          );
          ctx.lineTo(
            toX - headLength * Math.cos(angle + Math.PI / 6),
            toY - headLength * Math.sin(angle + Math.PI / 6)
          );
          ctx.closePath();
          ctx.fill();
        }

        // 检查点是否在SPEC内
        function CCisInsideSPEC(point, seriesIndex) {
          // 根据布局类型选择不同的判断方式
          if (FixtureIndex === 5 || FixtureIndex === 6 || FixtureIndex === 7) {
            // 使用圆形判断
            const distance = Math.sqrt(point.x **2 + point.y** 2);
            return distance <= CCRadSPEC[seriesIndex];
          } else if (FixtureIndex === 8) {
            // 使用长方形判断
            return point.x >= CCRectSPEC[seriesIndex][0][0] && point.x <= CCRectSPEC[seriesIndex][0][1] && 
                   point.y >= CCRectSPEC[seriesIndex][1][0] && point.y <= CCRectSPEC[seriesIndex][1][1];
          }
          // 默认使用圆形判断
          const distance = Math.sqrt(point.x **2 + point.y** 2);
          return distance <= CCRadSPEC[seriesIndex];
        }

        // 将CSV数据转换为CC Chart数据格式
        function convertCSVToCCData() {
          
          if (!processedData || !processedData.data || processedData.data.length === 0) {
            console.warn('没有可用的CSV数据');
            return false;
          }

          // 获取配置列索引
          const resultColumnIndex = parseInt(resultColumnInput.value.trim()) - 1;
          const timestampColumnIndex = parseInt(timestampColumnInput.value.trim()) - 1;
          const productColumnIndex = parseInt(productColumnInput.value.trim()) - 1;
          const snColumnIndex = 0; // 处理过后数据的第一列作为SN
          
          // 获取当前Fixture的配置
          const fixtureConfig = fixtureConfigs[FixtureIndex];
          if (!fixtureConfig) {
            console.warn('未找到Fixture配置:', FixtureIndex);
            return false;
          }

          // 获取CC配置
          const ccConfig = CCConfigs[FixtureIndex];
          if (!ccConfig || ccConfig.length === 0) {
            console.warn('未找到CC配置:', FixtureIndex);
            return false;
          }

          // 获取列配置
          const columnConfig = ccConfig[0];
          if (!columnConfig || columnConfig.length === 0) {
            console.warn('未找到列配置:', FixtureIndex);
            return false;
          }

          // 解析列配置，获取X和Y列索引
          const columnPairs = [];
          for (let i = 0; i < 4; i++) {
            if (columnConfig[i]) {
              const columns = columnConfig[i].split('&');
              if (columns.length === 2) {
                const xCol = parseInt(columns[0]) - 1; // 转换为0-based索引
                const yCol = parseInt(columns[1]) - 1;
                columnPairs.push({ x: xCol, y: yCol });
              }
            }
          }

          // 初始化CC数据数组（如果未定义）
          if (!CCchartData) {
            CCchartData = [[], [], [], []];
          } else {
            // 清空现有数据
            CCchartData.forEach(series => series.length = 0);
          }
          
          if (!CCExtraInfo) {
            CCExtraInfo = [];
          } else {
            CCExtraInfo.length = 0;
          }

          // 获取当前选中的产品
          const selectedProduct = currentProduct || '';
          //console.log('当前选中的产品:', selectedProduct);

          // 处理每一行数据
          let validRowCount = 0;
          processedData.data.forEach((row, rowIndex) => {
            // 获取SN、Effect CT和产品信息
            const sn = row[snColumnIndex] || '';
            const effectCT = row[timestampColumnIndex] || '';
            const product = row[productColumnIndex] || '';

            // 如果当前有选中的产品，只处理匹配的产品数据
            if (selectedProduct && product !== selectedProduct) {
              return; // 跳过不匹配的产品
            }

            // 为每个系列创建数据点
            const dataPoints = [];
            let hasValidData = false;
            
            for (let seriesIndex = 0; seriesIndex < 4; seriesIndex++) {
              const columnPair = columnPairs[seriesIndex];
              if (columnPair) {
                const xValue = parseFloat(row[columnPair.x]) || 0;
                const yValue = parseFloat(row[columnPair.y]) || 0;
                
                if (!isNaN(xValue) && !isNaN(yValue)) {
                  dataPoints.push({ x: xValue, y: yValue });
                  hasValidData = true;
                } else {
                  dataPoints.push(null);
                }
                
              } else {
                dataPoints.push(null);
              }
            }

            // 如果有有效数据，添加到CC数据中
            if (hasValidData) {
              validRowCount++;
              for (let seriesIndex = 0; seriesIndex < 4; seriesIndex++) {
                CCchartData[seriesIndex].push(dataPoints[seriesIndex]);
              }
              CCExtraInfo.push({ sn, timestamp: effectCT, product });
            }
          });
          
          return true;
        }

        // 初始化CC图表
        function initCCCharts() {
          
          // 检查是否已初始化
          if (CCcharts && CCcharts.length > 0) {
            return;
          }

          // 获取CC配置
          const ccConfig = CCConfigs[FixtureIndex];
          if (!ccConfig || ccConfig.length === 0) {
            console.warn('未找到CC配置，无法初始化图表');
            return;
          }

          // 获取图表尺寸
          const chartDimensions = ccConfig[3][3] ? ccConfig[3][3].split(',') : ['600', '650'];
          const chartWidth = parseInt(chartDimensions[0]) || 600;
          const chartHeight = parseInt(chartDimensions[1]) || 650;

          // 初始化CCcharts数组（如果未定义）
          if (!CCcharts) {
            CCcharts = [];
          } else {
            CCcharts.length = 0;
          }

          // 创建4个图表
          let chartCount = 0;
          for (let i = 0; i < 4; i++) {
            const chartId = `CCscatterChart${i + 1}`;
            const chartElement = document.getElementById(chartId);
            
            if (chartElement) {
              const canvas = chartElement;
              if (canvas) {
                const ctx = canvas.getContext('2d');
                CCcharts.push({
                  chart: canvas,
                  ctx: ctx,
                  scale: { x: 1, y: 1 },
                  margin: { top: 40, right: 5, bottom: 5, left: 5 }
                });
                chartCount++;
                console.log(`图表${i+1} 初始化成功:`, chartId);
              } else {
                console.warn(`图表${i+1} 未找到canvas元素:`, chartId);
              }
            } else {
              console.warn(`图表${i+1} 未找到元素:`, chartId);
            }
          }

        }

        // 绘制所有CC图表
        function drawAllCCCharts() {
          
          // 转换数据
          const dataConverted = convertCSVToCCData();
          if (!dataConverted) {
            console.warn('数据转换失败，无法绘制图表');
            return;
          }

          // 初始化图表
          initCCCharts();
          
          // 绘制每个图表
          let drawnCount = 0;
          for (let i = 0; i < CCcharts.length; i++) {
            if (CCchartData[i] && CCchartData[i].length > 0) {
              CChandleDrawChart(CCcharts[i], CCchartData[i], i);
              drawnCount++;
            } else {
              console.warn(`图表${i+1} 无数据或数据为空`);
            }
          }
        }
        
        // 绘制散点图水印
        function drawScatterChartWatermark(chart) {
            const ctx = chart.ctx;
            const { width, height } = chart.chart;
            
            // 设置水印样式
            ctx.save();
            ctx.font = '50px Helvetica Neue';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; // 半透明黑色
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 旋转40度
            ctx.translate(width / 2, height / 2);
            ctx.rotate(40 * Math.PI / 180);
            
            // 绘制水印文本
            ctx.fillText('LEADTECH', 0, 0);
            
            ctx.restore();
        }
    </script>
