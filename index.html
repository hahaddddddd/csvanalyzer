
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>LEADTECH生产数据分析工具</title>
    <!-- *****
    V1.0.1029：
    1. 修改字符串筛选行为：=和!=运算符支持不区分大小写的模糊匹配
    2. 优化toggleSwitch切换逻辑：自定义模式保留所有输入内容，默认模式恢复预设值
    3. 图表增加水印功能：在产能图表中间显示"LEADTECH"水印
     V1.0.1030：
    1. 增加汇总多天数据功能
    2. 产能&CT标签页的多天汇总与单天产品数据与图形切换
     v1.1.1108:
    1. “多天汇总”可选多个文件夹
    *****
     v2.0.0104
    1.增加关键参数和组装CC标签页, 与产品名称和参数名称切换
    2.更改css风格

    1.增加Boxplot箱型图功能
    -->
    <style>
        * {
            font-family: "Helvetica Neue", Arial, sans-serif;
            font-size: 12px;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            position: relative;
            padding: 10px;
            min-width: 1580px;
            min-height: 770px;
        }
        
        #div1 {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 180px;
            height: auto;
            padding-bottom: 10px;
        }
        
        #div1 h1 {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        /* verticalLine样式 */
        #VerticalLine {
            position: absolute;
            width: 1px;
            height: 260px;
            top: 130px;
            background-color: #000000;
            border-left: 1px dashed #000000;
            pointer-events: none;
            display: none;
            z-index: 10;
        }
            
        /* parameterStats样式 */
        #parameterStats {
            position: absolute;
            top: 10px;
            right: 250px;
            z-index: 30;
        }
        /* LineChart样式 */
        #LineChart {
            display: block;
            position: absolute;
            left: 0px;
            top: 100px;
            z-index: 5;
        }

        /* verticalBarChart样式 */
        #VerticalBarChart {
            width: 60px;
            height: 300px;
            display: block;
            position: absolute;
            left: 1270px;
            top: 100px;
            z-index: 5;
        }
        
        /* 下拉菜单样式 */
        .fixture-dropdown {
            margin-bottom: 15px;
        }
        
        .fixture-dropdown select {
            width: 100%;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
            cursor: pointer;
        }
        
        #div2 {
            position: absolute;
            top: 10px;
            left: 200px;
            width: 1380px;
            height: 770px;
            /*border: 1px solid #ccc;*/
            overflow: hidden;
        }
        
        #div3 {
            position: absolute;
            top: 80px;
            left: 10px;
            width: 180px;
            height: 700px;
            border: 1px solid #ccc;
            padding: 10px;
            overflow-y: auto;
        }
        
        /* 模式切换模式切换栏样式 */
        .mode-switch {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
            padding-bottom: 4px;
            border-bottom: 1px solid #eee;
        }
        
        .mode-title {
            font-size: 12px;
            font-weight: bold;
        }
        
        /* Toggle Switch 样式 */
        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 26px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.4s;
            border-radius: 34px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #2196F3;
        }
        
        input:checked + .slider:before {
            transform: translateX(20px);
        }
        
        .upload-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .upload-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border: 1px solid #ddd;
        }
        
        .single-file {
            border-bottom: 0;
            background-color: #fafafa;
        }
        
        .folder-upload {
            background-color: #f5f5f5;
        }
        
        .upload-section h3 {
            margin: 0 0 15px 0;
            color: #333;
            font-size: 18px;
        }
        
        .upload-prompt {
            font-size: 32px;
            color: #666;
            text-align: center;
            padding: 20px;
            line-height: 1.5;
            cursor: pointer;
        }
        
        .single-file.active {
            background-color: #f0f0f0;
        }
        
        .folder-btn {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }
        
        .folder-btn:hover {
            background-color: #45a049;
        }
        
        .folder-btn:disabled {
            cursor: not-allowed;
            background-color: #cccccc;
            color: #666666;
        }
        
        .search-criteria {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        
        #filePatternInput {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            width: 300px;
        }
        
        .search-btn {
            padding: 8px 16px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .search-btn:hover {
            background-color: #0b7dda;
        }
        
        .progress-container {
            margin-top: 20px;
            width: 100%;
            max-width: 400px;
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background-color: #eee;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background-color: #4CAF50;
            width: 0%;
            transition: width 0.3s;
        }
        
        .progress-text {
            text-align: center;
            margin-top: 8px;
            color: #666;
            font-size: 14px;
        }
        
        .upload-result {
            padding: 20px;
            text-align: center;
        }
        
        .upload-success {
            color: green;
            font-size: 32px; /* 增大成功提示字体 */
            text-align: center;
            padding: 20px;
            word-wrap: break-word;
        }
        
        .upload-error {
            color: red;
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }
        
        .function-group {
            margin-bottom: 6px;
        }
        
        .function-group label {
            display: block;
            margin-bottom: 2px;
            font-weight: 500;
        }
        
        .function-group input[type="text"] {
            width: 100%;
            padding: 5px;
            margin-bottom: 2px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
                
        .toggle-conditions {
            margin: 5px 0 15px 0;
            padding: 4px;
            width: 100%;
            cursor: pointer;
        }
        
        .button-group {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        input[type="button"] {
            padding: 6px;
            cursor: pointer;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 3px;
            transition: all 0.2s;
        }
        
        input[type="button"]:hover {
            background-color: #e0e0e0;
            border-color: #999;
        }
        
        input[type="button"]:active {
            background-color: #d0d0d0;
        }
        
        input[type="button"]:disabled {
            background-color: #f9f9f9;
            color: #999;
            cursor: not-allowed;
            border-color: #ddd;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
        }
        
        th, td {
            border: 1px solid #ccc;
            padding: 6px;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        th {
            background-color: #f0f0f0;
            position: sticky;
            top: 0;
            z-index: 2;
            cursor: pointer;
            user-select: none;
            font-weight: 500;
        }
        
        th:first-child, td:first-child {
            position: sticky;
            left: 0;
            background-color: #f0f0f0 !important;
            z-index: 1;
        }
        
        th:first-child {
            z-index: 3;
        }
        
        /* 确保冻结列在选中状态下保持背景色 */
        th:first-child:active, td:first-child:active,
        th:first-child:focus, td:first-child:focus,
        th:first-child:focus-within, td:first-child:focus-within {
            background-color: #f0f0f0 !important;
        }
        
        /* 防止表格选择导致的背景色变化 */
        td:first-child::selection,
        th:first-child::selection {
            background-color: rgba(240, 240, 240, 0.3) !important;
        }
        
        th:hover {
            background-color: #e8e8e8;
        }
        
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        
        tr:hover {
            background-color: #eaf4ff;
        }
        
        /* 表格样式扩展 */
        tr.fail-row {
            background-color: #FF5453 !important;
        }
        
        tr.fail-row:hover {
            background-color: #FF5453 !important;
        }
        
        /* Effect CT超过目标值的行样式 */
        td.ct-exceed {
            background-color: #FFC107 !important;
            font-weight:bold;
        }
               
        .stats-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        
        .charts-container {
            display: flex;
            flex-direction: column;
            gap: 0px; /* 图表之间无间距 */
            padding: 0px; /* 图表容器无内边距 */
            height: 100%;
            overflow-y: auto;
            position: relative;
        }
        
        .chart-wrapper {
            height: 330px; /* 固定高度 */
            padding: 0px; /* 无内边距 */
            position: relative;
            width: 1350px; /* 固定宽度 */
            margin: 0 auto;
        }
        
        #LineChartWrapper {
            position: relative;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: default;
        }
        
        #CCconnectionCanvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 15;
        }
        
        /* 隐藏统计信息区域 */
        .stats-info {
            display: none !important;
        }
        
        .view-tabs {
            display: flex;
            border: 1px solid #ccc;
            height: 30px;
            width: 900px;
            border-radius: 15px;
            background-color: #ccc; /* 底色蓝色 */
            padding: 2px; /* 为内部元素提供空间 */
        }
        
        .view-tab {
            padding: 1px 1px;
            cursor: pointer;
            background-color: transparent; /* 无底色 */
            height: 24px;
            width: 180px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            /*margin: 0 10px; /* 为标签之间提供间距 */
            border: none; /* 无边框 */
        }
        
        .view-tab:hover {
            background-color: transparent;
            border: 1px solid white; /* 白色边框 */
        }
        
        .view-tab.active {
            background-color: white; /* 底色白色 */
            font-weight: bold;
            border: none; /* 无边框 */
            height: 24px;
            width: 180px;
            border-radius: 12px;
        }
        
        .view-tab.hidden {
            display: none;
        }
             
        .view-content {
            flex: 1;
            overflow: auto;
            height: calc(100% - 40px);
            position: absolute;
            top: 35px;
            left: 0;
            right: 0;
            bottom: 0;
            display: block !important;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .view-content.active {
            opacity: 1;
            visibility: visible;
            z-index: 1;
        }
        
        .tooltip {
            position: absolute;
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: opacity 0.2s;
        }

        /* 隐藏的配置列 */
        .hidden-columns {
            display: none !important;
        }
        
        /* 产品切换换按钮 */
        #mainProductToggle {
            position: absolute;
            top: 40px;
            left: 10px;
            z-index: 50;
            display: flex;
            gap: 10px;
        }

        /* 参数切换换按钮 */
        #parameterToggle{
            position: absolute;
            top: 40px;
            left: 350px;
            z-index: 50;
            display: flex;
            gap: 10px;
        }
        
        /*NG SN显示区域 */
        #showNG{
            position: absolute;
            width:1290px;
            height:320px;
            top: 435px;
            left: 50px;
            z-index: 50;
            display: none;
            gap: 10px;
            overflow-y: auto;
        }
        
        /* NG表格样式 */
        #showNG table {
            border: none;
            border-collapse: collapse;
            width: 100%;
        }
        
        #showNG table th,
        #showNG table td {
            text-align: left;
            padding: 4px;
            vertical-align: top; /* 文字顶部对齐 */
        }
        
        #showNG table th {
            font-weight: bold;
        }
        
        /* 无背景颜色 */
        #showNG table td:first-child,
        #showNG table th:first-child, 
        #showNG table th:hover,
        #showNG table tr:hover,
        #showNG table th,
        #showNG tr:nth-child(even){
            background-color: transparent !important;
        }

        /* NGSN样式*/
        .NGSN{
            padding: 5px 5px;
            background-color: #EEEEEE;
            border: 1px solid #C5C5C5;
            border-radius: 12px;
            cursor: pointer;
            font-size:12px;
            font-family: 'Courier New', Courier, monospace;
            margin:2px;
        }
        
        /* NGSN高亮样式*/
        .NGSN.highlighted {
            background-color: rgba(255, 0, 0, 0.5);
            border: 1px solid #ff0000;
        }
        
        .product-btn , .parameter-btn {
            padding: 5px 10px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .product-btn.active , .parameter-btn.active {
            background-color: #2196F3;
            color: white;
            border-color: #1976D2;
        }
        
        /* 图表标题样式 */
        .chart-title {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        
        /* 产量&CT统计显示样式 */
        .StatsSummary {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 5px 10px;
            border-radius: 3px;
            border: 1px solid #dddddd80;
        }

        /* 产量&CT统计框位置*/
        #total-production, #Average-CT{
            position: absolute;
            top: 10px;
            right: 20px;
            z-index: 40;
        }

        /* 关键参数统计框位置*/
        #parameterStats, #performanceStats{
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 40;
        }
                
        /* CT目标线提示框样式 */
        .ct-target-tooltip {
            position: absolute;
            top: -25px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            z-index: 101;
            opacity: 1;
            display: block;
        }
        
        /* 返回按钮样式 */
        #backToMultiDayBtn {
            display: none;
            position: absolute;
            top: 10px;
            right: 400px;
            padding: 6px 12px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            transition: background-color 0.2s ease;
        }
        
        #backToMultiDayBtn:hover {
            background-color: #1976D2;
        }
        
        /* legendContainer样式 */
        #legendContainer {
            width: 460px;
            display: flex;
            flex-direction: row; /* 水平排列 */
            position: absolute;
            left: 850px;
            top: 80px;
            z-index: 40;
        }

        /* 图例按钮基础样式 */
        .legend-button {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: center;
            padding: 4px 4px;
            margin-right: 4px;
            margin-bottom: 0;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            min-width: 80px;
            transition: background-color 0.2s;
        }

        /* 选中的图例按钮样式 */
        .legend-button.selected {
            background-color: #e6f3ff;
        }

        /* 图例颜色空心圆样式 */
        .legend-color-block {
            width: 12px;
            height: 12px;
            border-radius: 6px;
            margin-right: 4px;
        }

        /* 图例文本样式 */
        .legend-text {
            text-align: center;
        }

        /* 平均值文本样式 */
        .average-text {
            font-size: 12px;
            color: #666;
            text-align: center;
            flex-basis: 100%;
        }

        /* CC散点图样式 */

        /* 统计窗口样式 */
        .CCstats-window {
            position: absolute;
            top: 15px;
            right: 20px;
            z-index: 15;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 6px;
            padding: 8px 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            font-size: 0.9rem;
        }
    
        .CCstats-item {
            margin-bottom: 4px;
        }
    
        .CCstats-item:last-child {
            margin-bottom: 0;
        }   
        
        /* CC图表容器样式 */
        .CCchart-container {
          border-radius: 6px;      
          height: auto;      
          position: relative;      
          overflow: hidden;      
          display: inline-flex;      
          flex-wrap: wrap; /* 允许换行 */
          justify-content: center; /* 居中对齐 */
          margin: 0 auto; /* 左右居中 */
          width: 100%;
          top:50px;
        }
        
        .CCchart-subcontainer { 
          width: 300px; /* 固定每个图表容器宽度为300px */      
          height: 300px; /* 固定高度为300px */      
          position: relative;      
          margin: 0 10px 0 10px; /* 添加间距 */
        }

        .CCchart-title{
         position: absolute;
         top: 50px;
         left: 0;
         text-align: center;
         color: #333;
         font-size: 16px;
         font-weight: normal;
        }

        /* CC图例样式*/
        .CCchart-legend {
         position: absolute;
         top: 70px;
         right: 200px;
         background-color:transparent;
         text-align: left;
        }
    
        .CClegend-item {
         display: block;
         margin-bottom: 2px;
         font-size: 0.9rem;
         color: #666;
        }
    
        .CClegend-marker {
         display: inline-block;
         width: 10px;
         height: 10px;
         border-radius: 50%;
         margin-right: 5px;
        }

        .CClegend-inside {
         background-color: rgba(0, 255, 0, 0.5);
         border: 1px solid #000;
        }

        .CClegend-outside {
         background-color: rgba(255, 0, 0, 0.5);
         border: 1px solid #000;
        }

        #CCSPEC-reference {
         display: inline-block;
         width: 10px;
         height: 10px;
         border-radius: 50%;
         margin-right: 5px;
         background-color: transparent;
         border: 1px solid #ff0000;
        }

        /* CPKCover 样式 */
        #CPKCover {
            position: absolute;
            top: 65px;
            width: 1082px;
            background-color: white;
            border: 1px solid #ddd;
            z-index: 100;
            display: none;
            opacity: 0.95;
        }

        /* CPKBoxPlot 样式 */
        #CPKBoxPlot {
            position: absolute;
            width: 1082px;
            height: 300px;
            background-color: white;
            border: 1px solid #ddd;
            z-index: 100;
            display: none;
            opacity: 0.95;
        }

        .Boxplot{
            width:60px;
            height:250px;
            margin:0;
            padding:0;
            flex-shrink: 0;
        }

    </style>
</head>
<body onload="initUploadArea()">
    <div id="div1">
        <h1>生产数据分析工具V3.0.0330</h1>
        <!-- 单选下拉菜单 -->
        <div class="fixture-dropdown">
            <select id="fixtureSelect">
                <option value="0">01 ALS Press</option>
                <option value="1">02 Mic Bracket</option>
                <option value="2">03 SPK Fly-in L</option>
                <option value="3">04 SPK Fly-in R</option>
                <option value="4">05 SPK Press</option>
                <option value="5">06 Fan Fly-in</option>
                <option value="6">07 AC Inlet</option>
                <option value="7">08 Busbar</option>
                <option value="8">09 Camera PreAssembly</option>
                <option value="9">10 Camera CCD4LiveGuide</option>
                <option value="10" selected = "selected">11 Hanson Attach Trace</option>
                <option value="11">12 Hanson FAI (online)</option>
            </select>

    <script>

        // APIkey数组
        const APIkey = [
            "https://nxpohshhzrxotatvqnjl.supabase.co", // supabase URL
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54cG9oc2hoenJ4b3RhdHZxbmpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMDU4MzksImV4cCI6MjA5MDU4MTgzOX0.IjxntL_rVAO5Sz08O0vIsY1R2pVhlFtwnMXi3LH8mxM", // SUPABASE_KEY
            "FAI" // TABLE_NAME
        ];

        // 生成图表标题前缀的共享函数
        function generateChartTitlePrefix(datesArray, isMultipleDays) {
            if (!datesArray || datesArray.length === 0) {
                return '测试';
            }
            
            if (isMultipleDays) {
                // 格式化日期为 yyyy/m/d
                const formatDate = (dateStr) => {
                    const parts = dateStr.split('-');
                    return `${parts[0]}/${parts[1]}/${parts[2]}`;
                };
                const startDate = formatDate(datesArray[0]);
                const endDate = formatDate(datesArray[datesArray.length - 1]);
                return `${startDate} - ${endDate}`;
            } else {
                // 单天数据，格式化为 yyyy/m/d
                const dateParts = datesArray[0].split('-');
                chartDate = `${dateParts[0]}/${dateParts[1]}/${dateParts[2]}`;
                return chartDate;
            }
        } 
        let currentView = 'table'; 
        let capacityChartInstance = null;
        let ctChartInstance = null;
        let chartDate = '';
        let products = new Set();
        let currentProduct = '';
        //let currentParameterProduct = ''; // 当前压力图表选择的产品
        let currentParameterProduct = 'J527'; // 默认选中J527用于参数监控图表
        let maxCapacityValue = 0;
        let maxCTValue = 0;
        let productTotalProduction = {};
        let productTotalFail = {};
        let productCTTargets = {  // 存储不同产品的CT目标值
            'J427': null,
            'J527': null
        };
        
        // CPK模式切换
        document.addEventListener('DOMContentLoaded', function() {
            const cpkModeRadios = document.querySelectorAll('input[name="cpkMode"]');
            if (cpkModeRadios.length > 0) {
                cpkModeRadios.forEach(radio => {
                    radio.addEventListener('change', function() {
                        if (this.checked) {
                            const mode = this.value;
                            if (mode === 'Raw') {
                                // 切换回RawData模式，重新生成原始表格
                                generateCPKTable();
                                // 隐藏CPKCover和CPKBoxPlot
                                const cpkCover = document.getElementById('CPKCover');
                                const cpkBoxPlot = document.getElementById('CPKBoxPlot');
                                if (cpkCover) cpkCover.style.display = 'none';
                                if (cpkBoxPlot) cpkBoxPlot.style.display = 'none';
                            } else if (mode === 'CPK') {
                                // 切换到CPK模式，计算CPK值
                                calculateCPK();
                            } else if (mode === 'CP') {
                                // 切换到CP模式，计算CP值
                                calculateCP();
                            }
                        }
                    });
                });
            }
        });
        
        // 计算CPK值
        function calculateCPK() {
            const fixtureIndex = parseInt(document.getElementById('fixtureSelect').value) || 0;
            const groupbyConfig = GroupbyConfig[fixtureIndex];
            if (!groupbyConfig || !groupbyConfig[0]) return;
            
            const dataColumns = groupbyConfig[0];
            const sortConfig = groupbyConfig[3] || [];
            const specLimits = groupbyConfig[4] || [];
            
            // 处理数据行（从第2行开始）
            const rows = [];
            if (processedData.data && processedData.data.length > 0) {
                for (let i = 0; i < processedData.data.length; i++) {
                    const rowData = processedData.data[i];
                    const tableRow = [];
                    
                    for (let j = 0; j < dataColumns.length; j++) {
                        const columnIndex = parseInt(dataColumns[j]) - 1; // 转换为0-based索引
                        let cellValue = rowData[columnIndex] || '';
                        
                        // 处理H和F类型的列
                        if (sortConfig[j] === "H") {
                            // 按小时统计，格式化为 yy/mm/dd hh:00-(hh+1):00
                            if (cellValue) {
                                const date = new Date(cellValue);
                                if (!isNaN(date.getTime())) {
                                    // 解析筛选条件中的时间范围
                                    const timeRanges = parseTimeRangeFromFilters();
                                    let useFilteredRange = false;
                                    let filteredStart = null;
                                    let filteredEnd = null;
                                    
                                    // 检查当前列是否有筛选时间范围，且间隔小于等于lifetime分钟
                                    if (timeRanges[j]) {
                                        const duration = calculateTimeRangeDuration(timeRanges[j]);
                                        if (duration > 0 && duration <= lifetime) {
                                            useFilteredRange = true;
                                            filteredStart = timeRanges[j].min;
                                            filteredEnd = timeRanges[j].max;
                                        }
                                    }
                                    
                                    if (useFilteredRange && filteredStart && filteredEnd) {
                                        // 使用筛选的时间段
                                        const startYear = filteredStart.getFullYear();
                                        const startMonth = (filteredStart.getMonth() + 1).toString().padStart(2, '0');
                                        const startDay = filteredStart.getDate().toString().padStart(2, '0');
                                        const startHour = filteredStart.getHours().toString().padStart(2, '0');
                                        const startMinute = filteredStart.getMinutes().toString().padStart(2, '0');
                                        
                                        const endYear = filteredEnd.getFullYear();
                                        const endMonth = (filteredEnd.getMonth() + 1).toString().padStart(2, '0');
                                        const endDay = filteredEnd.getDate().toString().padStart(2, '0');
                                        const endHour = filteredEnd.getHours().toString().padStart(2, '0');
                                        const endMinute = filteredEnd.getMinutes().toString().padStart(2, '0');
                                        
                                        // 检查是否是同一天
                                        if (startYear === endYear && startMonth === endMonth && startDay === endDay) {
                                            cellValue = `${startYear}/${startMonth}/${startDay} ${startHour}:${startMinute}-${endHour}:${endMinute}`;
                                        } else {
                                            // 跨天的情况，分别显示日期
                                            cellValue = `${startYear}/${startMonth}/${startDay} ${startHour}:${startMinute}-${endYear}/${endMonth}/${endDay} ${endHour}:${endMinute}`;
                                        }
                                    } else {
                                        // 使用默认的小时区间
                                        const year = date.getFullYear();
                                        const month = (date.getMonth() + 1).toString().padStart(2, '0');
                                        const day = date.getDate().toString().padStart(2, '0');
                                        const hour = date.getHours();
                                        const nextHour = (hour + 1) % 24;
                                        cellValue = `${year}/${month}/${day} ${hour.toString().padStart(2, '0')}:00-${nextHour.toString().padStart(2, '0')}:00`;
                                    }
                                }
                            }
                        } else if (sortConfig[j] === "F") {
                            // 按班次统计，格式化为 yy/mm/ddD或yy/mm/ddN
                            if (cellValue) {
                                const date = new Date(cellValue);
                                if (!isNaN(date.getTime())) {
                                    const year = date.getFullYear();
                                    const month = (date.getMonth() + 1).toString().padStart(2, '0');
                                    const day = date.getDate().toString().padStart(2, '0');
                                    const hour = date.getHours();
                                    const shift = hour >= 8 && hour < 20 ? 'D' : 'N';
                                    cellValue = `${year}/${month}/${day}${shift}`;
                                }
                            }
                        }
                        
                        tableRow.push(cellValue);
                    }
                    
                    rows.push(tableRow);
                }
            }
            
            // 数据排序
            rows.sort((a, b) => {
                // 第一优先：GroupbyConfig[i][3][n] = "T"的列
                for (let i = 0; i < dataColumns.length; i++) {
                    if (sortConfig[i] === "T") {
                        const aValue = a[i];
                        const bValue = b[i];
                        if (aValue !== bValue) {
                            return aValue.localeCompare(bValue);
                        }
                    }
                }
                
                // 第二优先：GroupbyConfig[i][3][n] != 3的列
                for (let i = 0; i < dataColumns.length; i++) {
                    if (sortConfig[i] !== "3") {
                        const aValue = a[i];
                        const bValue = b[i];
                        if (aValue !== bValue) {
                            return aValue.localeCompare(bValue);
                        }
                    }
                }
                
                return 0;
            });
            
            // 处理Q列的序号替换
            const qColumns = [];
            for (let i = 0; i < dataColumns.length; i++) {
                if (sortConfig[i] === "Q") {
                    qColumns.push(i);
                }
            }
            
            if (qColumns.length > 0) {
                // 找出所有非3非Q的列
                const keyColumns = [];
                for (let i = 0; i < dataColumns.length; i++) {
                    if (sortConfig[i] !== "3" && sortConfig[i] !== "Q") {
                        keyColumns.push(i);
                    }
                }
                
                if (keyColumns.length > 0) {
                    // 按组合分组
                    const groups = {};
                    rows.forEach((row, index) => {
                        const key = keyColumns.map(col => row[col]).join('|');
                        if (!groups[key]) {
                            groups[key] = [];
                        }
                        groups[key].push(index);
                    });
                    
                    // 为每个组合分配序号
                    Object.values(groups).forEach(group => {
                        group.forEach((rowIndex, seq) => {
                            const sequence = seq + 1; // 1-组合个数
                            qColumns.forEach(qCol => {
                                rows[rowIndex][qCol] = sequence.toString();
                            });
                        });
                    });
                }
            }
            
            // 按组合分组计算CPK
            const keyColumns = [];
            for (let i = 0; i < dataColumns.length; i++) {
                if (sortConfig[i] !== "3" && sortConfig[i] !== "Q") {
                    keyColumns.push(i);
                }
            }
            
            const cpkGroups = {};
            rows.forEach((row, index) => {
                const key = keyColumns.map(col => row[col]).join('|');
                if (!cpkGroups[key]) {
                    cpkGroups[key] = {
                        keyValues: keyColumns.map(col => row[col]),
                        data: []
                    };
                }
                cpkGroups[key].data.push(row);
            });
            
            // 计算每个组合的CPK
            const cpkResults = [];
            Object.values(cpkGroups).forEach(group => {
                const resultRow = [];
                
                // 填充非3列的值
                for (let i = 0; i < dataColumns.length; i++) {
                    if (sortConfig[i] !== "3") {

        // 计算CP值
        function calculateCP() {
            const fixtureIndex = parseInt(document.getElementById('fixtureSelect').value) || 0;
            const groupbyConfig = GroupbyConfig[fixtureIndex];
            if (!groupbyConfig || !groupbyConfig[0]) return;
            
            const dataColumns = groupbyConfig[0];
            const sortConfig = groupbyConfig[3] || [];
            const specLimits = groupbyConfig[4] || [];
            
            // 处理数据行（从第2行开始）

                for (let i = 0; i < processedData.data.length; i++) {
                    const rowData = processedData.data[i];
                    const tableRow = [];
                    
                    for (let j = 0; j < dataColumns.length; j++) {
                        const columnIndex = parseInt(dataColumns[j]) - 1; // 转换为0-based索引
                        let cellValue = rowData[columnIndex] || '';
                        
                        // 处理H和F类型的列
                        if (sortConfig[j] === "H") {
                            // 按小时统计，格式化为 yy/mm/dd hh:00-(hh+1):00
                            if (cellValue) {
                                const date = new Date(cellValue);
                                if (!isNaN(date.getTime())) {
                                    const year = date.getFullYear();
                                    const month = (date.getMonth() + 1).toString().padStart(2, '0');
                                    const day = date.getDate().toString().padStart(2, '0');
                                    const hour = date.getHours();
                                    const nextHour = (hour + 1) % 24;
                                    cellValue = `${year}/${month}/${day} ${hour.toString().padStart(2, '0')}:00-${nextHour.toString().padStart(2, '0')}:00`;
                                }
                            }
                        } else if (sortConfig[j] === "F") {
                            // 按班次统计，格式化为 yy/mm/ddD或yy/mm/ddN
                            if (cellValue) {
                                const date = new Date(cellValue);
                                if (!isNaN(date.getTime())) {
                                    const year = date.getFullYear();
                                    const month = (date.getMonth() + 1).toString().padStart(2, '0');
                                    const day = date.getDate().toString().padStart(2, '0');
                                    const hour = date.getHours();
                                    const shift = hour >= 8 && hour < 20 ? 'D' : 'N';
                                    cellValue = `${year}/${month}/${day}${shift}`;
                                }
                            }
                        }
                        
                        tableRow.push(cellValue);
                    }
                    
                    rows.push(tableRow);
                }
            }
            
            // 数据排序
            rows.sort((a, b) => {
                // 第一优先：GroupbyConfig[i][3][n] = "T"的列
                for (let i = 0; i < dataColumns.length; i++) {
                    if (sortConfig[i] === "T") {
                        const aValue = a[i];
                        const bValue = b[i];
                        if (aValue !== bValue) {
                            return aValue.localeCompare(bValue);
                        }
                    }
                }
                
                // 第二优先：GroupbyConfig[i][3][n] != 3的列
                for (let i = 0; i < dataColumns.length; i++) {
                    if (sortConfig[i] !== "3") {
                        const aValue = a[i];
                        const bValue = b[i];
                        if (aValue !== bValue) {
                            return aValue.localeCompare(bValue);
                        }
                    }
                }
                
                return 0;
            });
            
            // 处理Q列的序号替换
            const qColumns = [];
            for (let i = 0; i < dataColumns.length; i++) {
                if (sortConfig[i] === "Q") {
                    qColumns.push(i);
                }
            }
            
            if (qColumns.length > 0) {
                // 找出所有非3非Q的列
                const keyColumns = [];
                for (let i = 0; i < dataColumns.length; i++) {
                    if (sortConfig[i] !== "3" && sortConfig[i] !== "Q") {
                        keyColumns.push(i);
                    }
                }
                
                if (keyColumns.length > 0) {
                    // 按组合分组
                    const groups = {};
                    rows.forEach((row, index) => {
                        const key = keyColumns.map(col => row[col]).join('|');
                        if (!groups[key]) {
                            groups[key] = [];
                        }
                        groups[key].push(index);
                    });
                    
                    // 为每个组合分配序号
                    Object.values(groups).forEach(group => {
                        group.forEach((rowIndex, seq) => {
                            const sequence = seq + 1; // 1-组合个数
                            qColumns.forEach(qCol => {
                                rows[rowIndex][qCol] = sequence.toString();
                            });
                        });
                    });
                }
            }
            
            // 按组合分组计算CP
            const keyColumns = [];
            for (let i = 0; i < dataColumns.length; i++) {
                if (sortConfig[i] !== "3" && sortConfig[i] !== "Q") {
                    keyColumns.push(i);
                }
            }
            
            const cpGroups = {};
            rows.forEach((row, index) => {
                const key = keyColumns.map(col => row[col]).join('|');
                if (!cpGroups[key]) {
                    cpGroups[key] = {
                        keyValues: keyColumns.map(col => row[col]),
                        data: []
                    };
                }
                cpGroups[key].data.push(row);
            });
            
            // 计算每个组合的CP
            const cpResults = [];

                const resultRow = [];
                
                // 填充非3列的值
                for (let i = 0; i < dataColumns.length; i++) {
                    if (sortConfig[i] !== "3") {
                        if (sortConfig[i] === "Q") {
                            // Q列显示组合内数据的个数
                            resultRow.push(group.data.length.toString());
                        } else {
                            const keyIndex = keyColumns.indexOf(i);
                            if (keyIndex >= 0) {
                                resultRow.push(group.keyValues[keyIndex]);
                            } else {
                                resultRow.push('');
                            }
                        }
                    } else {
                        // 计算CP
                        const specLimit = specLimits[i] || '';
                        const [lower, upper] = specLimit.split('~').map(val => parseFloat(val)).filter(val => !isNaN(val));
                        
                        if (lower !== undefined && upper !== undefined) {
                            // 收集该列的数据
                            const values = group.data.map(row => parseFloat(row[i])).filter(val => !isNaN(val));
                            if (values.length > 0) {
                                const cp = calculateCPValue(values, lower, upper);
                                resultRow.push(cp.toFixed(3));
                            } else {
                                resultRow.push('');
                            }
                        } else {
                            resultRow.push('');
                        }
                    }
                }
                
                cpResults.push(resultRow);
            });
            
            // 生成CP表格
            generateCPKTable(cpResults);
        }
        
        // 计算单个CPK值
        function calculateCPKValue(values, lower, upper) {
            // 计算均值
            const mean = values.reduce((sum, val) => sum + val, 0) / values.length;
            
            // 计算标准差
            const squaredDifferences = values.map(val => Math.pow(val - mean, 2));
            const variance = squaredDifferences.reduce((sum, val) => sum + val, 0) / (values.length - 1);
            const stdDev = Math.sqrt(variance);
            
            // 计算CPK
            const cpl = (mean - lower) / (3 * stdDev);
            const cpu = (upper - mean) / (3 * stdDev);
            const cpk = Math.min(cpl, cpu);
            
            return cpk;
        }
        
        // 计算单个CP值
        function calculateCPValue(values, lower, upper) {
            // 计算标准差
            const mean = values.reduce((sum, val) => sum + val, 0) / values.length;
            const squaredDifferences = values.map(val => Math.pow(val - mean, 2));
            const variance = squaredDifferences.reduce((sum, val) => sum + val, 0) / (values.length - 1);
            const stdDev = Math.sqrt(variance);
            
            // 计算CP
            const cp = (upper - lower) / (6 * stdDev);
            
            return cp;
        }
        
        // 绘制箱型图
        function drawBoxplot(canvas, data, fillColor, lineColor, lowerLimit, upperLimit) {
            if (!data || data.length === 0) return;
            
            // 设置默认颜色
            fillColor = fillColor || '#E0E0E0';
            lineColor = lineColor || '#333';
            
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            
            // 清空画布
            ctx.clearRect(0, 0, width, height);
            
            // 计算箱型图所需的统计值
            const sortedData = data.sort((a, b) => a - b);
            const n = sortedData.length;
            
            // 计算四分位数（使用线性插值方法）
            // Q1计算：(n+1)×0.25
            const q1Pos = (n + 1) * 0.25;
            const q1Index = Math.floor(q1Pos);
            const q1Fraction = q1Pos - q1Index;
            //const q1 = q1Index < n ? sortedData[q1Index - 1] + q1Fraction * (sortedData[q1Index] - sortedData[q1Index - 1]) : sortedData[n - 1];
            const q1 = sortedData[q1Index - 1] + q1Fraction * (sortedData[q1Index] - sortedData[q1Index - 1]);
            //console.log(q1);
            
            // 中位数计算：(n+1)×0.5
            const q2Pos = (n + 1) * 0.5;
            const q2Index = Math.floor(q2Pos);
            const q2Fraction = q2Pos - q2Index;
            //const q2 = q2Index < n ? sortedData[q2Index - 1] + q2Fraction * (sortedData[q2Index] - sortedData[q2Index - 1]) : sortedData[n - 1];
            const q2 = sortedData[q2Index - 1] + q2Fraction * (sortedData[q2Index] - sortedData[q2Index - 1]);
            
            // Q3计算：(n+1)×0.75
            const q3Pos = (n + 1) * 0.75;
            const q3Index = Math.floor(q3Pos);
            const q3Fraction = q3Pos - q3Index;
            //const q3 = q3Index < n ? sortedData[q3Index - 1] + q3Fraction * (sortedData[q3Index] - sortedData[q3Index - 1]) : sortedData[n - 1];
            const q3 = sortedData[q3Index - 1] + q3Fraction * (sortedData[q3Index] - sortedData[q3Index - 1]);
            const iqr = q3 - q1;
            const lowerBound = q1 - 1.5 * iqr;
            const upperBound = q3 + 1.5 * iqr;
            
            // 确定须线的实际端点
            // 须线下端点：> lowerBound 中最小的一个数
            let whiskerMin = sortedData[0];
            for (let i = 0; i < sortedData.length; i++) {
                if (sortedData[i] > lowerBound) {
                    whiskerMin = sortedData[i];
                    break;
                }
            }
            
            // 须线上端点：< upperBound 中最大的一个数
            let whiskerMax = sortedData[sortedData.length - 1];
            for (let i = sortedData.length - 1; i >= 0; i--) {
                if (sortedData[i] < upperBound) {
                    whiskerMax = sortedData[i];
                    break;
                }
            }
            
            // 确定数据范围
            let min = Math.min(...data);
            let max = Math.max(...data);
            
            // 如果有上下限，调整数据范围
            if (lowerLimit !== undefined) {
                min = lowerLimit;
            }
            if (upperLimit !== undefined) {
                max = upperLimit;
            }
            
            const dataRange = max - min;
            
            // 映射函数：将数据值映射到画布坐标
            function mapValue(value) {
                return height - 5 - ((value - min) / dataRange) * (height - 10);
            }
            

            
            // 绘制箱型图
            const boxX = (width - 30) / 2;
            const boxWidth = 30;
            
            // 绘制上限和下限横线
            if (lowerLimit !== undefined) {
                ctx.beginPath();
                ctx.moveTo(0, mapValue(lowerLimit));
                ctx.lineTo(width, mapValue(lowerLimit));
                ctx.strokeStyle = '#FF0000';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            if (upperLimit !== undefined) {
                ctx.beginPath();
                ctx.moveTo(0, mapValue(upperLimit));
                ctx.lineTo(width, mapValue(upperLimit));
                ctx.strokeStyle = '#FF0000';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 绘制中线（上限+下限)/2
                if (lowerLimit !== undefined) {
                    const midLine = (parseFloat(lowerLimit) + parseFloat(upperLimit)) / 2;
                    ctx.beginPath();
                    ctx.moveTo(0, mapValue(midLine));
                    ctx.lineTo(width, mapValue(midLine));
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
            
            // 绘制 whiskers
            ctx.beginPath();
            ctx.moveTo(boxX + boxWidth / 2, mapValue(whiskerMin));
            ctx.lineTo(boxX + boxWidth / 2, mapValue(q1));
            ctx.moveTo(boxX + boxWidth / 2, mapValue(q3));
            ctx.lineTo(boxX + boxWidth / 2, mapValue(whiskerMax));
            ctx.strokeStyle = lineColor;
            ctx.lineWidth = 1;
            ctx.stroke();
            
            // 绘制底点横线
            ctx.beginPath();
            ctx.moveTo(boxX + boxWidth/2 - 5, mapValue(whiskerMin));
            ctx.lineTo(boxX + boxWidth/2 + 5, mapValue(whiskerMin));
            ctx.strokeStyle = lineColor;
            ctx.lineWidth = 1;
            ctx.stroke();
            
            // 绘制顶点横线
            ctx.beginPath();
            ctx.moveTo(boxX + boxWidth/2 - 5, mapValue(whiskerMax));
            ctx.lineTo(boxX + boxWidth/2 + 5, mapValue(whiskerMax));
            ctx.strokeStyle = lineColor;
            ctx.lineWidth = 1;
            ctx.stroke();
            
            // 绘制箱体
            ctx.beginPath();
            ctx.rect(boxX, mapValue(q3), boxWidth, mapValue(q1) - mapValue(q3));
            ctx.fillStyle = fillColor;
            ctx.fill();
            ctx.strokeStyle = lineColor;
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 绘制中位数
            ctx.beginPath();
            ctx.moveTo(boxX, mapValue(q2));
            ctx.lineTo(boxX + boxWidth, mapValue(q2));
            ctx.strokeStyle = lineColor;
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 绘制异常值：> upperBound 和 <lowerBound 的数
            data.forEach(value => {
                if (value < lowerBound || value > upperBound) {
                    ctx.beginPath();
                    ctx.arc(boxX + boxWidth / 2, mapValue(value), 3, 0, Math.PI * 2);
                    ctx.fillStyle = lineColor;
                    ctx.fill();
                }
            });
            
            // 返回须线端点值
            return { whiskerMin, whiskerMax, q1, q3, lowerBound, upperBound };
        }

        // 全局时间格式化函数（从LineChart中提取）
        function formatTimestamp(timestamp) {
            if (!timestamp) return timestamp;
            
            const date = new Date(timestamp);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const hours = date.getHours();
            const minutes = date.getMinutes().toString().padStart(2, '0');
            const seconds = Math.floor(date.getSeconds() + date.getMilliseconds()/1000).toString().padStart(2, '0');
            
            return `${year}/${month}/${day} ${hours}:${minutes}:${seconds}`;
        }

        // 自动检测时间格式并格式化的函数（用于ScatterChart）
        function autoFormatTimestamp(timestamp) {
            if (!timestamp) return timestamp;
            
            // 检查是否为日期格式 (包含年月日)
            const timestampStr = String(timestamp);
            if (timestampStr.includes('-') && timestampStr.length >= 8) { // 可能是 YYYY-MM-DD 格式
                const dateParts = timestampStr.split('-');
                if (dateParts.length === 3 && dateParts[0].length === 4) {
                    // 格式化为 yyyy/m/d 格式 (类似 LineChart 的 daily mode)
                    return formatTimestamp(timestamp, true);
                }
            }
            
            // 检查是否为小时格式 (纯数字)
            const hour = parseFloat(timestamp);
            if (!isNaN(hour) && isFinite(hour)) {
                // 格式化为 hour:00-hour+1:00 (类似 LineChart 的 hourly mode)
                return formatTimestamp(timestamp, false);
            }
            
            // 如果以上都不匹配，返回原始值
            return timestamp;
        }

        // 解析筛选条件中的时间范围
        function parseTimeRangeFromFilters() {
            // 获取前5个筛选条件
            const filters = filterInputs.slice(0, 5);
            const timeRanges = {};
            
            filters.forEach(input => {
                const value = input.value.trim();
                if (!value || !value.startsWith('@')) return;
                
                const conditionStr = value.substring(1);
                const columnMatch = conditionStr.match(/^\d+/);
                if (!columnMatch) return;
                
                const columnIndex = parseInt(columnMatch[0]) - 1;
                const conditionsPart = conditionStr.substring(columnMatch[0].length);
                if (!conditionsPart) return;
                
                const conditions = conditionsPart.split('&').filter(c => c.trim());
                conditions.forEach(cond => {
                    const operators = ['<=', '>=', '!=', '=', '>', '<'];
                    let operator = null;
                    let val = null;
                    
                    for (const op of operators) {
                        if (cond.startsWith(op)) {
                            operator = op;
                            val = cond.substring(op.length).trim();
                            break;
                        }
                    }
                    
                    if (!operator || !val) return;
                    
                    // 尝试将值转换为日期
                    const date = new Date(val);
                    if (isNaN(date.getTime())) return;
                    
                    if (!timeRanges[columnIndex]) {
                        timeRanges[columnIndex] = { min: null, max: null };
                    }
                    
                    // 根据操作符更新时间范围
                    if (operator === '>' || operator === '>=') {
                        if (!timeRanges[columnIndex].min || date > timeRanges[columnIndex].min) {
                            timeRanges[columnIndex].min = date;
                        }
                    } else if (operator === '<' || operator === '<=') {
                        if (!timeRanges[columnIndex].max || date < timeRanges[columnIndex].max) {
                            timeRanges[columnIndex].max = date;
                        }
                    }
                });
            });
            
            // 筛选出有完整时间范围的列
            const validTimeRanges = {};
            Object.keys(timeRanges).forEach(columnIndex => {
                const range = timeRanges[columnIndex];
                if (range.min && range.max) {
                    validTimeRanges[columnIndex] = range;
                }
            });
            
            return validTimeRanges;
        }
        
        // 计算时间范围的间隔（分钟）
        function calculateTimeRangeDuration(range) {
            if (!range || !range.min || !range.max) return 0;
            const durationMs = range.max.getTime() - range.min.getTime();
            return Math.round(durationMs / (1000 * 60));
        }

        // 班次分类函数
        function displayinshift(dateObj, timestamp) {
            let category = '';
            let displayDate = '';
            if (dateObj && !isNaN(dateObj.getTime())) {
                const hours = dateObj.getHours();
                const year = dateObj.getFullYear();
                const month = dateObj.getMonth() + 1;
                const day = dateObj.getDate();
                
                if (hours >= 8 && hours < 20) {
                    // 8:00-20:00 显示为当天的日期+D
                    category = 'D';
                    //displayDate = `${year}/${month}/${day}`;
                    displayDate = `${month}/${day}`;
                } else if (hours >= 0 && hours < 8) {
                    // 0:00-8:00 显示为前一天的日期+N
                    category = 'N';
                    const prevDate = new Date(dateObj);
                    prevDate.setDate(prevDate.getDate() - 1);
                    const prevYear = prevDate.getFullYear();
                    const prevMonth = prevDate.getMonth() + 1;
                    const prevDay = prevDate.getDate();
                    //displayDate = `${prevYear}/${prevMonth}/${prevDay}`;
                    displayDate = `${prevMonth}/${prevDay}`;
                } else if (hours >= 20 && hours < 24) {
                    // 20:00-24:00 显示为当天的日期+N
                    category = 'N';
                    //displayDate = `${year}/${month}/${day}`;
                    displayDate = `${month}/${day}`;
                }
            } else {
                // 如果日期无效，使用原始时间戳作为key
                category = 'D';
                displayDate = timestamp;
            }
            
            return { category, displayDate };
        }

        // CT计算函数
        function TTCalculation() {
            // 获取当前选中的fixture索引
            const selectedIndex = parseInt(fixtureSelect.value) || 0;
            const fixtureConfig = fixtureConfigs[selectedIndex];
            
            // 检查是否需要计算CT
            if (!fixtureConfig || fixtureConfig[15] !== '1') {
                return;
            }
            
            // 获取配置列索引
            const timestampColumnIndex = parseInt(timestampColumnInput.value.trim()) - 1;
            const productColumnIndex = parseInt(productColumnInput.value.trim()) - 1; // 产品名称列索引
            const effectCTColumnIndex = parseInt(effectCTColumnInput.value.trim()) - 1; // EffectCT列索引
            //console.log(timestampColumnIndex, productColumnIndex, effectCTColumnIndex);
            
            if (isNaN(timestampColumnIndex) || isNaN(productColumnIndex) || isNaN(effectCTColumnIndex)) {
                console.error('时间戳列、产品名称列或Effect CT列索引无效');
                return;
            }
            
            // 检查是否有数据
            if (!originalData || !originalData.data || originalData.data.length === 0) {
                console.error('没有数据可处理');
                return;
            }
            
            // 复制数据以避免修改原始数据
            const data = [...originalData.data];
            
            // 记录每个产品最后一次出现的时间戳值
            const productLastTimestamp = {};
            
            // 解析保留列，找到产品名称、时间戳和Effect CT在原始数据中的实际位置
            let actualProductColumnIndex = productColumnIndex;
            let actualTimestampColumnIndex = timestampColumnIndex;
            let actualEffectCTColumnIndex = effectCTColumnIndex;
            const keepColumns = fixtureConfig[0];
            if (keepColumns) {
                const keepColumnArray = keepColumns.split('&');
                
                // 处理产品列
                if (productColumnIndex >= 0 && productColumnIndex < keepColumnArray.length) {
                    const originalColumnStr = keepColumnArray[productColumnIndex];
                    actualProductColumnIndex = parseInt(originalColumnStr) - 1; // 转换为0-based
                }
                
                // 处理时间戳列
                if (timestampColumnIndex >= 0 && timestampColumnIndex < keepColumnArray.length) {
                    const originalColumnStr = keepColumnArray[timestampColumnIndex];
                    actualTimestampColumnIndex = parseInt(originalColumnStr) - 1; // 转换为0-based
                }
                
                // 处理Effect CT列
                if (effectCTColumnIndex >= 0 && effectCTColumnIndex < keepColumnArray.length) {
                    const originalColumnStr = keepColumnArray[effectCTColumnIndex];
                    actualEffectCTColumnIndex = parseInt(originalColumnStr) - 1; // 转换为0-based
                }
            }
               
            // 遍历数据行
            for (let i = 0; i < data.length; i++) {
                const row = data[i];
                             
                // 获取产品名称和时间戳
                const productName = row[actualProductColumnIndex];
                const timestampStr = row[actualTimestampColumnIndex];
                
                // 正确解析时间戳字符串为时间戳数值
                let currentTimestamp = 0;
                if (timestampStr) {
                    const dateObj = new Date(timestampStr);
                    currentTimestamp = dateObj.getTime() / (1000 * 60 * 60 * 24); // 转换为天
                }
                
                let ttValue = 0;
                
                // 计算时间差（天）并转换为秒
                const timestampDiff = currentTimestamp - productLastTimestamp[productName];
                ttValue = timestampDiff * 24 * 3600;
                ttValue = parseFloat(ttValue.toFixed(3));
                // 更新产品最后一次的时间戳值
                productLastTimestamp[productName] = currentTimestamp;

                // 将TT值写入Effect CT列进行覆盖
                row[actualEffectCTColumnIndex] = ttValue;
            }
            
            // 更新列头，将Effect CT列替换为TT
            const updatedHeaders = [...originalData.headers];
            if (actualEffectCTColumnIndex >= 0 && actualEffectCTColumnIndex < updatedHeaders.length) {
                updatedHeaders[actualEffectCTColumnIndex] = 'TT';
            }
            
            // 更新原始数据
            originalData = {
                ...originalData,
                headers: updatedHeaders,
                data: data
            };
                        
        }
        
        // 处理文件上传
        function handleFile(file) {
            const ext = file.name.toLowerCase();
            if (!ext.endsWith('.csv') && !ext.endsWith('.txt')) {
                showUploadError('文件格式错误, 请重新上传csv或txt文件');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const content = e.target.result;
                    const { headers, data } = parseCSV(content);
                    
                    originalData = {
                        headers: [...headers],
                        data: [...data],
                        fileName: file.name
                    };
                    
                    showUploadSuccess(`${file.name}已加载，有${data.length + 1}行数据`);
                    
                    // 上传成功后启用分析数据和清空数据按钮
                    if (generateBtn) {

                        generateBtn.style.color = 'white';

        // 解析CSV
        function parseCSV(content) {
            const lines = content.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
            const headers = lines[0] ? lines[0].split(',').map(cell => cell.trim()) : [];
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const row = lines[i].split(',').map(cell => cell.trim());
                // 检查是否所有单元格都为空
                const hasNonEmptyCell = row.some(cell => cell !== '');
                if (hasNonEmptyCell) {
                    data.push(row);
                }
            }
            
            return { headers, data };
        }

        // 生成NG/FAIL数据表格
        function generateNGTable(headers, data) {
            if (!headers || !data) {
                return;
            }
            
            // 获取配置列索引
            const resultColumnIndex = parseInt(resultColumnInput.value.trim()) - 1;
            const timestampColumnIndex = parseInt(timestampColumnInput.value.trim()) - 1;
            const snColumnIndex = 0; // 处理过后数据的第一列作为SN
            const productColumnIndex = parseInt(productColumnInput.value.trim()) - 1; // 产品名称列索引
            const effectCTColumnIndex = parseInt(effectCTColumnInput.value.trim()) - 1; // EffectCT列索引
            
            // 获取当前选中的产品 - 直接使用全局变量currentProduct
            const selectedProduct = currentProduct || '';
            
            // 筛选结果列为NG或FAIL的数据，并且产品名称等于当前选中产品的数据
            const ngData = data.filter((row, index) => {
                // 首先检查结果列是否为NG或FAIL
                if (resultColumnIndex < 0 || resultColumnIndex >= row.length) {
                    return false;
                }
                const resultValue = (row[resultColumnIndex] || '').trim();
                const resultNum = parseFloat(resultValue);
                const isNumeric = !isNaN(resultNum);
                
                // 判断是否为NG：数值类型非0为NG，非数值类型FAIL/NG为NG，其它为NG
                let isNG = false;
                if (isNumeric) {
                    // 数值类型：非0视为NG
                    isNG = resultNum !== 0;
                } else {
                    // 非数值类型：FAIL/NG视为NG，其它视为NG
                    const resultValueUpper = resultValue.toUpperCase();
                    isNG = resultValueUpper !== 'PASS' && resultValueUpper !== 'OK';
                }
                
                // 如果没有选中产品，则不过滤产品
                if (!selectedProduct) {
                    return isNG;
                }
                
                // 如果有选中产品，则还需要检查产品名称是否匹配
                if (productColumnIndex < 0 || productColumnIndex >= row.length) {
                    return isNG;
                }
                const productValue = (row[productColumnIndex] || '').trim();
                const productMatch = productValue === selectedProduct;
                const result = isNG && productMatch;

            // 获取showNG元素

            // 处理日期数据合并逻辑

                        // 对秒数进行向下取整（考虑毫秒部分）
                        const seconds = Math.floor(dateObj.getSeconds() + dateObj.getMilliseconds()/1000);
                        timestamp = `${year}/${month}/${day} ${hours}:${minutes}:${seconds.toString().padStart(2, '0')}`;
                    } else {

                }
                
                // 获取SN（第一列）

                // 根据小时数确定分类

                // 保存SN和对应的时间信息

                mergedData[mergeKey].sns.push({sn: sn, time: timeStr, timestamp: timestampValue, result: resultValue});

                }
                
                // 查找时间戳对应的索引
                let timestampIndex = -1;

                    timestampIndex = CCExtraInfo.findIndex(info => {
                        // 将时间戳转换为可比较的格式
                        const infoDate = new Date(info.timestamp);
                        const timestampDate = new Date(timestampValue);
                        
                        // 使用更宽松的匹配方式，允许一定的时间差（毫秒级别）
                        return Math.abs(infoDate.getTime() - timestampDate.getTime()) < 1000; // 1秒内的差异都认为是匹配的
                    });
                }
                
                if (timestampIndex === -1) {
                    //console.error('未找到对应的时间戳:', timestampValue, '在散点图系列:', seriesIndex + 1);
                    continue;

                // 查找对应索引的点在图表中的位置

                }

                    left: ${targetPoint.canvasX - 6}px; /* 减去半径以使中心对齐 */
                    top: ${targetPoint.canvasY - 6}px;  /* 减去半径以使中心对齐 */

        // 从散点图中移除高亮显示框
        function removeHighlightFromScatterChart(timestampValue) {

                const highlightDiv = CCScatterHighlightElements.get(key);

        function addHighlightToLineChart(timestampValue) {
