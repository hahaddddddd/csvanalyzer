<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>在线表格数据库（无跨域版）</title>
    <style>
        body {
            padding: 30px;
            font-size: 18px;
            font-family: "Microsoft YaHei", sans-serif;
        }
        .box {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        strong { color: #007bff }
    </style>
</head>
<body>
    <h3>📊 在线表格实时数据</h3>
    <div id="status">加载中...</div>
    <div class="box" id="result"></div>

    <script>
        // 你的金山文档
        const KDOCS_URL = "https://www.kdocs.cn/l/cc0fZ8sXvleI/export/csv";
        
        // ✅ 免费公共代理（解决所有跨域）
        const PROXY = "https://api.allorigins.win/get?url=" + encodeURIComponent(KDOCS_URL);

        fetch(PROXY)
            .then(res => res.json())
            .then(data => {
                const csvText = data.contents;

                // 拆分表格
                const lines = csvText
                    .split(/\r?\n/)
                    .filter(line => line.trim() !== '');

                // 你要的单元格
                const row3 = lines[2]?.split(",") || [];
                const row7 = lines[6]?.split(",") || [];

                const val1 = row3[6] || "无数据";
                const val2 = row7[0] || "无数据";

                document.getElementById("status").textContent = "✅ 读取成功";
                document.getElementById("result").innerHTML = `
                    <p>第 3 行 第 7 列：<strong>${val1}</strong></p>
                    <p>第 7 行 第 1 列：<strong>${val2}</strong></p>
                `;
            })
            .catch(err => {
                document.getElementById("status").textContent = "❌ 加载失败";
                document.getElementById("result").innerHTML = "请确认表格已开启「任何人可查看」";
                console.error(err);
            });
    </script>
</body>
</html>
