                            tooltipContent += `SN: ${snValue}`;
                            tooltipContent += `</div>`;
                            
                            // 只显示一次时间
                            tooltipContent += `<div>`;
                            tooltipContent += `时间: ${chart.labels[index]}`;
                            tooltipContent += `</div>`;
                            
                            // 为选中的数据集显示其名称和对应的参数值
                            chart.datasets.forEach((dataset, datasetIndex) => {
                                const value = dataset.data[index];
                                // 只显示当前选中的图例数据
                                if (selectedDatasets[datasetIndex] && value !== null && value !== undefined) {
                                    tooltipContent += `<div>`;
                                    tooltipContent += `${dataset.label}: ${value.toFixed(parseInt(chartTitles.decimalPlace))}`;
                                    tooltipContent += `</div>`;
                                }
                            });
                            
                            customTooltip.innerHTML = tooltipContent;
                            
                            // 设置tooltip位置，参考容器边界
                            const productContainerRect = productContainer.getBoundingClientRect();
                            let tooltipX = event.clientX - productContainerRect.left + 10;
                            let tooltipY = event.clientY - productContainerRect.top + 10;
                            
                            const tooltipRect = customTooltip.getBoundingClientRect();
                            
                            // 检查是否会超出右边界
                            if (tooltipX + tooltipRect.width > productContainerRect.width) {
                                tooltipX = event.clientX - productContainerRect.left - tooltipRect.width - 10;
                            }
                            
                            // 检查是否会超出上边界
                            if (tooltipY < 0) {
                                tooltipY = event.clientY - productContainerRect.top + 10;
                            }
                            
                            // 检查是否会超出下边界
                            if (tooltipY + tooltipRect.height > productContainerRect.height) {
                                tooltipY = event.clientY - productContainerRect.top - tooltipRect.height - 10;
                            }
                            
                            customTooltip.style.left = `${tooltipX}px`;
                            customTooltip.style.top = `${tooltipY}px`;
                            customTooltip.style.display = 'block';
                            customTooltip.style.opacity = '1';
                        } else {
                            VerticalLine.style.display = 'none';
                            customTooltip.style.display = 'none';
                        }
                    }
                });
                
                // 鼠标离开事件处理
                canvas.addEventListener('mouseleave', function() {
                    VerticalLine.style.display = 'none';
                    customTooltip.style.display = 'none';
                });
                
                // 保存图表实例
                if (!window.parameterCharts) {
                    window.parameterCharts = {};
                }
                window.parameterCharts[product] = chart;
        }
        
        // 根据CSV数据中实际存在的产品自动设置产品按钮active状态
        function autoSetProductButtonActive() {
            if (!processedData) return;
            
            // 获取产品列索引
            const productColumnIndex = parseInt(productColumnInput.value.trim()) - 1;
            if (isNaN(productColumnIndex) || productColumnIndex < 0 || productColumnIndex >= processedData.headers.length) {
                return;
            }
            
            // 收集CSV数据中实际存在的产品
            const existingProducts = new Set();
            processedData.data.forEach(row => {
                const product = row[productColumnIndex]?.trim() || '';
                if (product) {
                    existingProducts.add(product);
                }
            });
            
            // 获取mainProductToggle元素
            const mainProductToggle = document.getElementById('mainProductToggle');
            if (!mainProductToggle) return;
            
            // 获取所有产品按钮
            const productButtons = mainProductToggle.querySelectorAll('.product-btn');
            
            // 优先选择J427（如果存在），否则选择第一个存在的产品
            let productToActivate = null;
            
            if (existingProducts.has('J527')) {
                productToActivate = 'J527';
            } else if (existingProducts.size > 0) {
                // 选择第一个存在的产品
                productToActivate = Array.from(existingProducts)[0];
            }
            
            // 设置产品按钮active状态
            productButtons.forEach(button => {
                const productName = button.textContent.trim();
                if (productName === productToActivate) {
                    button.classList.add('active');
                    // 同时更新全局产品变量
                    currentProduct = productName;
                    currentParameterProduct = productName;
                } else {
                    button.classList.remove('active');
                }
            });
        }
        
        // 生成合并的产能图表和CT图表
        function generateCombinedCharts(preSelectedProduct = null) {
            if (!processedData) {
                alert('请先生成数据表格');
                return;
            }
            
            // 获取配置列索引
            const timestampColumnIndex = parseInt(timestampColumnInput.value.trim()) - 1;
            const resultColumnIndex = parseInt(resultColumnInput.value.trim()) - 1;
            const productColumnIndex = parseInt(productColumnInput.value.trim()) - 1;
            const effectCTColumnIndex = parseInt(effectCTColumnInput.value.trim()) - 1;
            
            // 验证配置列
            if (isNaN(timestampColumnIndex) || timestampColumnIndex < 0 || timestampColumnIndex >= processedData.headers.length) {
                alert('时间戳列配置无效，请检查Fixture配置');
                return;
            }
            
            if (isNaN(resultColumnIndex) || resultColumnIndex < 0 || resultColumnIndex >= processedData.headers.length) {
                alert('结果列配置无效，请检查Fixture配置');
                return;
            }
            
            if (isNaN(productColumnIndex) || productColumnIndex < 0 || productColumnIndex >= processedData.headers.length) {
                alert('产品名称列配置无效，请检查Fixture配置');
                return;
            }
            
            if (isNaN(effectCTColumnIndex) || effectCTColumnIndex < 0 || effectCTColumnIndex >= processedData.headers.length) {
                alert('Effect CT列配置无效，请检查Fixture配置');
                return;
            }
            
            // 特殊筛选：当fixtureIndex = 0 (ALS press) 且产品为J427时，筛选结果列数据 != "NA"
            let filteredData = processedData.data;
            if (fixtureIndex === 0) {
                // 检查列索引是否有效
                if (productColumnIndex >= 0 && resultColumnIndex >= 0 && 
                    productColumnIndex < processedData.headers.length && resultColumnIndex < processedData.headers.length) {
                    
                    filteredData = processedData.data.filter(row => {
                        const productValue = (row[productColumnIndex] || '').trim();
                        const resultValue = (row[resultColumnIndex] || '').trim();
                        
                        // 如果产品是J427，则筛选结果不为"NA"的数据
                        if (productValue === 'J427') {
                            return resultValue !== 'NA';
                        }
                        // 其他产品保持不变
                        return true;
                    });
                }
            }
            
            // 提取并解析数据
            let validRecords = [];
            let invalidTimestamps = 0;
            let invalidResults = 0;
            let invalidCTValues = 0;
            let invalidProducts = 0;
            products = new Set();
            const dates = new Set();
            
            filteredData.forEach(row => {
                // 获取时间戳并验证
                const timestampStr = row[timestampColumnIndex]?.trim() || '';
                const timestamp = new Date(timestampStr);
                
                if (isNaN(timestamp.getTime())) {
                    invalidTimestamps++;
                    return;
                }
                
                // 验证时间是否在0:00-23:59范围内（全时段）
                const hour = timestamp.getHours();
                if (hour < 0 || hour >= 24) {
                    invalidTimestamps++;
                    return;
                }
                
                // 获取产品名称
                const product = row[productColumnIndex]?.trim() || '';
                if (!product) {
                    invalidProducts++;
                    return;
                }
                
                // 为统计目的创建产品分组标识
                // 每个产品独立统计，不再将Cell产品归为J527
                const productForStats = product;
                
                // 获取结果
                const result = row[resultColumnIndex]?.trim() || '';
                
                // 获取Effect CT值
                let ctValue = row[effectCTColumnIndex];
                let ctNum = 0;
                if (typeof ctValue === 'number') {
                    ctNum = ctValue;
                } else {
                    ctValue = ctValue?.trim() || '';
                    ctNum = parseFloat(ctValue);
                }
                
                // 记录日期和产品
                // 使用本地时区而不是UTC时区来避免时区偏移问题
                const year = timestamp.getFullYear();
                const month = String(timestamp.getMonth() + 1).padStart(2, '0');
                const day = String(timestamp.getDate()).padStart(2, '0');
                const dateStr = `${year}-${month}-${day}`;
                dates.add(dateStr);
                products.add(product);
                
                validRecords.push({
                    timestamp: timestamp,
                    result: result,
                    product: product, // 原始产品名称，用于显示
                    productForStats: productForStats, // 统计用的产品分组标识
                    ctValue: !isNaN(ctNum) ? ctNum : null,
                    date: dateStr
                });
            });
            
            // 显示详细错误信息
            if (validRecords.length === 0) {
                let errorMsg = '未找到有效的数据。详细原因：';
                if (invalidTimestamps > 0) errorMsg += `\n- 发现${invalidTimestamps}条无效时间戳`;
                if (invalidResults > 0) errorMsg += `\n- 发现${invalidResults}条非PASS/FAIL结果`;
                if (invalidCTValues > 0) errorMsg += `\n- 发现${invalidCTValues}条无效CT值`;
                if (invalidProducts > 0) errorMsg += `\n- 发现${invalidProducts}条无效产品名称`;
                alert(errorMsg);
                return;
            }
            
            // 检查是否是查看特定日期的数据
            let filteredRecords = validRecords;
            if (currentViewMode === 'singleDay' && currentSelectedDate) {
                filteredRecords = validRecords.filter(record => record.date === currentSelectedDate);
            }
            
            // 重新计算筛选后的天数
            const filteredDates = new Set(filteredRecords.map(record => record.date));
            const datesArray = Array.from(filteredDates).sort();
            const isMultipleDays = datesArray.length > 1;
            
            // 设置日期标题
            let chartTitlePrefix = generateChartTitlePrefix(datesArray, isMultipleDays);
            
            // 设置全局变量，供压力监控tab使用
            window.globalChartTitlePrefix = chartTitlePrefix;
            
            // 按产品统计产能和CT数据
            const productCapacityData = {};
            const productCTData = {};
            productTotalProduction = {};
            productTotalFail = {};
            
            products.forEach(product => {
                // 筛选当前产品的记录
                // 每个产品独立筛选，不再合并Cell产品与J527
                const productRecords = filteredRecords.filter(record => record.productForStats === product);
                
                if (isMultipleDays) {
                    // 多天数据，按天统计
                    productCapacityData[product] = calculateDailyPassFailCapacity(productRecords);
                    productCTData[product] = calculateDailyCTData(productRecords);
                    
                    // 计算该产品的总产量
                    const dailyData = productCapacityData[product];
                    productTotalProduction[product] = Object.values(dailyData).reduce((sum, day) => sum + day.total, 0);
                    productTotalFail[product] = Object.values(dailyData).reduce((sum, day) => sum + day.fail, 0);
                } 
                else {
                    // 单天数据，按小时统计
                    productCapacityData[product] = calculateHourlyPassFailCapacity(productRecords);
                    productCTData[product] = calculateHourlyCTData(productRecords);
                    
                    // 计算该产品的总产量
                    let total = 0;
                    for (let hour = 0; hour < 24; hour++) {
                        total += productCapacityData[product][hour].total;
                    }
                    productTotalProduction[product] = total;
                    // 计算该产品的总失败数量
                    productTotalFail[product] = 0;
                    for (let hour = 0; hour < 24; hour++) {
                        productTotalFail[product] += productCapacityData[product][hour].fail;
                    }
                }
            });
            
            // 添加ALL产品的统计，将所有产品的数据合并
            if (products.size > 1) {
                if (isMultipleDays) {
                    // 多天数据，按天统计
                    productCapacityData['ALL'] = calculateDailyPassFailCapacity(filteredRecords);
                    productCTData['ALL'] = calculateDailyCTData(filteredRecords);
                    
                    // 计算ALL产品的总产量
                    const dailyData = productCapacityData['ALL'];
                    productTotalProduction['ALL'] = Object.values(dailyData).reduce((sum, day) => sum + day.total, 0);
                    productTotalFail['ALL'] = Object.values(dailyData).reduce((sum, day) => sum + day.fail, 0);
                } else {
                    // 单天数据，按小时统计
                    productCapacityData['ALL'] = calculateHourlyPassFailCapacity(filteredRecords);
                    productCTData['ALL'] = calculateHourlyCTData(filteredRecords);
                    
                    // 计算ALL产品的总产量
                    let total = 0;
                    for (let hour = 0; hour < 24; hour++) {
                        total += productCapacityData['ALL'][hour].total;
                    }
                    productTotalProduction['ALL'] = total;
                    // 计算ALL产品的总失败数量
                    productTotalFail['ALL'] = 0;
                    for (let hour = 0; hour < 24; hour++) {
                        productTotalFail['ALL'] += productCapacityData['ALL'][hour].fail;
                    }
                }
            }
            
            // 在多天模式下，保存数据以便返回时使用
            if (isMultipleDays) {
                multiDayChartData = {
                    productCapacityData: productCapacityData,
                    productCTData: productCTData,
                    productTotalProduction: productTotalProduction,
                    chartTitlePrefix: chartTitlePrefix
                };
            }
            
            // 计算最大产能值和CT值（用于统一Y轴）
            maxCapacityValue = 0;
            maxCTValue = 0;
            
            // 先遍历所有产品
            products.forEach(product => {
                if (isMultipleDays) {
                    // 多天数据 - 按天计算最大值
                    const capData = productCapacityData[product];
                    maxCapacityValue = Math.max(maxCapacityValue, ...Object.values(capData).map(day => day.total));
                    
                    const ctData = productCTData[product];
                    maxCTValue = Math.max(maxCTValue, ...Object.values(ctData).map(day => day.avgCT));
                } else {
                    // 单天数据 - 按小时计算最大值
                    const capData = productCapacityData[product];
                    for (let hour = 0; hour < 24; hour++) {
                        if (capData[hour].total > maxCapacityValue) {
                            maxCapacityValue = capData[hour].total;
                        }
                    }
                    
                    const ctData = productCTData[product];
                    for (let hour = 0; hour < 24; hour++) {
                        if (ctData[hour].avgCT > maxCTValue) {
                            maxCTValue = ctData[hour].avgCT;
                        }
                    }
                }
            });
            
            // 再检查ALL产品的数据
            if (products.size > 1 && productCapacityData['ALL']) {
                if (isMultipleDays) {
                    // 多天数据 - 按天计算最大值
                    const capData = productCapacityData['ALL'];
                    maxCapacityValue = Math.max(maxCapacityValue, ...Object.values(capData).map(day => day.total));
                    
                    const ctData = productCTData['ALL'];
                    maxCTValue = Math.max(maxCTValue, ...Object.values(ctData).map(day => day.avgCT));
                } else {
                    // 单天数据 - 按小时计算最大值
                    const capData = productCapacityData['ALL'];
                    for (let hour = 0; hour < 24; hour++) {
                        if (capData[hour].total > maxCapacityValue) {
                            maxCapacityValue = capData[hour].total;
                        }
                    }
                    
                    const ctData = productCTData['ALL'];
                    for (let hour = 0; hour < 24; hour++) {
                        if (ctData[hour].avgCT > maxCTValue) {
                            maxCTValue = ctData[hour].avgCT;
                        }
                    }
                }
            }
            
            // 调整最大值为5或10的倍数
            maxCapacityValue = roundToNearestMultiple(maxCapacityValue * 1.1, 5);
            maxCTValue = roundToNearestMultiple(maxCTValue * 1.1, 5);
            
            // 确保CT目标值不小于最大值的1.1倍，以便在图表中可见
            products.forEach(product => {
                const targetValue = productCTTargets[product];
                if (targetValue !== null && targetValue > maxCTValue) {
                    maxCTValue = roundToNearestMultiple(targetValue * 1.1, 5);
                }
            });
            
            // 设置默认产品
            // 优先使用传入的预选择产品（如果有效）
            // 其次使用J527（如果存在）
            // 最后使用第一个产品
            if (preSelectedProduct === 'ALL' && products.size > 1) {
                currentProduct = 'ALL';
            } else if (preSelectedProduct && products.has(preSelectedProduct)) {
                currentProduct = preSelectedProduct;
            } else {
                currentProduct = Array.from(products).includes('J527') ? 'J527' : Array.from(products)[0];
            }
                    
            // 清空现有内容，但保留返回按钮和mainProductToggle在原位置
            const mainProductToggle = document.getElementById('mainProductToggle');
            const backButton = document.getElementById('backToMultiDayBtn');
            
            // 直接控制原始返回按钮的显示状态，不再克隆和重复添加
            if (backButton) {
                // 根据当前视图模式决定按钮是否显示
                if (currentViewMode === 'singleDay') {
                    backButton.style.display = '';
                }
                
                // 确保返回按钮有正确的事件监听
                // 移除可能存在的旧事件监听器，避免重复绑定
                const newBackButton = backButton.cloneNode(true);
                backButton.parentNode.replaceChild(newBackButton, backButton);
                
                // 重新绑定事件
                newBackButton.addEventListener('mouseenter', function() {
                    this.style.backgroundColor = '#1976D2';
                });
                newBackButton.addEventListener('mouseleave', function() {
                    this.style.backgroundColor = '#2196F3';
                });
                newBackButton.addEventListener('click', function() {
                    // 恢复多天汇总视图
                    currentViewMode = 'multiDay';
                    currentSelectedDate = null;
                    
                    // 隐藏返回按钮
                    this.style.display = 'none';
                    
                    // 重新生成多天图表
                    //generateCombinedCharts();
                });
            }
            
            // 使用现有的产品按钮，根据数据中的产品显示/隐藏按钮
            if (mainProductToggle) {
                // 获取现有的产品按钮
                const existingButtons = mainProductToggle.querySelectorAll('.product-btn');
                
                existingButtons.forEach(button => {
                    const productName = button.textContent.trim();
                    
                    // 特殊处理ALL按钮，始终在产能&CT tab页面中显示
                    if (productName === 'ALL') {
                        // 只在产能&CT tab页面中显示ALL按钮
                        if (currentView === 'capacity') {
                            button.style.display = 'inline-block';
                            button.className = `product-btn ${currentProduct === productName ? 'active' : ''}`;
                            
                            // 绑定点击事件到独立函数
                            button.onclick = () => {
                                handleProductButtonClick(productName);
                            };
                        } else {
                            button.style.display = 'none';
                            button.classList.remove('active');
                        }
                    } else {
                        // 检查数据集中是否包含该产品
                        if (products.has(productName)) {
                            // 显示按钮并绑定事件
                            button.style.display = '';
                            button.className = `product-btn ${currentProduct === productName ? 'active' : ''}`;
                            
                            // 绑定点击事件到独立函数
                            button.onclick = () => {
                                handleProductButtonClick(productName);
                            };
                        } else {
                            // 隐藏不存在的产品的按钮
                            button.style.display = 'none';
                            button.classList.remove('active');
                        }
                    }
                });
            }
            
            // 使用静态创建的产能图表容器
            const capacityChartWrapper = document.getElementById('capacityChartWrapper');
            // 清空容器内容
            capacityChartWrapper.style.position = 'relative';
            
            // 使用静态创建的总产量显示元素
            const totalProductionEl = document.getElementById('total-production');
            const total = productTotalProduction[currentProduct];
            const pass = total - productTotalFail[currentProduct] || total;
            const fail = productTotalFail[currentProduct] || 0;
            const yieldRate = total > 0 ? ((pass / total) * 100).toFixed(2) : '0.00';
            
            totalProductionEl.innerHTML = `
                <div>产量: ${total}</div>
                <div>NG: ${fail}</div>
                <div>良率: ${yieldRate}%</div>
            `;
            
            // 使用静态创建的CT图表容器
            const ctChartWrapper = document.getElementById('ctChartWrapper');
 
            ctChartWrapper.style.position = 'relative';

            const AverageCTEl = document.getElementById('Average-CT');
            
            // 计算CT目标值和平均值并显示
                // 如果不是J427或J527产品，使用J527的CT目标值
                const targetCurrentProduct = (currentProduct !== 'J427' && currentProduct !== 'J527') ? 'J527' : currentProduct;
                const currentTarget = productCTTargets[targetCurrentProduct] || null;
            
            // 计算CT平均值
            let totalCT = 0;
            let count = 0;
            const ctData = productCTData[currentProduct];
            for (const key in ctData) {
                if (ctData.hasOwnProperty(key) && ctData[key].avgCT > 0) {
                    totalCT += ctData[key].avgCT;
                    count++;
                }
            }
            const avgCT = count > 0 ? (totalCT / count) : 0;
            
            // 显示CT目标值和平均值
            if (AverageCTEl) {
                const targetValue = currentTarget !== null ? currentTarget.toFixed(2) : 'N/A';
                AverageCTEl.innerHTML = `
                    目标: ${targetValue}<br>
                    平均: ${avgCT.toFixed(2)}
                `;
            }
            
            // 添加CT目标线
            const ctTargetLine = document.getElementById('ct-target-line');
            ctTargetLine.style.display = 'none';
            
            // 使用静态创建的提示框元素
            const capacityTooltip = document.getElementById('total-production-tooltip');
            capacityTooltip.style.opacity = '0';
            
            const ctTooltip = document.getElementById('CT-tooltip');
            ctTooltip.style.opacity = '0';
            
            // 创建Canvas元素
            const capacityCanvas = document.getElementById('capacityChart');

            const ctCanvas = document.getElementById('ctChart');
            
            // 绘制图表
            try {
                const dpr = window.devicePixelRatio || 1;
                
                // 产能图表
                const capacityCtx = capacityCanvas.getContext('2d');
                if (capacityCtx) {
                    capacityCanvas.style.width = '1200px';
                    capacityCanvas.style.height = '330px';
                    capacityCanvas.width = 1200 * dpr;
                    capacityCanvas.height = 330 * dpr;
                    capacityCtx.scale(dpr, dpr);
                    
                    if (capacityChartInstance) capacityChartInstance.destroy();
                    
                    // 始终显示产品名
                    const displayCurrentProduct = currentProduct;
                    const initialCapacityTitle = isMultipleDays
                        ? `${chartTitlePrefix} ${displayCurrentProduct} 每天产能`
                        : `${chartTitlePrefix} ${displayCurrentProduct} 小时产能`;
                        
                    capacityChartInstance = new BarChart(
                        capacityCtx, 
                        capacityCanvas,
                        1200,
                        330,
                        productCapacityData[currentProduct],
                        initialCapacityTitle,
                        capacityTooltip,
                        '产能',
                        maxCapacityValue,
                        true,
                        null,
                        null,
                        isMultipleDays  // 修复：根据isMultipleDays设置，确保与数据统计模式匹配
                    );
                    
                    capacityChartInstance.render();
                }
                
                // CT图表 - 使用当前产品对应的目标值
                const ctCtx = ctCanvas.getContext('2d');
                if (ctCtx) {
                    ctCanvas.style.width = '1200px';
                    ctCanvas.style.height = '330px';
                    ctCanvas.width = 1200 * dpr;
                    ctCanvas.height = 330 * dpr;
                    ctCtx.scale(dpr, dpr);
                    
                    if (ctChartInstance) ctChartInstance.destroy();
                    
                    // 如果不是J427或J527产品，使用J527的CT目标值
                    const targetCurrentProduct = (currentProduct !== 'J427' && currentProduct !== 'J527') ? 'J527' : currentProduct;
                    const currentTarget = productCTTargets[targetCurrentProduct] || null;
                    // 始终显示产品名
                    const displayCurrentProduct = currentProduct;
                    const initialCTTitle = isMultipleDays
                        ? `${chartTitlePrefix} ${displayCurrentProduct} 每天EffectCT`
                        : `${chartTitlePrefix} ${displayCurrentProduct} 小时EffectCT`;
                        
                    ctChartInstance = new BarChart(
                        ctCtx, 
                        ctCanvas,
                        1200,
                        330,
                        productCTData[currentProduct],
                        initialCTTitle,
                        ctTooltip,
                        '平均EffectCT',
                        maxCTValue,
                        false,
                        currentTarget,
                        ctTargetLine,
                        isMultipleDays  // 修复：根据isMultipleDays设置，确保与数据统计模式匹配
                    );
                    
                    ctChartInstance.render();

        // 四舍五入到最接近的5或10的倍数
        function roundToNearestMultiple(value, multiple) {
            if (multiple === 0) return value;
            return Math.ceil(value / multiple) * multiple;
        }
        
        // 根据数值范围进行智能向上取整
        function smartRoundUp(value) {
            const absValue = Math.abs(value);
            let roundedValue;
            if (absValue >= 200) {
                // >200: 除以100，向上取整，再乘以100，保留1位小数
                roundedValue = Math.ceil(absValue / 100) * 100;
            } else if (absValue >= 10 && absValue < 200) {
                // >10&<200: 直接向上取整，保留1位小数
                roundedValue = Math.ceil(absValue * 10) / 10;
            } else if (absValue >= 1 && absValue < 10) {
                // >1&<10: 乘以10, 向上取整,再除以10, 保留1位小数
                roundedValue = Math.ceil(absValue * 10) / 10;
            } else {
                // >0&<10: 乘以100, 向上取整,再除以100, 保留2位小数
                roundedValue = Math.ceil(absValue * 100) / 100;
            }
            // 保留原始值的符号
            return value < 0 ? -roundedValue : roundedValue;
            
        }
        
        // 根据数值范围进行智能向下取整
        function smartRoundDown(value) {
            const absValue = Math.abs(value);
            let roundedValue;
            if (absValue >= 200) {
                // >200: 除以100，向下取整，再乘以100，保留1位小数
                roundedValue = Math.floor(absValue / 100) * 100;
            } else if (absValue >= 10 && absValue < 200) {
                // >10&<200: 直接向下取整，保留1位小数
                roundedValue = Math.floor(absValue *10) / 10;
            } else if (absValue >= 1 && absValue < 10) {
                // >1&<10: 乘以10, 向下取整,再除以10, 保留1位小数
                roundedValue = Math.floor(absValue *10) / 10;
            } else {
                // >0&<10: 乘以100, 向下取整,再除以100, 保留2位小数
                roundedValue = Math.floor(absValue * 100) / 100;
            }
            // 保留原始值的符号
            return value < 0 ? -roundedValue : roundedValue;
        }

        // 按天统计PASS/FAIL产能
        function calculateDailyPassFailCapacity(records) {
            const dailyData = {};
            
            // 初始化每天的数据
            records.forEach(record => {
                const date = record.date;
                if (!dailyData[date]) {
                    dailyData[date] = {
                        pass: 0,
                        fail: 0,
                        total: 0,
                        passRate: 0
                    };
                }
            });
            
            // 统计每天的PASS/FAIL数据
            records.forEach(record => {
                const date = record.date;
                if (dailyData[date]) {
                    // 检查结果列是否为数值类型
                    const resultNum = parseFloat(record.result);
                    const isNumeric = !isNaN(resultNum);
                    
                    if (isNumeric) {
                        // 数值类型：0视为PASS，非0视为NG
                        if (resultNum === 0) {
                            dailyData[date].pass++;
                        } else {
                            dailyData[date].fail++;
                        }
                    } else {
                        // 非数值类型：PASS/OK视为PASS，FAIL/NG视为FAIL，其它视为FAIL
                        const resultValue = record.result.trim().toUpperCase();
                        if (resultValue === 'PASS' || resultValue === 'OK') {
                            dailyData[date].pass++;
                        } else {
                            dailyData[date].fail++;
                        }
                    }
                }
            });
            
            // 计算每天的总量和良率
            Object.keys(dailyData).forEach(date => {
                const data = dailyData[date];
                data.total = data.pass + data.fail;
                data.passRate = data.total > 0 ? (data.pass / data.total) * 100 : 0;
            });
            
            return dailyData;
        }
        
        // 按天统计CT值
        function calculateDailyCTData(records) {
            const dailyData = {};
            
            // 初始化每天的数据
            records.forEach(record => {
                const date = record.date;
                if (!dailyData[date]) {
                    dailyData[date] = {
                        values: [],
                        avgCT: 0,
                        count: 0
                    };
                }
            });
            
            // 收集每天的EffectCT值
            records.forEach(record => {
                const date = record.date;
                if (dailyData[date] && record.ctValue !== null) {
                    dailyData[date].values.push(record.ctValue);
                }
            });
            
            // 计算每天的平均EffectCT值
            Object.keys(dailyData).forEach(date => {
                const data = dailyData[date];
                data.count = data.values.length;
                if (data.count > 0) {
                    const sum = data.values.reduce((acc, val) => acc + val, 0);
                    data.avgCT = sum / data.count;
                }
            });
            
            return dailyData;
        }

        // 表格排序
        function sortTable(columnIndex) {
            if (!processedData) return;
            
            if (currentSort.column === columnIndex) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.column = columnIndex;
                currentSort.direction = 'asc';
            }
            
            processedData.data.sort((a, b) => {
                const valA = a[columnIndex] || '';
                const valB = b[columnIndex] || '';
                const isNumA = !isNaN(valA) && !isNaN(parseFloat(valA));
                const isNumB = !isNaN(valB) && !isNaN(parseFloat(valB));
                
                if (isNumA && isNumB) {
                    return currentSort.direction === 'asc' 
                        ? parseFloat(valA) - parseFloat(valB) 
                        : parseFloat(valB) - parseFloat(valA);
                }
                
                return currentSort.direction === 'asc' 
                    ? valA.localeCompare(valB) 
                    : valB.localeCompare(valA);
            });
            
            generateTable(processedData.headers, processedData.data);
        }
        
        // 下载CSV
        function downloadCSV() {
            if (!processedData || processedData.data.length === 0) {
                alert('无数据可下载');
                return;
            }
            
            const headers = processedData.headers.join(',');
            const rows = processedData.data.map(row => 
                row.map(cell => {
                    if (typeof cell === 'string' && (cell.includes(',') || cell.includes('"'))) {
                        return `"${cell.replace(/"/g, '""')}"`;
                    }
                    return cell;
                }).join(',')
            );
            
            const csv = headers + '\n' + rows.join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const fileName = originalData 
                ? `${originalData.fileName.replace('.csv', '')}_processed.csv` 
                : 'processed_data.csv';
            
            const link = document.createElement('a');
            link.href = url;
            link.download = fileName;
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 处理文件夹中的CSV文件
        async function processFolderBatch(directoryHandles, fileNamePattern) {
            const progressContainer = document.getElementById('folderProgressContainer');
            const progressBar = document.getElementById('folderProgressBar');
            const progressText = document.getElementById('folderProgressText');
            
            // 详细日志记录函数
            function logWithTimestamp(message) {
                const timestamp = new Date().toLocaleTimeString();
                // 日志记录完成
            }
            
            // 改进的正则表达式转换，更好地处理文件名模式
            const regexPattern = fileNamePattern
                .replace(/###/g, '.{3}') // 将###替换为任意三个字符（产线名）
                .replace(/\*/g, '.*') // 将*替换为任意字符序列
                .replace(/\?/g, '.'); // 将?替换为任意单个字符
            const regex = new RegExp(`^${regexPattern}$`);
            
            logWithTimestamp(`使用文件名模式: ${fileNamePattern}`);
            logWithTimestamp(`转换后的正则表达式: ${regex}`);
            
            let files = [];
            let totalRows = 0;
            let firstHeaders = null;
            let errorFiles = [];
            let mergedHeaders = null;
            let mergedData = [];
            let processedFiles = 0;
            let skippedFiles = 0;
            
            // 扫描文件夹中的文件
            try {
                progressText.textContent = `扫描 ${directoryHandles.length} 个目录中的文件...`;
                
                // 递归遍历目录
                async function scanDirectory(handle, path = '') {
                    logWithTimestamp(`扫描目录: ${path || '根目录'}`);
                    try {
                        for await (const entry of handle.values()) {
                            if (entry.kind === 'file') {
                                logWithTimestamp(`检查文件: ${entry.name}`);
                                logWithTimestamp(`文件名是否匹配正则: ${regex.test(entry.name)}`);
                                const isCSV = entry.name.toLowerCase().endsWith('.csv');
                                const isTXT = entry.name.toLowerCase().endsWith('.txt');
                                logWithTimestamp(`文件是否以.csv结尾: ${isCSV}`);
                                logWithTimestamp(`文件是否以.txt结尾: ${isTXT}`);
                                
                                if (regex.test(entry.name) && (isCSV || isTXT)) {
                                    files.push({ handle: entry, name: entry.name, path: path + '/' + entry.name });
                                    logWithTimestamp(`✓ 文件匹配并添加: ${entry.name}`);
                                }
                            } else if (entry.kind === 'directory') {
                                logWithTimestamp(`进入子目录: ${entry.name}`);
                                await scanDirectory(entry, path + '/' + entry.name);
                            }
                        }
                    } catch (err) {
                        logWithTimestamp(`目录扫描错误: ${err.message}`);
                    }
                }
                
                // 遍历所有选择的目录
                for (let dirIndex = 0; dirIndex < directoryHandles.length; dirIndex++) {
                    const directoryHandle = directoryHandles[dirIndex];
                    progressText.textContent = `扫描目录 ${dirIndex + 1}/${directoryHandles.length}: ${directoryHandle.name}`;
                    await scanDirectory(directoryHandle);
                }
                
                logWithTimestamp(`扫描完成，找到 ${files.length} 个匹配的CSV文件`);
                
                if (files.length === 0) {
                    alert('没有找到符合条件的CSV文件');
                    progressContainer.style.display = 'none';
                    return;
                }
                
                // 从文件名中提取日期部分并按日期排序
                function extractDateFromFileName(fileName) {
                    // 匹配文件名中的日期部分（8位数字）
                    const dateMatch = fileName.match(/(\d{8})/);
                    return dateMatch ? dateMatch[1] : '00000000'; // 默认值确保不匹配的文件排在前面
                }
                
                // 按日期升序排序
                files.sort((a, b) => {
                    const dateA = extractDateFromFileName(a.name);
                    const dateB = extractDateFromFileName(b.name);
                    return dateA.localeCompare(dateB);
                });
                
                // 文件列表处理完成
                progressText.textContent = `找到 ${files.length} 个文件，开始处理...`;
                
                // 实际读取和处理CSV文件
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    try {
                        progressBar.style.width = `${(i / files.length) * 100}%`;
                        progressText.textContent = `处理文件 ${i+1}/${files.length}: ${file.name}`;
                        
                        logWithTimestamp(`开始处理文件: ${file.name}`);
                        
                        // 读取文件内容
                        logWithTimestamp(`尝试获取文件句柄: ${file.name}`);
                        const fileData = await file.handle.getFile();
                        logWithTimestamp(`文件大小: ${fileData.size} 字节`);
                        
                        logWithTimestamp(`尝试读取文件内容: ${file.name}`);
                        const text = await fileData.text();
                        logWithTimestamp(`成功读取文件内容，长度: ${text.length} 字符`);
                        
                        // 显示文件内容预览
                        if (text.length > 0) {
                            const preview = text.substring(0, 100) + (text.length > 100 ? '...' : '');
                            logWithTimestamp(`文件内容预览: ${preview}`);
                        }
                        
                        // 解析CSV内容 - 更健壮的解析方式
                        const lines = text.split(/\r?\n/).filter(line => line.trim());
                        logWithTimestamp(`文件 ${file.name} 包含 ${lines.length} 行`);
                        
                        if (lines.length === 0) {
                            logWithTimestamp(`跳过空文件: ${file.name}`);
                            skippedFiles++;
                            continue;
                        }
                        
                        // 提取表头和数据
                        let headers = lines[0].split(/,/);
                        const dataLines = lines.slice(1);
                        
                        // 获取数据行的最大列数（如果有数据行的话）
                        let maxDataColumns = 0;
                        if (dataLines.length > 0) {
                            const dataColumns = dataLines.map(line => line.split(/,/).length);
                            maxDataColumns = Math.max(...dataColumns);
                            logWithTimestamp(`文件 ${file.name} 数据行最大列数: ${maxDataColumns}`);
                        }
                        
                        // 如果表头列数大于数据行列数，截断表头
                        if (maxDataColumns > 0 && headers.length > maxDataColumns) {
                            logWithTimestamp(`⚠️ 文件 ${file.name} 表头列数(${headers.length})大于数据行列数(${maxDataColumns})，截断表头`);
                            headers = headers.slice(0, maxDataColumns);
                            logWithTimestamp(`截断后表头: ${headers.join(', ')}`);
                        }
                        
                        logWithTimestamp(`文件 ${file.name} 表头: ${headers.join(', ')}`);
                        logWithTimestamp(`文件 ${file.name} 数据行数: ${dataLines.length}`);
                        
                        // 检查表头是否匹配
                        if (i === 0) {
                            // 第一个文件，设置表头
                            mergedHeaders = headers;
                            firstHeaders = headers;
                            logWithTimestamp(`设置合并表头: ${mergedHeaders.join(', ')}`);
                        } else {
                            // 不是第一个文件，检查表头是否匹配
                            // 只比较与mergedHeaders长度相同的部分
                            const truncatedHeaders = headers.slice(0, mergedHeaders.length);
                            const headersMatch = truncatedHeaders.every((h, idx) => h === mergedHeaders[idx]);
                            
                            if (!headersMatch) {
                                errorFiles.push(file.name);
                                logWithTimestamp(`⚠️ 文件 ${file.name} 表头不匹配，跳过`);
                                logWithTimestamp(`期望表头: ${mergedHeaders.join(', ')}`);
                                logWithTimestamp(`实际表头: ${headers.join(', ')}`);
                                skippedFiles++;
                                continue;
                            }
                        }
                        
                        // 解析数据行
                        let fileRowCount = 0;
                        for (const line of dataLines) {
                            const values = line.split(/,/);
                            // 如果数据列数多于表头列数，截断数据
                            if (values.length > mergedHeaders.length) {
                                logWithTimestamp(`⚠️ 数据行列数(${values.length})多于表头(${mergedHeaders.length})，截断数据`);
                                const truncatedValues = values.slice(0, mergedHeaders.length);
                                mergedData.push(truncatedValues);
                            } 
                            // 如果数据列数少于表头列数，用空字符串填充
                            else if (values.length < mergedHeaders.length) {
                                logWithTimestamp(`⚠️ 数据行列数(${values.length})少于表头(${mergedHeaders.length})，用空字符串填充`);
                                const paddedValues = [...values];
                                while (paddedValues.length < mergedHeaders.length) {
                                    paddedValues.push('');
                                }
                                mergedData.push(paddedValues);
                            }
                            // 列数正好匹配
                            else {
                                mergedData.push(values);
                            }
                            totalRows++;
                            fileRowCount++;
                        }
                        
                        logWithTimestamp(`文件 ${file.name} 成功处理 ${fileRowCount} 行数据`);
                        processedFiles++;
                    } catch (fileError) {
                        logWithTimestamp(`处理文件 ${file.name} 时出错: ${fileError.message}`);
                        logWithTimestamp('错误详情:', fileError);
                        errorFiles.push(file.name);
                        skippedFiles++;
                    }
                }
                
                progressBar.style.width = '100%';
                progressText.textContent = '处理完成！';
                
                // 输出详细的合并数据信息到控制台
                logWithTimestamp('合并处理完成！');
                logWithTimestamp(`总文件数: ${files.length}`);
                logWithTimestamp(`成功处理文件数: ${processedFiles}`);
                logWithTimestamp(`跳过文件数: ${skippedFiles}`);
                logWithTimestamp(`合并后总行数: ${totalRows}`);
                logWithTimestamp(`表头数量: ${mergedHeaders ? mergedHeaders.length : 0}`);
                
                if (mergedHeaders) {
                    // 表头处理完成
                }
                
                if (mergedData.length > 0) {
                    // 数据示例处理完成
                } else {
                    // 空数据警告处理完成
                }
                
                if (errorFiles.length > 0) {
                    // 错误文件处理完成
                }
                
                setTimeout(() => {
                    let message = '';
                    if (totalRows > 0) {
                        message = `已合并，有${totalRows}行数据`;
                    } else {
                        message = `合并完成，但未找到有效数据\n\n`;
                        message += `扫描到${files.length}个文件\n`;
                        message += `成功处理${processedFiles}个文件\n`;
                        message += `跳过${skippedFiles}个文件\n`;
                    }
                    
                    if (errorFiles.length > 0) {
                        message += `\n警告：以下文件处理出错：\n${errorFiles.join('\n')}`;
                    }
                    
                    // 移除提示框，直接隐藏进度条
                    progressContainer.style.display = 'none';
                    
                    // 启用生成新表按钮
                    generateBtn.disabled = false;
                    generateBtn.style.backgroundColor = '#00AE40';
                    generateBtn.style.color = 'white';
                    
                    // 设置合并后的数据到originalData
                    originalData = {
                        fileName: 'merged_data.csv',
                        headers: mergedHeaders || [],
                        data: mergedData
                    };
                    
                    logWithTimestamp('已设置originalData，准备筛选操作');
                    // 原始数据处理完成
                }, 500);
            } catch (error) {
                logWithTimestamp(`处理过程出错: ${error.message}`);
                console.error('文件处理错误详情:', error);
                alert('文件处理失败: ' + error.message);
                progressContainer.style.display = 'none';
            }
        }

        // HTML转义
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe.toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
        
        // 柱状图类（支持产能图和CT图）
        class BarChart {
            constructor(ctx, canvas, width, height, data, title, tooltip, yLabel, maxY, isCapacityChart, targetValue = null, targetLineElement = null, isDailyMode = false) {
                this.ctx = ctx;
                this.canvas = canvas;
                this.width = width;
                this.height = height;
                this.data = data;
                this.title = title;
                this.tooltip = tooltip;
                this.yLabel = yLabel;
                this.maxY = maxY;
                this.isCapacityChart = isCapacityChart;
                this.targetValue = targetValue; // CT目标值
                this.targetLineElement = targetLineElement; // CT目标线DOM元素
                this.isDailyMode = isDailyMode; // 是否为按天统计模式
                this.resizeHandler = null;
                this.hoveredBarIndex = -1;
                this.animationProgress = 0;
                this.animationFrameId = null;
                
                // 颜色定义
                this.colors = {
                    pass: 'rgba(75, 192, 192, 0.7)',
                    passBorder: 'rgba(75, 192, 192, 1)',
                    fail: 'rgba(255, 99, 132, 0.7)',
                    failBorder: 'rgba(255, 99, 132, 1)',
                    ct: 'rgba(54, 162, 235, 0.7)',
                    ctBorder: 'rgba(54, 162, 235, 1)',
                    highlightBorder: 'rgba(247, 249, 250, 0.4)',
                    targetLine: 'rgba(255, 0, 0, 0.2)'
                };
                
                // 边距设置 - 增加右侧边距防止X轴标签被截断
                this.padding = {
                    top: 60,
                    right: 120,
                    bottom: 80,
                    left: 60
                };
                
                // 计算绘图区域
                this.calculatePlotArea();
                
                // 准备图表数据
                this.prepareChartData();
                
                // 更新目标线位置
                this.updateTargetLinePosition();
                
                // 绑定鼠标事件
                this.bindMouseEvents();
                
                // 开始动画
                this.startAnimation();
            }
            
            calculatePlotArea() {
                this.plotWidth = this.width - this.padding.left - this.padding.right;
                this.plotHeight = this.height - this.padding.top - this.padding.bottom;
            }
            
            // 更新CT目标线位置
            updateTargetLinePosition() {
                if (!this.isCapacityChart && this.targetValue !== null && this.targetLineElement) {
                    // 计算目标线在图表中的Y坐标
                    // 特别处理：当目标值为0时也正常显示
                    const targetYPercentage = this.maxY > 0 ? this.targetValue / this.maxY : 0;
                    const targetY = this.padding.top + this.plotHeight * (1 - targetYPercentage);
                    this.targetLineElement.style.top = `${targetY}px`;
                    this.targetLineElement.style.display = 'block';
                    
                    // 设置CT目标线提示框内容并显示
                    const ctTargetTooltip = this.targetLineElement.nextElementSibling;
                    if (ctTargetTooltip && ctTargetTooltip.classList.contains('tooltip')) {
                        ctTargetTooltip.innerHTML = `<div>CT目标: ${this.targetValue}</div>`;
                        ctTargetTooltip.style.display = 'block';
                    }
                } else if (this.targetLineElement) {
                    this.targetLineElement.style.display = 'none';
                    // 同时隐藏提示框
                    const ctTargetTooltip = this.targetLineElement.nextElementSibling;
                    if (ctTargetTooltip && ctTargetTooltip.classList.contains('tooltip')) {
                        ctTargetTooltip.style.display = 'none';
                    }
                }
            }
            
            // 更新CT目标值
            updateTargetLine(newValue) {
                this.targetValue = newValue;
                this.updateTargetLinePosition();
                this.render();
            }
            
            updateDimensions(width, height) {
                this.width = width;
                this.height = height;
                this.calculatePlotArea();
                this.prepareChartData();
                this.updateTargetLinePosition();
                this.render();
            }
            
            // 更新图表数据和目标值
            updateData(newData, newTitle, newTargetValue = null, isDailyMode = null) {
                this.data = newData;
                this.title = newTitle;
                // 修改：无论newTargetValue是什么值（包括0），只要它被明确传递，就更新目标值
                // 只有当newTargetValue === null时才不更新（这意味着调用者不想改变目标值）
                if (newTargetValue !== undefined && arguments.length >= 3) {
                    this.targetValue = newTargetValue;
                }
                if (isDailyMode !== null) {
                    this.isDailyMode = isDailyMode;
                }
                this.prepareChartData();
                this.updateTargetLinePosition();
                this.hoveredBarIndex = -1;
                this.hideTooltip();
                this.animationProgress = 0;
                this.startAnimation();
            }
            
            prepareChartData() {
                this.labels = []; // 可以是小时或日期
                this.primaryValues = []; // 主值（产能图为PASS，CT图为平均EffectCT）
                this.secondaryValues = []; // 次要值（产能图为FAIL）
                this.totalValues = []; // 总值（产能图为PASS+FAIL）
                
                if (this.isDailyMode) {
                    // 按天统计模式 - 提取所有日期并排序
                    this.labels = Object.keys(this.data).sort();
                    
                    this.labels.forEach(date => {
                        if (this.isCapacityChart) {
                            const dayData = this.data[date] || { pass: 0, fail: 0, total: 0 };
                            this.primaryValues.push(dayData.pass);
                            this.secondaryValues.push(dayData.fail);
                            this.totalValues.push(dayData.total);
                        } else {
                            const dayData = this.data[date] || { avgCT: 0, count: 0 };
                            this.primaryValues.push(dayData.avgCT);
                            this.totalValues.push(dayData.count);
                        }
                    });
                } else {
                    // 按小时统计模式 - 全时段显示0:00-24:00（包含24:00刻度）
                    for (let hour = 0; hour <= 24; hour++) {
                        this.labels.push(hour);
                        
                        if (this.isCapacityChart) {
                            const hourData = this.data[hour] || { pass: 0, fail: 0, total: 0 };
                            this.primaryValues.push(hourData.pass);
                            this.secondaryValues.push(hourData.fail);
                            this.totalValues.push(hourData.total);
                        } else {
                            const hourData = this.data[hour] || { avgCT: 0, count: 0 };
                            this.primaryValues.push(hourData.avgCT);
                            this.totalValues.push(hourData.count);
                        }
                    }
                }
            }
            
            // 开始动画
            startAnimation() {
                if (this.animationFrameId) {
                    cancelAnimationFrame(this.animationFrameId);
                }
                
                const duration = 500;
                const startTime = performance.now();
                
                const animate = (currentTime) => {
                    const elapsed = currentTime - startTime;
                    this.animationProgress = Math.min(elapsed / duration, 1);
                    
                    this.render();
                    
                    if (this.animationProgress < 1) {
                        this.animationFrameId = requestAnimationFrame(animate);
                    }
                };
                
                this.animationFrameId = requestAnimationFrame(animate);
            }
            
            // 绑定鼠标事件
            bindMouseEvents() {
                const dpr = window.devicePixelRatio || 1;
                
                // 保存事件处理器引用以便后续移除
                this.mouseMoveHandler = (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    const mouseX = (e.clientX - rect.left) * dpr;
                    const mouseY = (e.clientY - rect.top) * dpr;
                    
                    const barCount = this.labels.length;
                    // 计算每个间隔的宽度
                    const intervalWidth = this.plotWidth / (barCount);
                    // 计算柱形宽度 = 间隔宽度 - 2px间隙
                    const barWidth = intervalWidth - 2;
                    
                    let hoveredIndex = -1;
                    
                    for (let i = 0; i < barCount; i++) {
                        // 计算柱形X位置：从左内边距 + 间隔宽度*i + 1px间隙
                        const xPos = this.padding.left + i * intervalWidth + 1;
                        const xEnd = xPos + barWidth;
                        
                        if (mouseX >= xPos && mouseX <= xEnd) {
                            // 计算柱形高度和位置
                            let barHeight, barYPos;
                            
                            if (this.isCapacityChart) {
                                const total = this.totalValues[i];
                                barHeight = (total / this.maxY) * this.plotHeight;
                                barYPos = this.padding.top + this.plotHeight - barHeight;
                            } else {
                                const ctValue = this.primaryValues[i];
                                barHeight = (ctValue / this.maxY) * this.plotHeight;
                                barYPos = this.padding.top + this.plotHeight - barHeight;
                            }
                            
                            if (mouseY >= barYPos && mouseY <= this.padding.top + this.plotHeight) {
                                hoveredIndex = i;
                                break;
                            }
                        }
                    }
                    
                    if (hoveredIndex !== this.hoveredBarIndex) {
                        this.hoveredBarIndex = hoveredIndex;
                        
                        if (hoveredIndex !== -1) {
                            this.showTooltip(e, hoveredIndex);
                        } else {
                            this.hideTooltip();
                        }
                        
                        this.render();
                    }
                };
                
                this.canvas.addEventListener('mousemove', this.mouseMoveHandler);
                
                // 保存mouseleave事件处理器引用
                this.mouseLeaveHandler = () => {
                    if (this.hoveredBarIndex !== -1) {
                        this.hoveredBarIndex = -1;
                        this.hideTooltip();
                        this.render();
                    }
                };
                
                this.canvas.addEventListener('mouseleave', this.mouseLeaveHandler);
                
                // 默认鼠标指针样式
                this.canvas.style.cursor = 'default';
            }
            
            // 显示提示框
            showTooltip(event, index) {
                let tooltipHtml;
                
                if (this.isDailyMode) {
                    // 按天模式 - 格式化日期为 yyyy/m/d
                    const date = this.labels[index];
                    const dateParts = date.split('-');
                    const formattedDate = `${dateParts[0]}/${dateParts[1]}/${dateParts[2]}`;
                    tooltipHtml = `<div><strong>${formattedDate}</strong></div>`;
                } else {
                    // 按小时模式
                    const hour = this.labels[index];
                    tooltipHtml = `<div><strong>${hour}:00-${hour+1}:00</strong></div>`;
                }
                
                if (this.isCapacityChart) {
                    const pass = this.primaryValues[index];
                    const fail = this.secondaryValues[index];
                    const total = this.totalValues[index];
                    const passRate = total > 0 ? ((pass / total) * 100).toFixed(2): 0;
                    
                    tooltipHtml += `
                        <div>PASS: ${pass}</div>
                        <div>FAIL: ${fail}</div>
                        <div>总计: ${total}</div>
                        <div>良率: ${passRate}%</div>
                    `;
                } else {
                    // CT图只显示CT值
                    const avgCT = this.primaryValues[index].toFixed(2);
                    tooltipHtml += `<div>平均Effect: ${avgCT}</div>`;
                    
                }
                
                this.tooltip.innerHTML = tooltipHtml;
                
                const rect = this.canvas.getBoundingClientRect();
                const chartWrapperRect = this.canvas.parentElement.getBoundingClientRect();
                
                let left = event.clientX - chartWrapperRect.left + 10;
                let top = event.clientY - chartWrapperRect.top + 10;
                
                if (left + this.tooltip.offsetWidth > chartWrapperRect.width) {
                    left = event.clientX - chartWrapperRect.left - this.tooltip.offsetWidth - 10;
                }
                
                if (top + this.tooltip.offsetHeight > chartWrapperRect.height) {
                    top = event.clientY - chartWrapperRect.top - this.tooltip.offsetHeight - 10;
                }
                
                this.tooltip.style.left = `${left}px`;
                this.tooltip.style.top = `${top}px`;
                this.tooltip.style.opacity = '1';
            }
            
            // 隐藏提示框
            hideTooltip() {
                this.tooltip.style.opacity = '0';
            }
            
            render() {
                const ctx = this.ctx;
                const { width, height, padding } = this;
                
                // 清空画布
                ctx.clearRect(0, 0, width, height);
                
                // 绘制背景
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, width, height);
                
                // 绘制组件
                this.drawAxes();
                this.drawBars();
                this.drawLegend();
                this.drawTitle();
                
                // 绘制CT目标线（在画布上绘制，确保在柱子上方）
                if (!this.isCapacityChart && this.targetValue !== null) {
                    this.drawTargetLine();
                }
                
                // 绘制水印
                this.drawWatermark();
            }
            
            // 绘制水印
            drawWatermark() {
                const ctx = this.ctx;
                const { width, height } = this;
                
                // 设置水印样式
                ctx.save();
                ctx.font = '50px Helvetica Neue';
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; // 半透明黑色
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // 旋转40度
                ctx.translate(width / 2, height / 2);
                ctx.rotate(40 * Math.PI / 180);
                
                // 绘制水印文本
                ctx.fillText('LEADTECH', 0, 0);
                
                ctx.restore();
            }
            
            // 绘制CT目标线 - 确保只显示一条实线
            drawTargetLine() {
                const ctx = this.ctx;
                const { padding } = this;
                
                // 计算目标线Y坐标
                const targetYPercentage = this.targetValue / this.maxY;
                const targetY = padding.top + this.plotHeight * (1 - targetYPercentage);
                
                // 绘制目标线 - 实线
                ctx.beginPath();
                ctx.setLineDash([]); // 明确设置为实线，不使用虚线
                ctx.moveTo(padding.left, targetY);
                ctx.lineTo(this.width - padding.right, targetY);
                ctx.strokeStyle = this.colors.targetLine;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            drawAxes() {
                const ctx = this.ctx;
                const { padding, plotWidth, plotHeight, labels, maxY } = this;
                const { width, height } = this;
                
                // 绘制轴线
                ctx.beginPath();
                ctx.moveTo(padding.left, padding.top);
                ctx.lineTo(padding.left, height - padding.bottom);
                ctx.lineTo(width - padding.right, height - padding.bottom);
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                
                // X轴刻度和标签
                const labelCount = labels.length;
                const intervalWidth = plotWidth / labelCount;
                
                ctx.font = '12px Helvetica Neue';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillStyle = '#333';
                
                labels.forEach((label, index) => {
                    // 计算刻度位置
                    const xPos = padding.left + index * intervalWidth;
                    const yPos = height - padding.bottom;
                    
                    // 刻度线
                    ctx.beginPath();
                    ctx.moveTo(xPos, yPos);
                    ctx.lineTo(xPos, yPos + 5);
                    ctx.stroke();
                    
                    // 标签 - 根据模式显示不同格式
                    let displayLabel;
                    if (this.isDailyMode) {
                        // 按天模式 - 格式化为 m/d
                        const dateParts = label.split('-');
                        displayLabel = `${dateParts[1]}/${dateParts[2]}`;
                    } else {
                        // 按小时模式
                        displayLabel = `${label}:00`;
                    }
                    
                    // 按天模式下，将标签放在柱状图中间
                    if (this.isDailyMode) {
                        // 计算柱形宽度 = 间隔宽度 - 2px间隙
                        const barWidth = intervalWidth - 2;
                        // 标签X位置偏移到柱形中间
                        const labelXPos = xPos + (intervalWidth - barWidth) / 2 + barWidth / 2;
                        ctx.fillText(displayLabel, labelXPos, yPos + 8);
                    } else {
                        // 按小时模式保持原位置
                        ctx.fillText(displayLabel, xPos, yPos + 8);
                    }
                });
                
                // Y轴刻度和标签 - 确保是5的倍数
                const yTickStep = maxY / 5; // 分成5个主要刻度
                const adjustedStep = roundToNearestMultiple(yTickStep, 5); // 确保刻度间隔是5的倍数
                
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                
                // 计算实际的刻度数量
                const tickCount = Math.ceil(maxY / adjustedStep);
                
                for (let i = 0; i <= tickCount; i++) {
                    const yVal = i * adjustedStep;
                    // 确保不超过最大值
                    if (yVal > maxY) break;
                    
                    const yPos = height - padding.bottom - (yVal / maxY) * plotHeight;
                    const xPos = padding.left;
                    
                    // 网格线
                    ctx.beginPath();
                    ctx.setLineDash([3, 3]);
                    ctx.moveTo(padding.left, yPos);
                    ctx.lineTo(width - padding.right, yPos);
                    ctx.strokeStyle = '#ddd';
                    ctx.stroke();
                    ctx.setLineDash([]);
                    
                    // 刻度线
                    ctx.beginPath();
                    ctx.moveTo(xPos - 5, yPos);
                    ctx.lineTo(xPos, yPos);
                    ctx.strokeStyle = '#333';
                    ctx.stroke();
                    
                    // 标签
                    ctx.fillText(Math.round(yVal).toString(), xPos - 8, yPos);
                }
                
                // Y轴标题
                ctx.font = '14px Helvetica Neue';
                ctx.textAlign = 'center';
                ctx.save();
                ctx.translate(20, height / 2);
                ctx.rotate(-Math.PI / 2);
                ctx.fillText(this.yLabel, 0, 0);
                ctx.restore();
            }
            
            drawBars() {
                const ctx = this.ctx;
                const { padding, plotWidth, plotHeight, labels, maxY, colors, hoveredBarIndex, animationProgress } = this;
                const { primaryValues, secondaryValues, totalValues } = this;
                
                const labelCount = labels.length;
                // 计算每个间隔的宽度
                const intervalWidth = plotWidth / labelCount;
                // 计算柱形宽度 = 间隔宽度 - 2px间隙
                const barWidth = intervalWidth - 2;
                
                labels.forEach((label, index) => {
                    // 计算柱形X位置：从左内边距 + 间隔宽度*index + 1px间隙
                    const xPos = padding.left + index * intervalWidth + 1;
                    
                    // 判断是否为当前悬停的柱子
                    const isHovered = index === hoveredBarIndex;
                    const borderWidth = isHovered ? 3 : 1;
                    const borderColor = isHovered ? colors.highlightBorder : null;
                    
                    if (this.isCapacityChart) {
                        // 产能图 - 堆叠柱状图
                        const pass = primaryValues[index];
                        const fail = secondaryValues[index];
                        const total = totalValues[index];
                        
                        // 应用动画进度
                        const animatedPass = pass * animationProgress;
                        const animatedFail = fail * animationProgress;
                        
                        // 计算PASS部分（底部）
                        const passHeightPerc = animatedPass / maxY;
                        const passHeight = passHeightPerc * plotHeight;
                        const passYPos = padding.top + plotHeight - passHeight;
                        
                        // 计算FAIL部分（顶部）
                        const failHeightPerc = animatedFail / maxY;
                        const failHeight = failHeightPerc * plotHeight;
                        const failYPos = passYPos - failHeight;
                        
                        // 绘制FAIL部分
                        if (animatedFail > 0) {
                            ctx.fillStyle = colors.fail;
                            ctx.fillRect(xPos, failYPos, barWidth, failHeight);
                            
                            ctx.strokeStyle = borderColor || colors.failBorder;
                            ctx.lineWidth = borderWidth;
                            ctx.strokeRect(xPos, failYPos, barWidth, failHeight);
                        }
                        
                        // 绘制PASS部分
                        if (animatedPass > 0) {
                            ctx.fillStyle = colors.pass;
                            ctx.fillRect(xPos, passYPos, barWidth, passHeight);
                            
                            ctx.strokeStyle = borderColor || colors.passBorder;
                            ctx.lineWidth = borderWidth;
                            ctx.strokeRect(xPos, passYPos, barWidth, passHeight);
                        }
                        
                        // 显示总计数值
                        if (total > 0) {
                            ctx.font = '12px Helvetica Neue';
                            ctx.fillStyle = '#333';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'bottom';
                            ctx.fillText(Math.round(animatedPass + animatedFail).toString(), xPos + barWidth / 2, failYPos - 5);
                        }
                    } else {
                        // CT图 - 单一柱状图
                        const ctValue = primaryValues[index];
                        
                        // 应用动画进度
                        const animatedCT = ctValue * animationProgress;
                        
                        // 计算柱形高度和位置
                        const ctHeightPerc = animatedCT / maxY;
                        const ctHeight = ctHeightPerc * plotHeight;
                        const ctYPos = padding.top + plotHeight - ctHeight;
                        
                        // 绘制CT柱形
                        if (animatedCT > 0) {
                            ctx.fillStyle = colors.ct;
                            ctx.fillRect(xPos, ctYPos, barWidth, ctHeight);
                            
                            ctx.strokeStyle = borderColor || colors.ctBorder;
                            ctx.lineWidth = borderWidth;
                            ctx.strokeRect(xPos, ctYPos, barWidth, ctHeight);
                        }
                        
                        // 显示CT值
                        if (ctValue > 0) {
                            ctx.font = '12px Helvetica Neue';
                            ctx.fillStyle = '#333';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'bottom';
                            ctx.fillText(animatedCT.toFixed(2), xPos + barWidth / 2, ctYPos - 5);
                        }
                    }
                });
            }
            
            drawLegend() {
                if (!this.isCapacityChart) return; // 只有产能图需要图例
                
                // 不再使用Canvas绘制图例，已通过div创建了垂直按钮式图例系统
            }
            
            drawTitle() {
                const ctx = this.ctx;
                const { width } = this;
                
                // 绘制图表标题
                ctx.font = '16px Helvetica Neue bold';
                ctx.fillStyle = '#333';
                ctx.textAlign = 'center';
                ctx.fillText(this.title, width / 2, 30);
            }
            
            destroy() {
                if (this.resizeHandler) {
                    window.removeEventListener('resize', this.resizeHandler);
                }
                
                if (this.animationFrameId) {
                    cancelAnimationFrame(this.animationFrameId);
                }
                
                // 移除鼠标事件监听器
                if (this.mouseMoveHandler) {
                    this.canvas.removeEventListener('mousemove', this.mouseMoveHandler);
                }
                if (this.mouseLeaveHandler) {
                    this.canvas.removeEventListener('mouseleave', this.mouseLeaveHandler);
                }
            }

                            CCyMin = parseFloat(yRange[0]) || -1;
                            CCyMax = parseFloat(yRange[1]) || 1;
                        }
                    }
                    
                    // 设置连接线配置
                    CCconnectionConfig = chartProps[2] || '';
                    
                    // 设置图表尺寸
                    const chartSize = chartProps[3].split(',');
                    if (chartSize.length >= 2) {
                        const chartWidth = parseInt(chartSize[0]) || 600;
                        const chartHeight = parseInt(chartSize[1]) || 650;
                        
                        // 设置CCChartContainer尺寸
                        const CCchartContainer = document.querySelector('.CCchart-container');
                        if (CCchartContainer) {
                          CCchartContainer.style.height = chartHeight + 'px';
                          CCchartContainer.style.width = chartWidth + 'px';
                          
                          // 设置CCmainChartTitle宽度与CCChartContainer相同

                          if (CCmainChartTitle) {
                            CCmainChartTitle.style.width = chartWidth - 20 + 'px';
                          }
                          
                          // 设置performanceStats的right属性 = 1350 - CCChartContainer宽度
                          const performanceStats = document.getElementById('performanceStats');
                          if (performanceStats) {
                            const rightValue = 1350 - chartWidth;
                            performanceStats.style.right = rightValue + 'px';

                          // 设置CCmainChartLegend的属性
                          const CCmainChartLegend = document.getElementById('CCmainChartLegend');
                          if (CCmainChartLegend) {
