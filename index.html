<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Supabase 数据读取</title>
    <style>
        body { padding: 30px; font-size: 18px; font-family: Arial,"Microsoft YaHei"; }
        .result { margin-top: 20px; padding: 15px; border: 1px solid #eee; border-radius: 10px; }
        .debug { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; font-size: 14px; white-space: pre-wrap; word-wrap: break-word; }
        strong { color: #007bff; }
    </style>
</head>
<body>

<h3>📊 数据表：FAI</h3>
<div class="result" id="result">加载中...</div>
<div class="debug" id="debug"></div>

<script>
// ======================
// 你的信息已自动填入
// ======================
const SUPABASE_URL = "https://nxpohshhzrxotatvqnjl.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54cG9oc2hoenJ4b3RhdHZxbmpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMDU4MzksImV4cCI6MjA5MDU4MTgzOX0.IjxntL_rVAO5Sz08O0vIsY1R2pVhlFtwnMXi3LH8mxM";
const TABLE_NAME = "FAI";

const debug = document.getElementById("debug");
function log(text) {
    debug.innerHTML += "✅ " + text + "<br>";
    console.log(text);
}

// 开始请求
fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}?select=*`, {
    headers: {
        apikey: SUPABASE_KEY,
        "Content-Type": "application/json"
    }
})
.then(res => {
    log("请求成功，状态码：" + res.status);
    return res.json();
})
.then(data => {
    log("总共获取行数：" + data.length);

    // 数组索引从 0 开始
    // 第3行 → index 2
    // 第7行 → index 6

    const row3 = data[2] || {};
    const row7 = data[6] || {};

    const arr3 = Object.values(row3);
    const arr7 = Object.values(row7);

    log("第3行内容：" + JSON.stringify(arr3));
    log("第7行内容：" + JSON.stringify(arr7));

    // 取值：第3行第7列、第7行第1列
    const val3_7 = arr3[6] || "未找到";
    const val7_1 = arr7[0] || "未找到";

    document.getElementById("result").innerHTML = `
        <p>第 3 行 第 7 列：<strong>${val3_7}</strong></p>
        <p>第 7 行 第 1 列：<strong>${val7_1}</strong></p>
    `;
})
.catch(e => {
    document.getElementById("result").innerText = "错误：" + e.message;
    console.error(e);
});
</script>

</body>
</html>
