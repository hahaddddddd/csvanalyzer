        // 处理保留列和筛选条件
        function processKeepColumns(input, headers, data) {
            if (!input.trim()) return { headers, data };
            
            const columns = input.split('&')
                .map(num => parseInt(num.trim()) - 1)
                .filter(num => !isNaN(num) && num >= 0 && num < headers.length);
            
            if (columns.length === 0) throw new Error('保留列设置无效');
            
            const newHeaders = columns.map(index => headers[index]);
            const newData = data.map(row => columns.map(index => row[index] || ''));
            
            return { headers: newHeaders, data: newData };
        }
        
        function processFilters(filterInputs, headers, data) {
            let filteredData = [...data];
            
            // 获取时间戳列索引
            const timestampColumnInput = document.getElementById('timestampColumn');
            const timestampColumnIndex = timestampColumnInput ? parseInt(timestampColumnInput.value.trim()) - 1 : NaN;
            
            filterInputs.forEach(input => {
                const value = input.value.trim();
                if (!value) return;
                if (!value.startsWith('@')) throw new Error(`筛选条件${value}需以@开头`);
                
                const conditionStr = value.substring(1);
                const columnMatch = conditionStr.match(/^\d+/);
                if (!columnMatch) throw new Error(`筛选条件${value}未找到列序号`);
                
                const columnIndex = parseInt(columnMatch[0]) - 1;
                const conditionsPart = conditionStr.substring(columnMatch[0].length);
                if (!conditionsPart) throw new Error(`筛选条件${value}缺少条件`);
                
                // 检查列序号是否有效
                if (columnIndex < 0 || columnIndex >= headers.length) {
                    // 提供更详细的错误信息，帮助用户排查
                    const errorMsg = headers.length > 0 
                        ? `列序号${columnIndex+1}无效。当前数据只有${headers.length}列，请输入1-${headers.length}之间的列序号。` 
                        : `列序号${columnIndex+1}无效。数据解析错误或没有数据。`;
                    throw new Error(errorMsg);
                }
                
                const conditions = conditionsPart.split('&').filter(c => c.trim());
                if (conditions.length === 0) throw new Error(`筛选条件${value}无有效规则`);
                
                const parsedConditions = conditions.map(cond => {
                    const operators = ['<=', '>=', '!=', '=', '>', '<'];
                    let operator = null;
                    let val = null;
                    
                    for (const op of operators) {
                        if (cond.startsWith(op)) {
                            operator = op;
                            val = cond.substring(op.length).trim();
                            break;
                        }
                    }
                    
                    if (!operator) throw new Error(`条件${cond}包含无效操作符`);
                    if (val === '') throw new Error(`条件${cond}缺少筛选值`);
                    
                    return { operator, value: val };
                });
                
                filteredData = filteredData.filter(row => {
                    const cellValue = (row[columnIndex] || '').trim();
                    const isNum = !isNaN(cellValue) && !isNaN(parseFloat(cellValue));
                    const numValue = isNum ? parseFloat(cellValue) : null;
                    
                    return parsedConditions.every(({ operator, value }) => {
                        const isValNum = !isNaN(value) && !isNaN(parseFloat(value));
                        const numCondVal = isValNum ? parseFloat(value) : null;
                        
                        switch (operator) {
                            case '=':
                                if (isNum && isValNum) {
                                    return numValue === numCondVal; // 数字仍然精确匹配
                                } else {
                                    // 检查是否为日期格式，如果是，则进行日期比较
                                    const cellDate = new Date(cellValue);
                                    const condDate = new Date(value);
                                    if (!isNaN(cellDate.getTime()) && !isNaN(condDate.getTime())) {
                                        // 日期比较
                                        return cellDate.getTime() === condDate.getTime();
                                    } else {
                                        // 字符串进行不区分大小写的模糊匹配
                                        return cellValue.toLowerCase().includes(value.toLowerCase());
                                    }
                                }
                            case '!=':
                                if (isNum && isValNum) {
                                    return numValue !== numCondVal; // 数字仍然精确匹配
                                } else {
                                    // 检查是否为日期格式，如果是，则进行日期比较
                                    const cellDate = new Date(cellValue);
                                    const condDate = new Date(value);
                                    if (!isNaN(cellDate.getTime()) && !isNaN(condDate.getTime())) {
                                        // 日期比较
                                        return cellDate.getTime() !== condDate.getTime();
                                    } else {
                                        // 字符串进行不区分大小写的模糊不匹配
                                        return !cellValue.toLowerCase().includes(value.toLowerCase());
                                    }
                                }
                            case '>':
                            case '<':
                            case '>=':
                            case '<=':
                                // 尝试将单元格值和条件值转换为日期进行比较
                                const cellDate = new Date(cellValue);
                                const condDate = new Date(value);
                                
                                // 如果两个值都可以转换为有效日期，则进行日期比较
                                if (!isNaN(cellDate.getTime()) && !isNaN(condDate.getTime())) {
                                    if (operator === '>') return cellDate > condDate;
                                    if (operator === '<') return cellDate < condDate;
                                    if (operator === '>=') return cellDate >= condDate;
                                    if (operator === '<=') return cellDate <= condDate;
                                }
                                // 检查是否为时间戳列，如果是，则进行日期比较（保持原有逻辑）
                                else if (!isNaN(timestampColumnIndex) && columnIndex === timestampColumnIndex) {
                                    // 尝试将单元格值转换为日期
                                    
                                    if (!isNaN(cellDate.getTime())) {
                                        // 检查筛选值是否为纯时间格式（HH:MM或HH:MM:SS）
                                        const timePattern = /^\d{1,2}:\d{2}(:\d{2})?$/;
                                        
                                        if (timePattern.test(value)) {
                                            // 纯时间比较：从筛选值中提取时、分、秒
                                            const timeParts = value.split(':').map(Number);
                                            const hours = timeParts[0] || 0;
                                            const minutes = timeParts[1] || 0;
                                            const seconds = timeParts[2] || 0;
                                            
                                            // 获取单元格时间部分
                                            const cellHours = cellDate.getHours();
                                            const cellMinutes = cellDate.getMinutes();
                                            const cellSeconds = cellDate.getSeconds();
                                            
                                            // 比较时间部分
                                            const cellTimeValue = cellHours * 3600 + cellMinutes * 60 + cellSeconds;
                                            const filterTimeValue = hours * 3600 + minutes * 60 + seconds;
                                            
                                            if (operator === '>') return cellTimeValue > filterTimeValue;
                                            if (operator === '<') return cellTimeValue < filterTimeValue;
                                            if (operator === '>=') return cellTimeValue >= filterTimeValue;
                                            if (operator === '<=') return cellTimeValue <= filterTimeValue;
                                        } else {
                                            // 完整日期比较（已处理）
                                        }
                                    }
                                }
                                
                                // 对于非时间戳列或日期转换失败的情况，继续使用数字比较
                                // 改进数字检测逻辑：使用parseFloat和isFinite检查
                                const cellNumValue = parseFloat(cellValue);
                                const condNumValue = parseFloat(value);
                                
                                // 如果单元格值或条件值不是有效数字，则返回false而不是抛出错误
                                if (!isFinite(cellNumValue) || !isFinite(condNumValue)) {
                                    return false;
                                }
                                
                                // 使用转换后的数值进行比较
                                if (operator === '>') return cellNumValue > condNumValue;
                                if (operator === '<') return cellNumValue < condNumValue;
                                if (operator === '>=') return cellNumValue >= condNumValue;
                                if (operator === '<=') return cellNumValue <= condNumValue;
                            default:
                                return false;
                        }
                    });
                });
            });
            
            // 特殊筛选：当fixtureIndex = 0 (ALS press) 且产品为J427时，筛选结果列数据 != "NA"
            if (fixtureIndex === 0) {
                // 获取产品列和结果列索引
                const productColumnInput = document.getElementById('productColumn');
                const resultColumnInput = document.getElementById('resultColumn');
                
                if (productColumnInput && resultColumnInput) {
                    const productColumnIndex = parseInt(productColumnInput.value.trim()) - 1;
                    const resultColumnIndex = parseInt(resultColumnInput.value.trim()) - 1;
                    
                    // 检查列索引是否有效
                    if (productColumnIndex >= 0 && resultColumnIndex >= 0 && 
                        productColumnIndex < headers.length && resultColumnIndex < headers.length) {
                        
                        filteredData = filteredData.filter(row => {
                            const productValue = (row[productColumnIndex] || '').trim();
                            const resultValue = (row[resultColumnIndex] || '').trim();
                            
                            // 如果产品是J427，则筛选结果不为"NA"的数据
                            if (productValue === 'J427') {
                                return resultValue !== 'NA';
                            }
                            // 其他产品保持不变
                            return true;
                        });
                    }
                }
            }
            
            return filteredData;
        }
        
        // 生成数据表格
        function generateTable(headers, data) {
            if (!headers || !data) return;
            
            // 清除表格高亮的辅助函数
            function clearTableHighlights(table) {
                const allCells = table.querySelectorAll('td');
                allCells.forEach(cell => {
                    // 恢复到默认背景色（透明）
                    if (cell.classList.contains('ct-exceed')) {
                        // 如果单元格有ct-exceed类，则保留该类的背景色

            // 获取配置列索引
            const resultColumnIndex = parseInt(resultColumnInput.value.trim()) - 1;
            const effectCTColumnIndex = parseInt(effectCTColumnInput.value.trim()) - 1;
            const productColumnIndex = parseInt(productColumnInput.value.trim()) - 1;
            const timestampColumnIndex = parseInt(timestampColumnInput.value.trim()) - 1;
            // 获取压力监控所在列索引（支持单列或多列，格式为A或A&B）
            const parameterColumnsInput = parameterColumnInput.value.trim();
            const parameterColumnIndices = [];
            if (parameterColumnsInput) {
                const parameterColumns = parameterColumnsInput.split('&');
                parameterColumns.forEach(col => {
                    // 只解析为数字（从1开始的列号）
                    if (!isNaN(col.trim())) {
                        const colIndex = parseInt(col.trim()) - 1; // 转换为从0开始的索引
                        if (colIndex >= 0) {
                            parameterColumnIndices.push(colIndex);

                    }

            // 显示统计容器并隐藏上传容器
            const statsContainer = document.getElementById('statsContainer');
            const uploadContainer = document.getElementById('uploadContainer');
            if (statsContainer) {
                statsContainer.style.display = 'block';
            }
            if (uploadContainer) {
                uploadContainer.style.display = 'none';
            }
            
            // 当显示表格时，隐藏mainProductToggle
            const mainProductToggle = document.getElementById('mainProductToggle');
            if (mainProductToggle && currentView === 'table') {
                mainProductToggle.style.display = 'none';

            const showNG = document.getElementById('showNG');
            if (showNG && currentView === 'table') {

                if (productColumnIndex >= 0 && resultColumnIndex >= 0 &&

                    const ctTargetValue = productCTTargets[targetProduct] || null;

                                const month = date.getMonth() + 1;

                                const hours = date.getHours();
                                const minutes = date.getMinutes().toString().padStart(2, '0');
                                // 对秒数进行向下取整（考虑毫秒部分）
                                const seconds = Math.floor(date.getSeconds() + date.getMilliseconds()/1000);
                                displayValue = `${year}/${month}/${day} ${hours}:${minutes}:${seconds.toString().padStart(2, '0')}`;

                            // 处理数字类型：整数保持不变，小数四舍五入保留3位小数
                            // 排除Effect CT列，该列保持原始格式
                            const numValue = parseFloat(cell);

                            }

                        // 移除固定宽度限制，让内容完整显示
                        tableHtml += `<td class="${cellClass}">${escapeHtml(displayValue)}</td>`;
                    });
                    tableHtml += `</tr>`;

        // 生成CPK表格
        function generateCPKTable(cpkResults) {
            const cpkTableElement = document.getElementById('CPKtable');
            const cpkValueFilterElement = document.getElementById('CPKValueFilter');
            if (!cpkTableElement || !cpkValueFilterElement) return;
            
            // 获取当前fixture索引
            const fixtureIndex = parseInt(fixtureSelect.value) || 0;
            
            // 获取对应的GroupbyConfig
            const groupbyConfig = GroupbyConfig[fixtureIndex];
            if (!groupbyConfig || !groupbyConfig[0] || groupbyConfig[0].length === 0) {
                cpkTableElement.innerHTML = '<div style="padding: 10px; text-align: center; color: #666;">当前Fixture无分组配置</div>';
                cpkValueFilterElement.innerHTML = '';
                return;
            }
            
            const dataColumns = groupbyConfig[0];
            const columnTitles = groupbyConfig[1] || [];
            const columnFilterConfig = groupbyConfig[2] || [];
            const sortConfig = groupbyConfig[3] || [];
            
            // 准备表格数据
            const headers = [];
            let rows = [];
            const columnUniqueValues = [];
            
            // 处理列标题
            for (let i = 0; i < dataColumns.length; i++) {
                const columnIndex = parseInt(dataColumns[i]) - 1; // 转换为0-based索引
                let title = columnTitles[i] || '';
                
                if (title === '' && processedData.headers && columnIndex >= 0 && columnIndex < processedData.headers.length) {
                    title = processedData.headers[columnIndex];
                }
                
                headers.push(title);
                
                // 收集每列的非重复值（始终从原始数据中收集，确保筛选框选项一致）
                const uniqueValues = new Set();
                if (processedData.data && processedData.data.length > 1) {
                    // 从原始数据中收集非重复值
                    for (let j = 1; j < processedData.data.length; j++) {
                        const rowData = processedData.data[j];
                        const cellValue = rowData[columnIndex] || '';
                        if (cellValue !== '') {
                            uniqueValues.add(cellValue);
                        }
                    }
                }
                // 按字母升序排列
                columnUniqueValues.push(Array.from(uniqueValues).sort((a, b) => a.localeCompare(b)));
            }
            
            // 处理数据行
            if (cpkResults) {
                // 使用CPK计算结果
                rows = cpkResults;
                
                // 数据排序
                const sortConfig = groupbyConfig[3] || [];
                rows.sort((a, b) => {
                    // 按GroupbyConfig[i][3][n] != 3的列从左到右排序
                    for (let i = 0; i < dataColumns.length; i++) {
                        if (sortConfig[i] !== "3") {
                            const aValue = a[i];
                            const bValue = b[i];
                            if (aValue !== bValue) {
                                return aValue.localeCompare(bValue);
                            }
                        }
                    }
                    
                    return 0;
                });
            } else {
                // 处理原始数据行（从第1行开始）
                if (processedData.data && processedData.data.length > 0) {
                    for (let i = 0; i < processedData.data.length; i++) {
                        const rowData = processedData.data[i];
                        const tableRow = [];
                        
                        for (let j = 0; j < dataColumns.length; j++) {
                            const columnIndex = parseInt(dataColumns[j]) - 1; // 转换为0-based索引
                            const cellValue = rowData[columnIndex] || '';
                            tableRow.push(cellValue);
                        }
                        
                        rows.push(tableRow);
                    }
                }
                
                // 数据排序
                const sortConfig = groupbyConfig[3] || [];
                rows.sort((a, b) => {
                    // 按GroupbyConfig[i][3][n] != 3的列从左到右排序
                    for (let i = 0; i < dataColumns.length; i++) {
                        if (sortConfig[i] !== "3") {
                            const aValue = a[i];
                            const bValue = b[i];
                            if (aValue !== bValue) {
                                return aValue.localeCompare(bValue);
                            }
                        }
                    }
                    
                    return 0;
                });
                
                // 处理Q列的序号替换
                const qColumns = [];
                for (let i = 0; i < dataColumns.length; i++) {
                    if (sortConfig[i] === "Q") {
                        qColumns.push(i);
                    }
                }
                
                if (qColumns.length > 0) {
                    // 找出所有非3非Q的列
                    const keyColumns = [];
                    for (let i = 0; i < dataColumns.length; i++) {
                        if (sortConfig[i] !== "3" && sortConfig[i] !== "Q") {
                            keyColumns.push(i);
                        }
                    }
                    
                    if (keyColumns.length > 0) {
                        // 按组合分组
                        const groups = {};
                        rows.forEach((row, index) => {
                            const key = keyColumns.map(col => row[col]).join('|');
                            if (!groups[key]) {
                                groups[key] = [];
                            }
                            groups[key].push(index);
                        });
                        
                        // 为每个组合分配序号（根据组合的实际个数）
                        Object.values(groups).forEach(group => {
                            group.forEach((rowIndex, seq) => {
                                const sequence = seq + 1; // 1-组合个数
                                qColumns.forEach(qCol => {
                                    rows[rowIndex][qCol] = sequence.toString();
                                });
                            });
                        });
                    }
                }
            }
            

            
            // 生成HTML表格
            let tableHTML = '<table style="width: auto; border-collapse: collapse; margin-top: 10px; font-size: 8px; border-spacing: 1px;">';
            
            // 表头
            tableHTML += '<thead><tr>';
            headers.forEach((header, index) => {
                // 设置列宽：GroupbyConfig[i][3][n] =3的列宽度为60px
                const width = sortConfig[index] === "3" ? "60px" : "auto";
                tableHTML += `<th style="border: 1px solid #ddd; padding: 1px; text-align: left; background-color: #f2f2f2; width: ${width};">${header}</th>`;
            });
            tableHTML += '</tr></thead>';
            
            // 数据行
            tableHTML += '<tbody>';
            rows.forEach(row => {
                tableHTML += '<tr style="height: 25px;">';
                row.forEach((cell, index) => {
                    let formattedCell = cell;
                    
                    // 根据GroupbyConfig[i][3][n]的值处理格式
                    if (sortConfig[index]) {
                        switch (sortConfig[index]) {
                            case 'T':
                                // 转换为 yy/mm/dd hh:mm 格式
                                if (cell) {
                                    // 假设输入格式是标准的日期时间格式
                                    const date = new Date(cell);
                                    if (!isNaN(date.getTime())) {
                                        const year = date.getFullYear().toString().slice(2);
                                        const month = (date.getMonth() + 1).toString().padStart(2, '0');
                                        const day = date.getDate().toString().padStart(2, '0');
                                        const hours = date.getHours().toString().padStart(2, '0');
                                        const minutes = date.getMinutes().toString().padStart(2, '0');
                                        formattedCell = `${year}/${month}/${day} ${hours}:${minutes}`;
                                    }
                                }
                                break;
                            case 'H':
                                // 按小时统计，格式化为 yy/mm/dd hh:00-(hh+1):00
                                if (cell && !cpkResults) { // 只有在非CPK模式下才格式化，CPK模式下已经格式化过了
                                    const date = new Date(cell);
                                    if (!isNaN(date.getTime())) {
                                        // 解析筛选条件中的时间范围
                                        const timeRanges = parseTimeRangeFromFilters();
                                        let useFilteredRange = false;
                                        let filteredStart = null;
                                        let filteredEnd = null;
                                        
                                        // 检查当前列是否有筛选时间范围，且间隔小于等于lifetime分钟
                                        if (timeRanges[index]) {
                                            const duration = calculateTimeRangeDuration(timeRanges[index]);
                                            if (duration > 0 && duration <= lifetime) {
                                                useFilteredRange = true;
                                                filteredStart = timeRanges[index].min;
                                                filteredEnd = timeRanges[index].max;
                                            }
                                        }
                                        
                                        if (useFilteredRange && filteredStart && filteredEnd) {
                                            // 使用筛选的时间段
                                            const startYear = filteredStart.getFullYear();
                                            const startMonth = (filteredStart.getMonth() + 1).toString().padStart(2, '0');
                                            const startDay = filteredStart.getDate().toString().padStart(2, '0');
                                            const startHour = filteredStart.getHours().toString().padStart(2, '0');
                                            const startMinute = filteredStart.getMinutes().toString().padStart(2, '0');
                                            
                                            const endYear = filteredEnd.getFullYear();
                                            const endMonth = (filteredEnd.getMonth() + 1).toString().padStart(2, '0');
                                            const endDay = filteredEnd.getDate().toString().padStart(2, '0');
                                            const endHour = filteredEnd.getHours().toString().padStart(2, '0');
                                            const endMinute = filteredEnd.getMinutes().toString().padStart(2, '0');
                                            
                                            // 检查是否是同一天
                                            if (startYear === endYear && startMonth === endMonth && startDay === endDay) {
                                                formattedCell = `${startYear}/${startMonth}/${startDay} ${startHour}:${startMinute}-${endHour}:${endMinute}`;
                                            } else {
                                                // 跨天的情况，分别显示日期
                                                formattedCell = `${startYear}/${startMonth}/${startDay} ${startHour}:${startMinute}-${endYear}/${endMonth}/${endDay} ${endHour}:${endMinute}`;
                                            }
                                        } else {
                                            // 使用默认的小时区间
                                            const year = date.getFullYear();
                                            const month = (date.getMonth() + 1).toString().padStart(2, '0');
                                            const day = date.getDate().toString().padStart(2, '0');
                                            const hour = date.getHours();
                                            const nextHour = (hour + 1) % 24;
                                            formattedCell = `${year}/${month}/${day} ${hour.toString().padStart(2, '0')}:00-${nextHour.toString().padStart(2, '0')}:00`;
                                        }
                                    }
                                }
                                break;
                            case '3':
                                // 四舍五入保留3位小数
                                const num = parseFloat(cell);
                                if (!isNaN(num)) {
                                    formattedCell = num.toFixed(3);
                                }
                                break;
                            // Q列已经在前面处理过了
                        }
                    }
                    
                    // 设置列宽：GroupbyConfig[i][3][n] =3的列宽度为60px

                    // 设置背景颜色

                    if (sortConfig[index] === "3") {

                        if (hasCPKResults && (currentMode === 'CPK' || currentMode === 'CP')) {
                            // CPK或CP模式：根据CPK/CP值设置背景颜色
                            const cpValue = parseFloat(cell);
                            if (!isNaN(cpValue)) {
                                if (cpValue >= 1.33) {
                                    bgColor = '#C9E4B4';
                                } else if (cpValue >= 1.0) {
                                    bgColor = '#FEE796';
                                } else {

                            }

                            // 获取规格限信息
                            const specLimit = groupbyConfig[4] && groupbyConfig[4][index] ? groupbyConfig[4][index] : '';
                            if (specLimit) {

                                    const upper = parseFloat(limitMatch[2]);

        // 应用CPK表格筛选
        function applyCPKFilters() {
            // 当CPK-Filter改动时，隐藏CPK cover和CPKBoxplot div
            const cpkCover = document.getElementById('CPKCover');
            const cpkBoxPlot = document.getElementById('CPKBoxPlot');
            if (cpkCover) cpkCover.style.display = 'none';
            if (cpkBoxPlot) cpkBoxPlot.style.display = 'none';
            
            const cpkTableElement = document.getElementById('CPKtable');
            if (!cpkTableElement) return;
            
            const fixtureIndex = parseInt(fixtureSelect.value) || 0;
            const groupbyConfig = GroupbyConfig[fixtureIndex];
            if (!groupbyConfig || !groupbyConfig[0]) return;
            
            const dataColumns = groupbyConfig[0];
            const columnFilterConfig = groupbyConfig[2] || [];
            const headers = [];
            
            // 处理列标题
            for (let i = 0; i < dataColumns.length; i++) {
                const columnIndex = parseInt(dataColumns[i]) - 1; // 转换为0-based索引
                let title = groupbyConfig[1][i] || '';
                
                if (title === '' && processedData.headers && columnIndex >= 0 && columnIndex < processedData.headers.length) {
                    title = processedData.headers[columnIndex];
                }
                
                headers.push(title);
            }
            
            // 获取所有筛选条件
            const filters = [];
            let changedFilterIndex = -1;
            
            // 确定哪个筛选框被改变
            const eventTarget = event ? event.target : null;
            if (eventTarget && eventTarget.id.startsWith('cpkFilter_')) {
                changedFilterIndex = parseInt(eventTarget.id.split('_')[1]);
            }
            
            for (let i = 0; i < dataColumns.length; i++) {
                if (columnFilterConfig[i] === '1') {
                    const filterSelect = document.getElementById(`cpkFilter_${i}`);
                    if (filterSelect && filterSelect.value !== '') {
                        filters.push({ columnIndex: i, value: filterSelect.value });
                    }
                }
            }
            
            // 获取所有数据行
            const table = cpkTableElement.querySelector('table');
            if (!table) return;
            
            const tbody = table.querySelector('tbody');
            if (!tbody) return;
            
            const rows = tbody.querySelectorAll('tr');
            
            // 筛选数据并收集筛选后的数据
            const filteredRows = [];
            
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                let showRow = true;
                
                // 检查每个筛选条件
                filters.forEach(filter => {
                    if (filter.columnIndex < cells.length) {
                        // 从data-original-value属性中获取原始数据的值
                        const cellValue = cells[filter.columnIndex].getAttribute('data-original-value') || cells[filter.columnIndex].textContent.trim();
                        if (cellValue !== filter.value) {
                            showRow = false;
                        }
                    }
                });
                
                // 显示或隐藏行
                row.style.display = showRow ? '' : 'none';
                
                // 收集筛选后的数据行
                if (showRow) {
                    const rowData = [];
                    cells.forEach(cell => {
                        // 从data-original-value属性中获取原始数据的值
                        const originalValue = cell.getAttribute('data-original-value') || cell.textContent.trim();
                        rowData.push(originalValue);
                    });
                    filteredRows.push(rowData);
                }
            });
            
            // 更新所有筛选框的选项，确保联动
            updateFilterOptions(filteredRows, dataColumns, columnFilterConfig, headers, changedFilterIndex);
        }
        
        // 更新筛选框选项
        function updateFilterOptions(filteredRows, dataColumns, columnFilterConfig, headers, changedFilterIndex) {
            // 为每个筛选框计算新的非重复值
            for (let i = 0; i < dataColumns.length; i++) {
                // 跳过被改变的筛选框，保持其当前值
                if (i === changedFilterIndex) continue;
                
                if (columnFilterConfig[i] === '1') {
                    const filterSelect = document.getElementById(`cpkFilter_${i}`);
                    if (filterSelect) {
                        // 计算筛选后的数据中该列的非重复值
                        const uniqueValues = new Set();
                        filteredRows.forEach(row => {
                            if (i < row.length) {
                                const cellValue = row[i];
                                if (cellValue !== '') {
                                    uniqueValues.add(cellValue);
                                }
                            }
                        });
                        
                        // 按字母升序排列
                        const sortedValues = Array.from(uniqueValues).sort((a, b) => a.localeCompare(b));
                        
                        // 保存当前选中的值
                        const currentValue = filterSelect.value;
                        
                        // 清空并重新生成选项
                        filterSelect.innerHTML = '';
                        
                        // 添加默认选项（表头）
                        const defaultOption = document.createElement('option');
                        defaultOption.value = '';
                        defaultOption.textContent = headers[i];
                        filterSelect.appendChild(defaultOption);
                        
                        // 添加筛选后的数据选项
                        sortedValues.forEach(value => {
                            const option = document.createElement('option');
                            option.value = value;
                            option.textContent = value;
                            // 保持之前的选择（如果仍然有效）
                            if (value === currentValue) {
                                option.selected = true;
                            }
                            filterSelect.appendChild(option);
                        });
                        
                        // 检查当前值是否仍然有效，如果无效则重置为默认值并更新颜色
                        if (currentValue !== '' && !sortedValues.includes(currentValue)) {
                            filterSelect.value = '';
                            filterSelect.style.backgroundColor = '';
                            filterSelect.style.color = '';
                        } else if (filterSelect.value !== '') {
                            // 如果仍然有效且非默认值，保持蓝色背景
                            filterSelect.style.backgroundColor = '#0085FA';
                            filterSelect.style.color = 'white';
                        } else {
                            // 如果是默认值，清除背景颜色
                            filterSelect.style.backgroundColor = '';
                            filterSelect.style.color = '';
                        }
                    }
                }
            }
        }

        // 生成关键参数数据折线图
        function generateParameterChart(currentProduct) {
            // 获取fixtureIndex
            
            if (!processedData) return;
            
            // 获取当前选中的产品
            const selectedProduct = currentProduct || '';
            //console.log('generateParameterChart - 当前选中的产品:', selectedProduct);
           
            // 获取配置列索引
            const timestampColumnIndex = parseInt(timestampColumnInput.value.trim()) - 1;
            const productColumnIndex = parseInt(productColumnInput.value.trim()) - 1;
            const parameterColumnsInput = parameterColumnInput.value.trim();
            
            if (!parameterColumnsInput) {
                parameterContent.innerHTML = '<div style="padding: 20px; text-align: center; color: #666;">请配置参数监控所在列</div>';
                return;
            }
            
            // 使用静态的mainProductToggle按钮
            // 注意：避免重复绑定事件监听器，只在必要时重新绑定
            // 产品按钮的事件已经在handleProductButtonClick中处理了，不需要在这里重复绑定
            
            // 处理parameter-btn的点击事件
            const parameterToggle = document.getElementById('parameterToggle');
            if (parameterToggle) {
                // 获取所有的参数按钮
                let parameterButtons = parameterToggle.querySelectorAll('.parameter-btn');
                
                // 为每个参数按钮绑定点击事件
                parameterButtons.forEach(button => {
                    // 移除之前的事件监听器
                    const clone = button.cloneNode(true);
                    button.parentNode.replaceChild(clone, button);
                    
                    // 添加新的点击事件监听器
                        clone.addEventListener('click', () => {
                            // 获取按钮的value值作为parameterIndex
                            const selectedIndex = parseInt(clone.value);
                            
                            // 更新全局parameterIndex变量
                            parameterIndex = selectedIndex;
                            
                            // 重新获取参数按钮集合（因为已经克隆了节点）
                            parameterButtons = parameterToggle.querySelectorAll('.parameter-btn');
                            
                            // 更新所有参数按钮的状态
                            parameterButtons.forEach((btn, index) => {
                                if (index === selectedIndex) {
                                    btn.classList.add('active');
                                } else {
                                    btn.classList.remove('active');
                                }
                            });
                            
                            // 输出当前参数配置信息
                            if (parameterConfigs && parameterConfigs[fixtureIndex] && parameterConfigs[fixtureIndex][selectedIndex]) {
                                const config = parameterConfigs[fixtureIndex][selectedIndex];
                                if (config && config.length >= 4) {
                                    parameterColumnInput.value = config[0] || '';
                                }
                            } else {
                                console.log('参数配置不正确,每个参数配置数组至少有4个元素');
                            }                            
                            // 重新生成图表
                            generateParameterChart(currentProduct);
                        });
                });
            }
            
            // 提取参数监控列索引
            const parameterColumns = parameterColumnsInput.split('&');
            const parameterColumnIndices = [];
            parameterColumns.forEach(col => {
                // 只解析为数字（从1开始的列号）
                if (!isNaN(col.trim())) {
                    const colIndex = parseInt(col.trim()) - 1; // 转换为从0开始的索引
                    if (colIndex >= 0 && colIndex < processedData.headers.length) {
                        parameterColumnIndices.push(colIndex);
                    }
                }
            });
            
            if (parameterColumnIndices.length === 0) {
                parameterContent.innerHTML = '<div style="padding: 20px; text-align: center; color: #666;">参数监控列配置无效</div>';
                return;
            }
            
            // 获取结果列索引
            const resultColumnIndex = parseInt(resultColumnInput.value.trim()) - 1;
            
            // 特殊筛选：当fixtureIndex = 0 (ALS press) 且产品为J427时，筛选结果列数据 != "NA"
            let filteredData = processedData.data;
            if (fixtureIndex === 0) {
                // 检查列索引是否有效
                if (productColumnIndex >= 0 && resultColumnIndex >= 0 && 
                    productColumnIndex < processedData.headers.length && resultColumnIndex < processedData.headers.length) {
                    
                    filteredData = processedData.data.filter(row => {
                        const productValue = (row[productColumnIndex] || '').trim();
                        const resultValue = (row[resultColumnIndex] || '').trim();
                        
                        // 如果产品是J427，则筛选结果不为"NA"的数据
                        if (productValue === 'J427') {
                            return resultValue !== 'NA';
                        }
                        // 其他产品保持不变
                        return true;
                    });
                }
            }
            
            // 按产品分组数据
            const productData = {};
            filteredData.forEach(row => {
                const product = row[productColumnIndex]?.trim() || 'Unknown';
                if (!productData[product]) {
                    productData[product] = [];
                }
                
                // 获取时间戳
                let timestamp = null;
                if (!isNaN(timestampColumnIndex) && timestampColumnIndex >= 0 && row[timestampColumnIndex]) {
                    timestamp = new Date(row[timestampColumnIndex]).getTime();
                }
                
                // 收集所有参数列的数据
                const dataPoint = { 
                    timestamp: timestamp || Date.now(),
                    // 保存结果状态
                    result: (!isNaN(resultColumnIndex) && resultColumnIndex >= 0 && row[resultColumnIndex]) ? 
                            row[resultColumnIndex].trim().toUpperCase() : null,
                    // 保存SN信息
                    sn: row[0] || 'N/A'
                };
                parameterColumnIndices.forEach(colIndex => {
                    const header = processedData.headers[colIndex];
                    const value = row[colIndex];
                    if (value !== null && value !== undefined) {
                        // Check if value is 'NA' and handle it specially
                        if (value === 'NA' || value.toUpperCase() === 'NA') {
                            dataPoint[header] = null; // Keep NA as null to be handled in drawing
                        } else if (!isNaN(parseFloat(value))) {
                            const numericValue = parseFloat(value);
                            dataPoint[header] = numericValue;
                        } else {
                            // For non-numeric values that are not 'NA', set to null
                            dataPoint[header] = null;
                        }
                    } else {
                        dataPoint[header] = null;
                    }
                });
                
                productData[product].push(dataPoint);
            });
            
            // 根据当前选中的产品生成图表
            const product = currentParameterProduct;

            
            const productContainer = document.getElementById('LineChartWrapper');
       
            // 获取全局标题前缀，如果没有则生成
            let chartTitlePrefix = window.globalChartTitlePrefix || '测试';
            
            // 如果全局前缀未设置，根据当前数据生成
            if (chartTitlePrefix === '测试' && processedData && processedData.data.length > 0) {
                const timestamps = [];
                const timestampColumnIndex = parseInt(timestampColumnInput.value.trim()) - 1;
                processedData.data.forEach(row => {
                    if (!isNaN(timestampColumnIndex) && timestampColumnIndex >= 0 && row[timestampColumnIndex]) {
                        const date = new Date(row[timestampColumnIndex]);
                        timestamps.push(date);
                    }
                });
                
                if (timestamps.length > 0) {
                    // 生成日期数组用于标题前缀
                    const dateSet = new Set();
                    timestamps.forEach(date => {
                        const dateStr = date.toISOString().split('T')[0]; // 获取 'YYYY-MM-DD' 格式
                        dateSet.add(dateStr);
                    });
                    const datesArray = Array.from(dateSet).sort();
                    const isMultipleDays = datesArray.length > 1;
                    
                    chartTitlePrefix = generateChartTitlePrefix(datesArray, isMultipleDays);
                }
            }
            
            // 获取动态图表标题
            const chartTitles = getChartTitles(fixtureIndex);
            
            // 检查标题前缀是否包含日期范围（多天数据）来确定是否为多天模式
            const isMultipleDays = chartTitlePrefix.includes(' - ');
            
            // 定义图表标题（将在Canvas中绘制）
            const chartTitle = isMultipleDays 
                ? `${chartTitlePrefix} ${product} ${chartTitles.chartTitle}` 
                : `${chartTitlePrefix} ${product} ${chartTitles.chartTitle}`;
            
            const canvas = document.getElementById('LineChart');
    
            // 准备图表数据
            const data = productData[product];
            
            // 检查数据是否存在且不为空
            if (!data || data.length === 0) {
                //console.warn(`产品 ${product} 的数据为空，尝试使用其他可用产品`);
                // 尝试使用第一个可用的产品
                const availableProducts = Object.keys(productData).filter(key => productData[key] && productData[key].length > 0);
                if (availableProducts.length > 0) {
                    const fallbackProduct = availableProducts[0];
                    currentParameterProduct = fallbackProduct;
                    // 重新调用当前函数以使用新的产品数据
                    return generateParameterChart(currentParameterProduct);
                } else {
                    return;
                }
            }
            
            // 按时间排序
            data.sort((a, b) => a.timestamp - b.timestamp);
            
            const labels = data.map(point => formatTimestamp(point.timestamp));
            
            const datasets = [];
            
            // 为每个参数列创建数据集
            parameterColumnIndices.forEach((colIndex, index) => {
                const header = processedData.headers[colIndex];
                const values = data.map(point => point[header] || null);
                
                // 使用固定颜色方案
                const colors = [
                    { borderColor: '#4C90F4', backgroundColor: 'rgba(76, 144, 244, 0.1)' }, // 列1: #4C90F4
                    { borderColor: '#F7C401', backgroundColor: 'rgba(247, 196, 1, 0.1)' },   // 列2: #F7C401
                    { borderColor: '#1C9F2B', backgroundColor: 'rgba(28, 159, 43, 0.1)' },   // 列3: #1C9F2B
                    { borderColor: '#F7626F', backgroundColor: 'rgba(247, 98, 111, 0.1)' }   // 列4: #F7626F
                ];
                const color = colors[index]; // 直接使用对应索引的颜色，不使用取模运算
                
                datasets.push({
                    label: header,
                    data: values,
                    borderColor: color.borderColor,
                    backgroundColor: color.backgroundColor,
                    tension: 0.1,
                    fill: false
                });
            });
            
            // 竖线层
            const VerticalLine = document.getElementById('VerticalLine');
        
            // tooltip
            const customTooltip = document.getElementById('customTooltip');
            
            // 设置canvas尺寸并考虑devicePixelRatio
            const dpr = window.devicePixelRatio || 1;
            canvas.width = 1330 * dpr;
            canvas.height = 300 * dpr;
            
            // 绘制图表（使用原生Canvas API）
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            
            // 设置canvas显示尺寸
            // 设置容器样式为水平排列
            productContainer.style.display = 'flex';
            productContainer.style.alignItems = 'flex-start';
            
            canvas.style.width = '1330px';
            canvas.style.height = '300px';
            canvas.style.display = 'block';
            
            // 创建图例容器，设置为绝对定位（相对于折线图）
            const legendContainer = document.getElementById('legendContainer');

            // 创建条形图canvas，设置为绝对定位（相对于折线图）
            const VerticalBarChart=document.getElementById('VerticalBarChart');
            VerticalBarChart.width = 60 * dpr;
            VerticalBarChart.height = 300 * dpr;
         
            // 定义图表区域边距 - 与产能&CT tab保持一致
            const margin = { top: 30, right: 60, bottom: 10, left: 60 };
            const chartWidth = canvas.width - margin.left - margin.right;
            const chartHeight = canvas.height - margin.top - margin.bottom;
            
            // 获取所有非空数据点
            const allValues = datasets.flatMap(ds => ds.data).filter(val => val !== null && val !== undefined);
            const dataMin = Math.min(...allValues);
            const dataMax = Math.max(...allValues);
            
            // 图例选择状态管理
            let selectedDatasets = new Array(datasets.length).fill(true); // 初始状态：全部选中
            let isSingleSelection = false; // 初始状态：多选
            
            // 创建图例和切换开关
            function createLegend() {
                legendContainer.innerHTML = '';
                
                // 设置为默认多选模式，不再提供切换选项
                isSingleSelection = false;
              
                // 创建水平排列的图例按钮
                datasets.forEach((dataset, datasetIndex) => {
                    const isSelected = selectedDatasets[datasetIndex];
                    
                    const legendButton = document.createElement('div');
                    legendButton.className = `legend-button ${isSelected ? 'selected' : ''}`;
                    
                    // 颜色空心圆
                    const colorBlock = document.createElement('span');
                    colorBlock.className = 'legend-color-block';
                    // 设置背景色与按钮背景色相同（透明或与legend-button背景色相同）
                    colorBlock.style.backgroundColor = 'transparent'; // 或者使用与按钮相同的背景色
                    // 设置边框为动态颜色，宽度为2px，实现空心效果
                    colorBlock.style.border = `2px solid ${dataset.borderColor}`; // 这个颜色是动态的，需要保留内联样式
                    
                    // 图例文本
                    const legendText = document.createElement('span');
                    legendText.className = 'legend-text';
                    legendText.textContent = dataset.label;
                    
                    // 平均值文本
                    const averageText = document.createElement('span');
                    // 计算当前图例数据的平均值（不随用户选择变化）
                    const currentDatasetValues = dataset.data.filter(val => val !== null && val !== undefined);
                    const currentDatasetAverage = currentDatasetValues.length > 0 ? 
                        currentDatasetValues.reduce((acc, val) => acc + val, 0) / currentDatasetValues.length : 0;
                    averageText.className = 'average-text';
                    averageText.textContent = `\nAvg: ${currentDatasetAverage.toFixed(3)}`;
                    
                    legendButton.appendChild(colorBlock);
                    legendButton.appendChild(legendText);
                    legendButton.appendChild(averageText);
                    legendContainer.appendChild(legendButton);
                    
                    // 点击事件处理
                    legendButton.addEventListener('click', function() {
                        if (isSingleSelection) {
                            // 单选模式：直接选中当前图例
                            selectedDatasets.fill(false);
                            selectedDatasets[datasetIndex] = true;
                        } else {
                            // 多选模式：切换当前图例的选中状态
                            selectedDatasets[datasetIndex] = !selectedDatasets[datasetIndex];
                            
                            // 确保至少有一个图例被选中
                            const hasSelected = selectedDatasets.some(selected => selected);
                            if (!hasSelected) {
                                selectedDatasets[datasetIndex] = true;
                            }
                        }
                        
                        // 重新创建图例
                        createLegend();
                        // 重绘图表
                        redrawChartWithHighlight(-1, -1);
                        // 更新统计框
                        updateStats();
                        // 重绘条形图
                        drawBarChart();
                    });
                });
            }
            
            // 初始化图例
            createLegend();
            
            // 根据选中的图例获取过滤后的数据
            function getSelectedData() {
                const filteredData = [];
                datasets.forEach((dataset, index) => {
                    if (selectedDatasets[index]) {
                        filteredData.push(...dataset.data.filter(val => val !== null && val !== undefined));
                    }
                });
                return filteredData;
            }
            
            // 计算选中数据的平均值
            function getSelectedDataAverage() {
                const selectedData = getSelectedData();
                if (selectedData.length === 0) return 0;
                
                const sum = selectedData.reduce((acc, val) => acc + val, 0);
                return sum / selectedData.length;
            }
            
            // 根据选中的图例数量获取条形图填充色
            function getBarChartFillColor() {
                const selectedCount = selectedDatasets.filter(selected => selected).length;
                if (selectedCount === 1) {
                    const selectedIndex = selectedDatasets.indexOf(true);
                    return datasets[selectedIndex].borderColor;
                }
                return 'white';
            }
            
            // 更新统计框数据
            function updateStats() {
                // 获取选中图例的数据
                const selectedData = getSelectedData();
                
                // 计算超出范围数据
                let totalPoints = selectedData.length;
                let overLimitPoints = 0;
                
                selectedData.forEach(value => {
                    if (value < parameterTargetLower || value > parameterTargetUpper) {
                        overLimitPoints++;
                    }
                });
                
                // 计算超限百分比
                const overLimitPercentage = totalPoints > 0 ? (overLimitPoints / totalPoints * 100) : 0;
                
                // 更新统计框内容
                parameterStats.innerHTML = `
                    <div>超出范围: ${overLimitPoints}</div>
                    <div>超限比例: ${overLimitPercentage.toFixed(2)}%</div>
                `;
            }
            
            // 使用fixtureConfigs数组中的预设压力目标值
            // 从fixtureSelect下拉菜单获取当前选中的索引

            const parameterTargetRange = currentParameterProduct === 'J427' ? 
                parameterConfigs[fixtureIndex][parameterIndex][1].split('~') : 
                parameterConfigs[fixtureIndex][parameterIndex][2].split('~');

            let parameterTargetLower = parseFloat(parameterTargetRange[0]); // 预设参数目标下限
            let parameterTargetUpper = parseFloat(parameterTargetRange[1]); // 预设参数目标上限
            let parameterTargetAverage = (parameterTargetLower + parameterTargetUpper) / 2; // 预设参数目标平均值
            
            // 检查是否需要使用统计方法计算上下限（当预设为-e和e时）
            if (parameterTargetRange[0] === '-e' && parameterTargetRange[1] === 'e') {
                // 获取选中图例的数据
                const selectedData = getSelectedData();
                
                // 计算平均值和标准方差的函数
                function calculateStats(data) {
                    if (data.length === 0) {
                        return { average: 0, stdDev: 0 };
                    }
                    
                    // 计算平均值
                    const sum = data.reduce((acc, val) => acc + val, 0);
                    const average = sum / data.length;
                    
                    // 计算标准方差
                    const squaredDifferences = data.map(val => Math.pow(val - average, 2));
                    const variance = squaredDifferences.reduce((acc, val) => acc + val, 0) / data.length;
                    const stdDev = Math.sqrt(variance);
                    
                    return { average, stdDev };
                }
                
                // 根据数据量选择计算方法
                let stats;
                if (selectedData.length > 32) {
                    // 使用前32个数据
                    const first32Data = selectedData.slice(0, 32);
                    stats = calculateStats(first32Data);
                } else {
                    // 使用所有数据
                    stats = calculateStats(selectedData);
                }
                
                // 计算新的上下限和平均值
                parameterTargetAverage = stats.average;
                parameterTargetLower = stats.average - 3 * stats.stdDev;
                parameterTargetUpper = stats.average + 3 * stats.stdDev;
            }
            
            // 创建统计框元素，设置为绝对定位（相对于折线图）
            const parameterStats = document.getElementById('parameterStats');
            
            // 初始化统计框
            updateStats();
            
            const delta = parameterTargetUpper - parameterTargetLower;
            const increment = delta / 10;

            // 计算Y轴最大值：数据最大值和目标上限的较大值 + 1/10 delta
            const UL = Math.max(dataMax, parameterTargetUpper) + increment;
            const yMax = smartRoundUp(UL);
            
            // 计算Y轴最小值：数据最小值和目标下限的较小值 - 1/10 delta
            const LL = Math.min(dataMin, parameterTargetLower) - increment;
            const yMin = smartRoundDown(LL);
            
            const yRange = yMax - yMin;
            const yStep = yRange / 5; // 分成10个主要刻度
                        
            // 绘制条形图
            function drawBarChart() {
                const barCtx = VerticalBarChart.getContext('2d');
                barCtx.scale(dpr, dpr);
                barCtx.clearRect(0, 0, VerticalBarChart.width / dpr, VerticalBarChart.height / dpr);
                
                // 条形图边距与主图表保持一致
                const barMargin = { top: margin.top, right: 10, bottom: margin.bottom, left: 10 };
                const barChartWidth = (VerticalBarChart.width / dpr) - barMargin.left - barMargin.right;
                const barChartHeight = (VerticalBarChart.height / dpr) - barMargin.top - barMargin.bottom;
                
                // 20个间隔
                const intervalCount = 40;
                const intervalStep = yRange / intervalCount;
                
                // 获取选中图例的数据
                const selectedData = getSelectedData();
                
                // 统计每个间隔内的压力值数量
                const intervalCounts = new Array(intervalCount).fill(0);
                selectedData.forEach(value => {
                    const intervalIndex = Math.min(
                        intervalCount - 1,
                        Math.floor((value - yMin) / intervalStep)
                    );
                    intervalCounts[intervalIndex]++;
                });
                
                // 找到最大计数用于归一化
                const maxCount = Math.max(...intervalCounts, 1); // 确保至少为1
                
                // 绘制条形图（横向柱状图）- 反转Y轴方向（下面小上面大）
                intervalCounts.forEach((count, index) => {
                    if (count > 0) {
                        // 计算条形位置 - 反转Y轴
                        const barHeight = barChartHeight / intervalCount;
                        const reversedIndex = intervalCount - 1 - index; // 反转索引
                        const barY = barMargin.top + (reversedIndex * barHeight);
                        const barWidth = (count / maxCount) * barChartWidth;
                        
                        // 获取条形图填充色
                        const fillColor = getBarChartFillColor();
                        
                        // 绘制条形
                        if (fillColor === 'white') {
                            barCtx.fillStyle = 'white';
                        } else {
                            barCtx.fillStyle = fillColor;
                        }
                        barCtx.fillRect(barMargin.left, barY, barWidth, barHeight - 1); // 留出1px间隔
                        
                        // 绘制边框
                        barCtx.strokeStyle = 'black';
                        barCtx.lineWidth = 1;
                        barCtx.strokeRect(barMargin.left, barY, barWidth, barHeight - 1);
                    }
                });
                
                // 绘制Y轴刻度（只显示刻度线，不显示名称和虚线）- 反转Y轴
                barCtx.strokeStyle = '#333';
                barCtx.lineWidth = 1;
                
                // 绘制20个间隔的刻度线
                for (let i = 0; i <= intervalCount; i++) {
                    const reversedI = intervalCount - i; // 反转刻度位置
                    const yPos = barMargin.top + (reversedI * barChartHeight / intervalCount);
                    barCtx.beginPath();
                    barCtx.moveTo(barMargin.left - 5, yPos);
                    barCtx.lineTo(barMargin.left, yPos);
                    barCtx.stroke();
                }
            }
   
                // 添加鼠标移入状态变量
                let isMouseOver = false;
                
                // 绘制静态元素函数（参考线、标签、图例立即显示）
                
                function drawStaticElements() {
                    // 获取fixtureIndex
                    
                    // 绘制图表标题
                    ctx.font = '16px Helvetica Neue bold';
                    ctx.fillStyle = '#333';
                    ctx.textAlign = 'center';
                    ctx.fillText(chartTitle, canvas.width / 2, 16);
                    
                    // 绘制X轴
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(margin.left, margin.top + chartHeight);
                    ctx.lineTo(margin.left + chartWidth, margin.top + chartHeight);
                    ctx.stroke();
                    
                    //绘制X轴刻度和标签

                    // 绘制Y轴
                    ctx.beginPath();
                    ctx.moveTo(margin.left, margin.top);
                    ctx.lineTo(margin.left, margin.top + chartHeight);
                    ctx.stroke();
                    
                    // 绘制Y轴刻度和标签
                    for (let i = 0; i <= 5; i++) {
                        const yValue = yMin + (yStep * i);
                        const yPos = margin.top + chartHeight - ((yValue - yMin) / yRange * chartHeight);
                        
                        // 绘制刻度延长虚线
                        ctx.beginPath();
                        ctx.setLineDash([3, 3]);
                        ctx.moveTo(margin.left, yPos);
                        ctx.lineTo(margin.left + chartWidth, yPos);
                        ctx.strokeStyle = '#ddd';
                        ctx.stroke();
                        ctx.setLineDash([]);
                        
                        // 刻度线
                        ctx.beginPath();
                        ctx.moveTo(margin.left - 5, yPos);
                        ctx.lineTo(margin.left, yPos);
                        ctx.strokeStyle = '#333';
                        ctx.stroke();
                        
                        // 标签
                        ctx.fillStyle = '#333';
                        ctx.font = '12px Arial';
                        ctx.textAlign = 'right';
                        ctx.textBaseline = 'middle';
                        // 获取动态小数点位数
                        const chartTitles = getChartTitles(fixtureIndex);
                        ctx.fillText(yValue.toFixed(parseInt(chartTitles.decimalPlace)), margin.left - 10, yPos);
                    }
                                        
                    // 绘制Y轴标题
                    ctx.save();
                    ctx.textAlign = 'center';
                    ctx.font = '12px Helvetica Neue';
                    // 获取动态Y轴标题
                    const chartTitles = getChartTitles(fixtureIndex);
                    ctx.fillText(chartTitles.yAxisTitle, 50, 10);
                    ctx.restore();
                                        
                    // 绘制三条参考线（不需要动画，立即显示完整）
                    // 预设上限
                    ctx.beginPath();
